<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>터치클래스 코스 등록 - 커리큘럼 인덱싱 개편</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fadeIn { animation: fadeIn 0.2s ease-in-out; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator,
    input[type="datetime-local"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { opacity: 1; }
  </style>
</head>
<body class="bg-[#f4f7fa] overflow-hidden">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import * as Lucide from 'https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0,react-dom@18.2.0';

    const { Video, MapPin, Layers, Plus, FileText, List, CheckCircle, Trash2, Search, Info, X, UploadCloud, FileVideo, Save, ChevronDown, ChevronRight, RotateCcw, AlertCircle, Image: ImageIcon, GripVertical, Settings2, CalendarDays, QrCode, Zap, Wand2 } = Lucide;

    // --- Components ---
    const SectionTitle = ({ num, title, badge }) => {
      let badgeClass = 'bg-slate-200 text-slate-600';
      if (badge === '오프라인 특화' || badge === '오프라인 핵심') {
        badgeClass = 'bg-red-100 text-red-600';
      }
      return (
        <div className="flex items-center gap-2 mb-4">
          {badge && <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${badgeClass}`}>{badge}</span>}
          <h3 className="text-[15px] font-bold text-slate-800">{num}. {title}</h3>
        </div>
      );
    };

    const Toggle = ({ active }) => (
      <div className={`w-[38px] h-[22px] rounded-full relative cursor-pointer transition-colors ${active ? 'bg-[#5c66f2]' : 'bg-slate-300'}`}>
        <div className={`w-[18px] h-[18px] bg-white rounded-full absolute top-[2px] transition-all ${active ? 'left-[18px]' : 'left-[2px]'}`}></div>
      </div>
    );

    const ItemRequiredToggle = ({ initial = true, onToggle }) => {
      const [isRequired, setIsRequired] = useState(initial);
      const handleToggle = (e) => {
        e.stopPropagation();
        const newState = !isRequired;
        setIsRequired(newState);
        if(onToggle) onToggle(newState);
      };
      return (
        <button
          onClick={handleToggle}
          className={`text-[10px] font-bold px-2 py-1 rounded-[4px] transition-all shrink-0 min-w-[36px] text-center ${
            isRequired
              ? 'bg-[#eef0ff] text-[#5c66f2] hover:bg-[#e0e4ff] border border-[#d6dbff]'
              : 'bg-slate-50 text-slate-400 hover:bg-slate-100 border border-slate-200'
          }`}
          title="필수 이수 여부 토글"
        >
          {isRequired ? '필수' : '선택'}
        </button>
      );
    };

    // --- Main App ---
    const App = () => {
      const [viewMode, setViewMode] = useState('selection');
      const [courseType, setCourseType] = useState(null);
      const [isLibraryModalOpen, setLibraryModalOpen] = useState(false);
      const [editingItem, setEditingItem] = useState(null);
      const [reqStates, setReqStates] = useState({ item1: true, item2: false, item3: true });
      
      const [sessionRule, setSessionRule] = useState('single');
      const [customModules, setCustomModules] = useState([]);
      const [libraryCategory, setLibraryCategory] = useState('all');

      // 오프라인 회차 일괄 생성 폼 상태
      const [selectedDays, setSelectedDays] = useState(['월', '수', '금']);
      const toggleDay = (day) => {
        setSelectedDays(prev => prev.includes(day) ? prev.filter(d => d !== day) : [...prev, day]);
      };

      // 오프라인 회차 상태 연동
      const [sessions, setSessions] = useState([
        { id: 1, date: '', startTime: '', endTime: '', place: '', duration: 60, capacity: 30 },
        { id: 2, date: '', startTime: '', endTime: '', place: '', duration: 60, capacity: 30 },
        { id: 3, date: '', startTime: '', endTime: '', place: '', duration: 60, capacity: 30 }
      ]);

      const handleAddSession = () => {
        setSessions([...sessions, { id: Date.now(), date: '', startTime: '', endTime: '', place: '', duration: 60, capacity: 30 }]);
      };

      const handleRemoveSession = (id) => {
        setSessions(sessions.filter(s => s.id !== id));
      };

      const handleSessionChange = (id, field, value) => {
        setSessions(sessions.map(s => s.id === id ? { ...s, [field]: value } : s));
      };

      const handleBatchGenerate = () => {
        // 일괄 생성 시뮬레이션 (목업 데이터)
        setSessions([
          { id: 101, date: '2026-03-02', startTime: '22:00', endTime: '23:00', place: '', duration: 60, capacity: 30 },
          { id: 102, date: '2026-03-04', startTime: '22:00', endTime: '23:00', place: '', duration: 60, capacity: 30 },
          { id: 103, date: '2026-03-06', startTime: '22:00', endTime: '23:00', place: '', duration: 60, capacity: 30 },
        ]);
      };

      // 모달에 표시될 목업 데이터
      const mockLibraryItems = [
        { title: '2025년 기업문화 핵심가치 내재화 특강', type: 'video', time: '45:20', date: '2026.01.15' },
        { title: '신규 입사자 시스템 가이드(기본편)', type: 'document', time: '-', date: '2025.11.20' },
        { title: '직장 내 성희롱 예방 교육 (법정의무)', type: 'video', time: '60:00', date: '2025.10.05' },
        { title: '2025 상반기 임직원 만족도 설문', type: 'survey', time: '-', date: '2025.09.12' },
        { title: '신입사원 OJT 최종 평가', type: 'exam', time: '문항 20개', date: '2026.02.10' },
        { title: '보안 인식 중간 점검', type: 'exam', time: '문항 10개', date: '2026.01.05' },
      ];

      const filteredLibraryItems = libraryCategory === 'all' 
        ? mockLibraryItems 
        : mockLibraryItems.filter(item => item.type === libraryCategory);

      if (viewMode === 'selection') {
        return (
          <div className="min-h-screen flex items-center justify-center p-6 animate-fadeIn bg-slate-100">
            <div className="max-w-4xl w-full">
              <h1 className="text-3xl font-bold text-center mb-10 text-slate-900 font-sans tracking-tight">새 코스 등록 유형 선택</h1>
              <div className="grid grid-cols-3 gap-6">
                {[
                  { id: 'online', title: '온라인 코스', icon: <Video />, color: 'blue', desc: '비대면 전용 학습 과정' },
                  { id: 'offline', title: '오프라인 코스', icon: <MapPin />, color: 'red', desc: '집합 교육 및 출석 중심' },
                  { id: 'blended', title: '블렌디드 코스', icon: <Layers />, color: 'indigo', desc: '온/오프라인 통합 하이브리드' }
                ].map(type => (
                  <div key={type.id} onClick={() => {setCourseType(type.id); setViewMode('editor');}} className="bg-white border border-slate-200 rounded-2xl p-8 cursor-pointer hover:border-[#5c66f2] hover:shadow-xl transition-all text-center group">
                    <div className="w-16 h-16 mx-auto bg-slate-50 text-slate-400 group-hover:bg-[#5c66f2] group-hover:text-white rounded-2xl flex items-center justify-center mb-6 transition-all">
                      {type.icon}
                    </div>
                    <h3 className="text-xl font-bold mb-3">{type.title}</h3>
                    <p className="text-slate-500 text-sm leading-relaxed">{type.desc}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="h-screen flex flex-col animate-fadeIn">
          {/* Header */}
          <header className="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center z-30 shadow-sm">
            <div className="flex items-center gap-4">
              <button onClick={() => setViewMode('selection')} className="text-slate-400 hover:text-slate-600 transition-colors"><X size={20} /></button>
              <div className="h-4 w-px bg-slate-200"></div>
              <h2 className="font-bold text-[16px] text-slate-800 flex items-center gap-2">
                코스 등록 <ChevronRight size={14} className="text-slate-300"/> 
                <span className="text-[#5c66f2]">{courseType.toUpperCase()} COURSE</span>
              </h2>
            </div>
            <div className="flex gap-2">
              <button className="px-5 py-2 border border-slate-300 rounded font-bold text-xs hover:bg-slate-50">임시저장</button>
              <button className="px-5 py-2 bg-[#5c66f2] text-white rounded font-bold text-xs hover:bg-[#4a54e1] shadow-sm">등록 완료</button>
            </div>
          </header>

          <main className="flex-1 flex overflow-hidden">
            {/* Left Panel: Settings & Meta */}
            <section className="flex-1 overflow-y-auto custom-scrollbar bg-[#f8fafc] p-8">
              <div className="max-w-[800px] mx-auto space-y-6 pb-20">
                
                {/* 1. 코스 기본 정보 (이미지 반영) */}
                <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-7">
                  <h3 className="text-[16px] font-bold text-slate-800 mb-6">코스 기본 정보</h3>
                  <div className="space-y-7">
                    <div className="flex items-center gap-4">
                      <label className="w-20 text-[13px] text-slate-500">코스 분류</label>
                      <button className="px-4 py-2 bg-[#5c66f2] text-white rounded text-[12px] font-bold flex items-center gap-1 hover:bg-[#4a54e1] transition-colors shadow-sm">
                        <Plus size={14}/> 분류 선택
                      </button>
                    </div>
                    <div className="relative mt-2">
                      <label className="absolute -top-2 left-3 bg-white px-1 text-[11px] text-[#5c66f2] font-bold z-10">코스명</label>
                      <input type="text" className="w-full border-[1.5px] border-[#5c66f2] rounded-md p-3 text-[14px] outline-none text-slate-800 font-medium" defaultValue="2021년 3월 위클리 터치메이트" />
                    </div>
                    <div className="relative">
                      <label className="absolute -top-2 left-3 bg-white px-1 text-[11px] text-slate-400 font-bold z-10">코스 소개</label>
                      <input type="text" className="w-full border border-slate-300 rounded-md p-3 text-[14px] outline-none text-slate-800" placeholder="코스 소개" />
                    </div>
                    <div className="flex items-center gap-6 pt-4 border-t border-slate-100">
                      <label className="text-[13px] text-slate-500 flex items-center gap-1 w-24">
                        코스 상세 상단 <Info size={14} className="text-[#5c66f2] cursor-pointer"/>
                      </label>
                      <div className="flex items-center gap-10">
                        <div className="flex items-center gap-3">
                          <label className="flex items-center gap-2 cursor-pointer">
                            <div className="w-[18px] h-[18px] rounded-full border-[5px] border-[#5c66f2] bg-white flex items-center justify-center"></div>
                            <span className="text-[13px] font-bold text-slate-800">기본(표지)</span>
                          </label>
                          <div className="w-[46px] h-[64px] bg-[#f8fafc] border border-slate-200 rounded-md relative flex flex-col items-center p-1.5 shadow-sm">
                             <div className="w-full h-8 bg-slate-300 rounded-sm mb-1.5 flex items-center justify-center">
                               <ImageIcon size={12} className="text-white" />
                             </div>
                             <div className="w-full h-1.5 bg-slate-200 rounded-[1px] mb-1"></div>
                             <div className="w-5 h-1.5 bg-slate-200 rounded-[1px]"></div>
                             <div className="absolute top-1 right-1 text-[8px] text-slate-400 font-bold leading-none">×</div>
                          </div>
                        </div>
                        <div className="flex items-center gap-3">
                          <label className="flex items-center gap-2 cursor-pointer group">
                            <div className="w-[18px] h-[18px] rounded-full border-2 border-slate-300 bg-white group-hover:border-slate-400"></div>
                            <span className="text-[13px] text-slate-600">이미지(최대5장)</span>
                          </label>
                          <div className="w-[64px] h-[46px] bg-[#f8fafc] border border-slate-200 rounded-md relative flex items-center justify-center shadow-sm">
                             <div className="w-12 h-8 bg-slate-200 rounded-sm flex items-center justify-center">
                               <ImageIcon size={12} className="text-slate-400" />
                             </div>
                             <div className="absolute top-1 right-1 text-[8px] text-slate-400 font-bold leading-none">×</div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                {/* 2. 수강 등록 방식 (이미지 반영) */}
                <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-7">
                  <h3 className="text-[16px] font-bold text-slate-800 mb-4">수강 등록 방식</h3>
                  <div className="space-y-1">
                    <div className="flex justify-between items-center py-3 border-b border-slate-50">
                      <div>
                        <div className="text-[14px] font-bold text-slate-800">회원이 신청</div>
                        <div className="text-[12px] text-slate-400 mt-0.5">사용 안 함</div>
                      </div>
                      <Toggle active={false} />
                    </div>
                    <div className="flex justify-between items-center py-3">
                      <div>
                        <div className="text-[14px] font-bold text-slate-800">관리자가 등록</div>
                        <div className="text-[12px] text-slate-400 mt-0.5">사용 안 함</div>
                      </div>
                      <Toggle active={false} />
                    </div>
                  </div>
                </div>

                {/* 3. 수강 기간 지정 (이미지 반영) */}
                <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-7">
                  <h3 className="text-[16px] font-bold text-slate-800 mb-6">수강 기간 지정</h3>
                  <div className="space-y-6">
                    <div className="flex items-start gap-4">
                      <div className="pt-2">
                        <div className="w-[18px] h-[18px] rounded-full border-[5px] border-[#5c66f2] bg-white flex items-center justify-center cursor-pointer"></div>
                      </div>
                      <div className="flex-1 flex items-center gap-3">
                        <div className="relative flex-1 max-w-[200px]">
                          <label className="absolute -top-2 left-3 bg-white px-1 text-[11px] text-slate-400 font-bold z-10">시작일</label>
                          <input type="datetime-local" className="w-full border border-[#5c66f2] rounded p-2.5 text-[14px] outline-none text-slate-700" defaultValue="2022-04-29T12:00" />
                        </div>
                        <span className="text-slate-400 font-medium">~</span>
                        <div className="relative flex-1 max-w-[200px]">
                          <label className="absolute -top-2 left-3 bg-white px-1 text-[11px] text-slate-400 font-bold z-10">종료일</label>
                          <input type="datetime-local" className="w-full border border-slate-300 rounded p-2.5 text-[14px] outline-none text-slate-700 focus:border-[#5c66f2]" defaultValue="2022-04-29T23:59" />
                        </div>
                      </div>
                    </div>
                    <div className="flex items-center gap-4 cursor-pointer group">
                      <div className="w-[18px] h-[18px] rounded-full border-2 border-slate-300 bg-white group-hover:border-slate-400"></div>
                      <div className="flex items-center gap-2 text-[14px] text-slate-600">
                        <span>수강 시작일로부터</span>
                        <input type="number" className="w-24 border border-slate-300 rounded p-2 text-center outline-none focus:border-[#5c66f2]" placeholder="일수" />
                        <span>일간</span>
                      </div>
                    </div>
                    <div className="flex items-center gap-4 cursor-pointer group">
                      <div className="w-[18px] h-[18px] rounded-full border-2 border-slate-300 bg-white group-hover:border-slate-400"></div>
                      <span className="text-[14px] text-slate-600">제한 없음</span>
                    </div>
                  </div>
                </div>

                {/* 4. 수강 시간 제한 (이미지 반영) */}
                <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-7 flex justify-between items-center">
                  <div>
                    <h3 className="text-[16px] font-bold text-slate-800">수강 시간 제한</h3>
                    <p className="text-[12px] text-slate-400 mt-1">사용 안 함</p>
                  </div>
                  <Toggle active={false} />
                </div>

                {/* 5. 오프라인 운영 및 출결 정책 */}
                {(courseType === 'offline' || courseType === 'blended') && (
                  <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-7">
                    <SectionTitle num="5" title="오프라인 운영 및 출결 정책" badge="오프라인 특화" />
                    
                    <div className="grid grid-cols-2 gap-8 mb-6">
                      <div className="space-y-1.5">
                        <label className="text-[11px] font-bold text-slate-400 uppercase">담당 강사 *</label>
                        <input type="text" className="w-full border border-slate-200 rounded p-2.5 text-[13px] outline-none focus:border-[#5c66f2] transition-colors" placeholder="강사명 입력" />
                      </div>
                      <div className="space-y-1.5">
                        <label className="text-[11px] font-bold text-slate-400 uppercase">기본 교육 장소 *</label>
                        <input type="text" className="w-full border border-slate-200 rounded p-2.5 text-[13px] outline-none focus:border-[#5c66f2] transition-colors" placeholder="예) 상암사옥 2층 제1교육장" />
                      </div>
                    </div>

                    <div className="space-y-4 pt-4 border-t border-slate-100">
                      <div className="flex justify-between items-center py-2">
                        <div>
                          <div className="text-[13px] font-semibold text-slate-800 flex items-center gap-1">QR 코드 출석 관리 연동 <QrCode size={14} className="text-slate-400"/></div>
                          <div className="text-[11px] text-slate-500 mt-1">생성된 각 회차별로 현장 출석용 고유 QR 코드를 발급하여 시스템과 실시간 연동합니다.</div>
                        </div>
                        <Toggle active={true} />
                      </div>
                      <div className="flex justify-between items-center py-2">
                        <div>
                          <div className="text-[13px] font-semibold text-slate-800">관리자 수기 출석 처리 허용</div>
                          <div className="text-[11px] text-slate-500 mt-1">앱 미설치 등 예외 상황 발생 시, 명단에서 관리자가 직접 수기 출석을 처리합니다.</div>
                        </div>
                        <Toggle active={true} />
                      </div>
                    </div>
                  </div>
                )}

                {/* 6. 오프라인 세션 설정 */}
                {(courseType === 'offline' || courseType === 'blended') && (
                  <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-7">
                    <SectionTitle num="6" title="수강 신청 방식 및 회차(세션) 구성" badge="오프라인 핵심" />
                    
                    <div className="mb-6">
                      <div className="text-[13px] font-bold text-slate-800 mb-3">학습자 수강(이수) 규칙 설정</div>
                      <div className="grid grid-cols-3 gap-4">
                        {/* Card 1: 단일 회차 선택형 */}
                        <div onClick={() => setSessionRule('single')} className={`relative border rounded-xl p-5 cursor-pointer transition-all flex flex-col h-full ${sessionRule === 'single' ? 'border-[#5c66f2] bg-[#f8f9ff] ring-1 ring-[#5c66f2]' : 'border-slate-200 hover:border-blue-300'}`}>
                          <div className="absolute top-5 right-5">
                            <div className={`w-4 h-4 rounded-full border-[4px] ${sessionRule === 'single' ? 'border-[#5c66f2] bg-white' : 'border-slate-300'}`}></div>
                          </div>
                          <div className={`w-8 h-8 rounded text-white flex items-center justify-center text-[14px] font-bold mb-3 ${sessionRule === 'single' ? 'bg-[#5c66f2]' : 'bg-slate-200 text-slate-500'}`}>1</div>
                          <h4 className={`font-bold text-[13px] mb-1.5 ${sessionRule === 'single' ? 'text-[#5c66f2]' : 'text-slate-700'}`}>단일 회차 선택형</h4>
                          <p className="text-[11px] text-slate-500 leading-relaxed flex-1">학습자는 개설된 여러 회차 중 단 1개의 일정만 선택하여 수강합니다.</p>
                        </div>
                        
                        {/* Card 2: 복수 회차 선택형 */}
                        <div onClick={() => setSessionRule('multiple')} className={`relative border rounded-xl p-5 cursor-pointer transition-all flex flex-col h-full ${sessionRule === 'multiple' ? 'border-[#5c66f2] bg-[#f8f9ff] ring-1 ring-[#5c66f2]' : 'border-slate-200 hover:border-blue-300'}`}>
                          <div className="absolute top-5 right-5">
                            <div className={`w-4 h-4 rounded-full border-[4px] ${sessionRule === 'multiple' ? 'border-[#5c66f2] bg-white' : 'border-slate-300'}`}></div>
                          </div>

                            <div className="flex items-center gap-2 text-[12px] font-bold text-slate-700 bg-white p-2 rounded-md border border-blue-100 mt-auto shadow-sm">

                              <input type="number" defaultValue="3" className="w-12 border border-slate-200 rounded p-1 text-center outline-none focus:border-[#5c66f2]" onClick={e => e.stopPropagation()} /> 개
                            </div>
                          )}
                        </div>

                        {/* Card 3: 전체 회차 필수형 */}
                        <div onClick={() => setSessionRule('all')} className={`relative border rounded-xl p-5 cursor-pointer transition-all flex flex-col h-full ${sessionRule === 'all' ? 'border-[#5c66f2] bg-[#f8f9ff] ring-1 ring-[#5c66f2]' : 'border-slate-200 hover:border-blue-300'}`}>

                            <div className={`w-4 h-4 rounded-full border-[4px] ${sessionRule === 'all' ? 'border-[#5c66f2] bg-white' : 'border-slate-300'}`}></div>
                          </div>
                          <div className={`w-8 h-8 rounded flex items-center justify-center text-[14px] font-bold mb-3 ${sessionRule === 'all' ? 'bg-[#5c66f2] text-white' : 'bg-slate-100 text-slate-400'}`}>

                          </div>
                          <h4 className={`font-bold text-[13px] mb-1.5 ${sessionRule === 'all' ? 'text-[#5c66f2]' : 'text-slate-700'}`}>전체 회차 필수형</h4>

                        </div>
                      </div>
                    </div>

                    {/* --- 분기: 전체 회차 필수형 (All) UI --- */}
                    {sessionRule === 'all' ? (
                      <div className="animate-fadeIn">
                        <div className="bg-[#f0f4ff] border border-[#d6dbff] p-4 rounded-lg text-[13px] text-[#5c66f2] flex items-center gap-2 mb-4 font-semibold">
                          <Zap size={16} fill="currentColor" className="shrink-0" />

                        </div>

                        <div className="border border-slate-200 rounded-lg p-6 bg-white space-y-6 shadow-[0_2px_8px_rgba(0,0,0,0.02)]">
                          <div className="grid grid-cols-2 gap-8">
                            <div>
                              <label className="block text-[12px] font-bold text-slate-700 mb-2">진행 기간 (시작일 ~ 종료일)</label>
                              <div className="flex items-center gap-2">
                                <input type="date" className="flex-1 border border-slate-300 rounded p-2 text-[13px] outline-none focus:border-[#5c66f2]" defaultValue="2026-03-01" />
                                <span className="text-slate-400 font-medium">~</span>
                                <input type="date" className="flex-1 border border-slate-300 rounded p-2 text-[13px] outline-none focus:border-[#5c66f2]" defaultValue="2026-03-31" />
                              </div>
                            </div>
                            <div>
                              <label className="block text-[12px] font-bold text-slate-700 mb-2">반복 요일 선택</label>
                              <div className="flex items-center gap-1.5">
                                {['일', '월', '화', '수', '목', '금', '토'].map(day => (
                                  <button
                                    key={day}

                                    className={`w-9 h-9 rounded-full text-[13px] font-bold transition-colors shadow-sm border ${
                                      selectedDays.includes(day) 
                                      ? 'bg-[#5c66f2] text-white border-[#5c66f2]' 
                                      : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'

                                  >
                                    {day}
                                  </button>
                                ))}
                              </div>
                            </div>
                          </div>

                          <div className="grid grid-cols-3 gap-6">
                            <div>
                              <label className="block text-[12px] font-bold text-slate-700 mb-2">공통 진행 시간</label>

                                <input type="time" className="flex-1 border border-slate-300 rounded p-2 text-[13px] outline-none focus:border-[#5c66f2]" defaultValue="22:00" />
                                <span className="text-slate-400 font-medium">~</span>
                                <input type="time" className="flex-1 border border-slate-300 rounded p-2 text-[13px] outline-none focus:border-[#5c66f2]" defaultValue="23:00" />
                              </div>
                            </div>
                            <div>
                              <label className="block text-[12px] font-bold text-slate-700 mb-2">공통 정원(명)</label>

                            </div>
                            <div>
                              <label className="block text-[12px] font-bold text-slate-700 mb-2">공통 그룹 제한</label>
                              <input type="text" className="w-full border border-slate-300 rounded p-2 text-[13px] outline-none focus:border-[#5c66f2]" placeholder="제한 없음" />
                            </div>
                          </div>

                          <button onClick={handleBatchGenerate} className="w-full py-3 bg-[#111827] text-white rounded-lg font-bold text-[14px] flex items-center justify-center gap-2 hover:bg-black transition-colors shadow-md">

                          <div className="text-[12px] text-slate-500 mb-3">생성된 회차 리스트 (일괄 생성 시 하단에 표출됩니다)</div>

                                <tr>
                                  <th className="py-4 px-3 font-normal text-left w-14 text-slate-500">회차</th>
                                  <th className="py-4 px-2 font-normal text-left text-slate-500">교육 일자</th>
                                  <th className="py-4 px-2 font-normal text-left text-slate-500">교육 시간</th>
                                  <th className="py-4 px-2 font-normal text-left text-slate-500">장소</th>
                                  <th className="py-4 px-2 font-normal text-center w-20 text-slate-500">정원(명)</th>
                                  <th className="py-4 px-2 font-normal text-center w-20 text-slate-500">그룹 제한</th>
                                </tr>
                              </thead>
                              <tbody>

                                  sessions.map((s, i) => (
                                    <tr key={s.id} className="border-b border-slate-100 last:border-0 hover:bg-slate-50 transition-colors animate-fadeIn">
                                      <td className="py-3 px-3 font-bold text-slate-800">{i + 1}회차</td>
                                      <td className="py-3 px-2 font-medium">{s.date}</td>
                                      <td className="py-3 px-2 text-slate-500">{s.startTime} ~ {s.endTime}</td>
                                      <td className="py-3 px-2 text-slate-500">{s.place || '기본 장소'}</td>
                                      <td className="py-3 px-2 text-center font-medium">{s.capacity}</td>
                                      <td className="py-3 px-2 text-center text-slate-400">-</td>
                                    </tr>

                                  </tr>

                              </tbody>
                            </table>
                          </div>
                        </div>
                      </div>

                          <div>
                            {sessionRule === 'single' ? '학습자가 단 1개만 고를 수 있도록 선택지(일정)를 하나씩 추가해주세요.' : '하단에 생성된 전체 회차 중, 학습자가 조합하여 선택할 수 있는 풀(Pool)을 구성해주세요.'}
                          </div>
                        </div>

                        <div className="text-[13px] font-bold text-slate-800 mb-4">선택지(회차) 생성 및 정원 할당</div>
                        
                        <div className="border border-slate-200 rounded-lg overflow-x-auto bg-white">
                          <table className="w-full text-[12px] min-w-[700px] text-slate-600">
                            <thead className="bg-slate-50 border-b border-slate-200">
                              <tr>
                                <th className="py-4 px-3 font-normal text-center w-14 text-slate-500">선택</th>
                                <th className="py-4 px-2 font-normal text-left text-slate-500">교육 일자</th>
                                <th className="py-4 px-2 font-normal text-left text-slate-500">교육 시간</th>
                                <th className="py-4 px-2 font-normal text-left text-slate-500">장소 (선택)</th>
                                <th className="py-4 px-2 font-normal text-center w-20 text-slate-500">정원(명)</th>
                                <th className="py-4 px-2 font-normal text-center w-16 text-slate-500 leading-tight">그룹<br/>제한</th>
                                <th className="py-4 px-2 font-normal text-center w-10"></th>
                              </tr>
                            </thead>
                            <tbody>
                              {sessions.map((session, index) => (
                                <tr key={session.id} className="border-b border-slate-100 last:border-0 hover:bg-slate-50 transition-colors">
                                  <td className="py-4 px-3 font-bold text-slate-900 text-center text-[14px] leading-tight">{index + 1}</td>
                                  <td className="py-4 px-2">
                                    <input type="date" value={session.date} onChange={(e) => handleSessionChange(session.id, 'date', e.target.value)} className="w-full border border-slate-200 rounded px-2 py-2 text-[13px] outline-none focus:border-[#5c66f2] text-slate-700 bg-white" />
                                  </td>
                                  <td className="py-4 px-2">
                                    <div className="flex items-center gap-1.5 min-w-[180px]">
                                      <input type="time" value={session.startTime} onChange={(e) => handleSessionChange(session.id, 'startTime', e.target.value)} className="w-full border border-slate-200 rounded px-2 py-2 text-[13px] outline-none focus:border-[#5c66f2] text-slate-700 bg-white" />
                                      <span className="text-slate-400">-</span>
                                      <input type="time" value={session.endTime} onChange={(e) => handleSessionChange(session.id, 'endTime', e.target.value)} className="w-full border border-slate-200 rounded px-2 py-2 text-[13px] outline-none focus:border-[#5c66f2] text-slate-700 bg-white" />
                                    </div>
                                  </td>
                                  <td className="py-4 px-2">
                                    <input type="text" value={session.place} onChange={(e) => handleSessionChange(session.id, 'place', e.target.value)} placeholder="기본 장소" className="w-full min-w-[100px] border border-slate-200 rounded px-2 py-2 text-[13px] outline-none focus:border-[#5c66f2] text-slate-700 bg-white" />
                                  </td>
                                  <td className="py-4 px-2 text-center">
                                    <input type="number" value={session.capacity} onChange={(e) => handleSessionChange(session.id, 'capacity', parseInt(e.target.value))} className="w-16 border border-slate-200 rounded px-1 py-2 text-[13px] text-center outline-none focus:border-[#5c66f2] text-slate-700 mx-auto block bg-white" />
                                  </td>
                                  <td className="py-4 px-2 text-center">
                                    <button className="w-8 h-8 border border-slate-200 rounded bg-white hover:bg-slate-50 transition-colors mx-auto focus:border-[#5c66f2] outline-none"></button>
                                  </td>
                                  <td className="py-4 px-2 text-center">
                                    <button onClick={() => handleRemoveSession(session.id)} className="text-slate-400 hover:text-red-500 transition-colors focus:outline-none"><Trash2 size={16} className="mx-auto" /></button>
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                          <button onClick={handleAddSession} className="w-full py-3.5 bg-white hover:bg-slate-50 border-t border-slate-200 text-slate-500 text-[13px] font-bold transition-colors flex items-center justify-center gap-2">
                            <Plus size={16}/> 선택 일정(회차) 추가하기
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                  <h3 className="text-[16px] font-bold text-slate-800 mb-5">코스 상세 옵션</h3>
                  <div className="grid grid-cols-1 gap-y-1 divide-y divide-slate-50">
                    <div className="flex justify-between items-center py-3">
                      <div>
                        <div className="text-[14px] font-bold text-slate-800">수강 시간 확인을 위한 자리 비움 모니터링</div>
                        <div className="text-[12px] text-slate-400 mt-0.5">모니터링 안 함</div>
                      </div>
                      <Toggle active={false} />
                    </div>
                    <div className="flex justify-between items-center py-3">
                      <div>
                        <div className="text-[14px] font-bold text-slate-800">커리큘럼별 공개일 설정</div>
                        <div className="text-[12px] text-slate-400 mt-0.5">수강 시작 시 모든 커리큘럼 공개</div>
                      </div>
                      <Toggle active={false} />
                    </div>
                    <div className="flex justify-between items-center py-3">
                      <div>
                        <div className="text-[14px] font-bold text-slate-800">페이지 순서대로 수강하기</div>
                        <div className="text-[12px] text-slate-400 mt-0.5">수강 순서 자유</div>
                      </div>
                      <Toggle active={false} />
                    </div>
                    <div className="flex justify-between items-center py-3">
                      <div>
                        <div className="text-[14px] font-bold text-slate-800">수강 전 코스 정보 보기</div>
                        <div className="text-[12px] text-slate-400 mt-0.5">코스 목록 → 수강</div>
                      </div>
                      <Toggle active={false} />
                    </div>
                  </div>
                </div>

              <div className="p-5 border-b border-slate-100 bg-[#fbfcfd] flex justify-between items-center">
                <h3 className="font-bold text-slate-900 text-[14px] flex items-center gap-2">커리큘럼 로드맵</h3>
                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Roadmap Index</span>
              </div>

              {/* 분기: 순수 오프라인 코스일 경우 자동 구성 모드 노출 */}
              {courseType === 'offline' ? (
                <div className="flex-1 overflow-y-auto custom-scrollbar flex flex-col">
                  <div className="p-5">
                    <div className="bg-red-50 border border-red-100 rounded-xl p-5 mb-8 text-center shadow-sm">
                      <div className="w-12 h-12 bg-white text-red-500 rounded-full flex items-center justify-center mx-auto mb-3 shadow-sm">
                        <MapPin size={24} />
                      </div>
                      <h4 className="font-bold text-slate-800 text-[14px] mb-2">순수 오프라인 자동 커리큘럼</h4>
                      <p className="text-[11px] text-slate-500 leading-relaxed mb-4">
                        순수 오프라인 코스는 별도의 목차 조립 없이<br/>좌측에서 설정한 <strong>회차 데이터가 로드맵으로 자동 구성</strong>됩니다.
                      </p>
                      <div className="pt-4 border-t border-red-200/50">
                        <p className="text-[10px] text-slate-400 mb-2">온라인 사전/사후 학습(VOD, 문서 등)을 추가하시겠습니까?</p>
                        <button 
                          onClick={() => setCourseType('blended')}
                          className="w-full py-2 bg-white border border-[#5c66f2] text-[#5c66f2] rounded-lg text-[12px] font-bold hover:bg-blue-50 transition-colors"
                        >
                          블렌디드 코스로 전환하기
                        </button>
                      </div>
                    </div>

                    <div className="flex-1">
                      {/* 타임라인 UI 적용 */}
                      <div className="relative">
                        <div className="flex items-center gap-3 mb-4 group">
                          <div className="w-6 h-6 bg-slate-900 text-white rounded text-[10px] font-bold flex items-center justify-center shrink-0">01</div>
                          <h4 className="text-[13px] font-bold text-slate-900 truncate flex-1">현장 교육 참석 및 출석 체크</h4>
                          <span className="text-[10px] text-[#5c66f2] bg-blue-50 px-2 py-0.5 rounded-full font-bold">{sessions.length} Sessions</span>
                        </div>

                        <div className="ml-3 pl-6 border-l-2 border-slate-100 space-y-4 relative pb-4">
                          {sessions.length > 0 && (sessions[0].id < 100 || sessionRule === 'all') ? sessions.map((session, index) => (
                            <div key={session.id} className="relative group cursor-default animate-fadeIn">
                              <div className="absolute -left-[31px] top-1/2 -translate-y-1/2 w-2.5 h-2.5 bg-white border-2 border-green-400 rounded-full z-10"></div>
                              <div className="bg-white border border-slate-200 p-3.5 rounded-lg hover:border-green-300 transition-all shadow-[0_2px_4px_rgba(0,0,0,0.02)]">
                                <div className="flex items-center gap-3">
                                  <div className="w-8 h-8 bg-green-50 text-green-600 rounded flex items-center justify-center shrink-0">
                                    <MapPin size={16} />
                                  </div>
                                  <div className="flex-1 overflow-hidden">
                                    <div className="text-[12px] font-bold text-slate-800">
                                      {sessionRule === 'single' ? `선택 옵션 ${index + 1}` : `회차 ${index + 1}`} : 오프라인 교육 참석
                                    </div>
                                    <div className="text-[10px] text-slate-400 mt-1 flex items-center gap-2 uppercase tracking-tighter">
                                      <span>{session.date ? `${session.date} ${session.startTime}~${session.endTime}` : '일정 미입력'}</span>
                                      {session.place && (
                                        <>
                                          <span className="w-1 h-1 bg-slate-300 rounded-full"></span>
                                          <span>{session.place}</span>
                                        </>
                                      )}
                                    </div>
                                  </div>
                                  <span className={`text-[10px] font-bold px-3 py-1.5 rounded-[4px] border ${sessionRule === 'all' ? 'bg-[#eef0ff] text-[#5c66f2] border-[#d6dbff]' : 'bg-slate-50 text-slate-500 border-slate-200'}`}>
                                    {sessionRule === 'all' ? '필수' : '선택'}
                                  </span>
                                </div>
                                {/* 이수 조건 요약 (전체 필수형일 때만 노출) */}
                                {sessionRule === 'all' && (

                                    <span className="font-bold text-[#5c66f2]">이수 조건</span>
                                    <span>출석 처리 완료 시 이수</span>
                                  </div>
                                )}
                              </div>
                            </div>
                          )) : (
                            <div className="text-center py-8 text-slate-400 text-[11px] bg-slate-50 rounded-lg border border-dashed border-slate-200">
                              설정된 회차가 없습니다.<br/>좌측에서 회차를 {sessionRule === 'all' ? '생성' : '추가'}해주세요.
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* 오프라인 전용 하단 상태 요약바 */}
                  <div className="mt-auto p-5 border-t border-slate-100 bg-[#fbfcfd]">
                    <div className="flex items-center justify-between text-[12px] font-bold text-slate-600">
                      <span className="flex items-center gap-2"><CheckCircle size={16} className="text-green-500" /> 좌측 회차 연동 완료</span>
                      <span className="text-[#5c66f2]">총 {sessions.length}개</span>
                    </div>
                  </div>
                </div>
              ) : (
                /* 분기: 온라인 또는 블렌디드 코스일 경우 기존의 자유 편집 모드 노출 */
                <>
                  <div className="flex-1 overflow-y-auto custom-scrollbar p-5">
                    <div className="space-y-6">
                      {/* Module 1 */}
                      <div className="relative">
                        <div className="flex items-center gap-3 mb-4 group">
                          <div className="w-6 h-6 bg-slate-900 text-white rounded text-[10px] font-bold flex items-center justify-center shrink-0">01</div>
                          <h4 className="text-[13px] font-bold text-slate-900 truncate flex-1">오리엔테이션 및 기초 학습</h4>
                          <Settings2 size={14} className="text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer hover:text-slate-600" />
                        </div>

                        <div className="ml-3 pl-6 border-l-2 border-slate-100 space-y-3 relative">
                          <div className="relative group">
                            <div className="absolute -left-[31px] top-6 -translate-y-1/2 w-2.5 h-2.5 bg-white border-2 border-blue-500 rounded-full z-10 group-hover:scale-125 transition-transform"></div>
                            <div className="bg-slate-50 border border-slate-200 p-3 rounded-lg flex flex-col gap-2 hover:border-blue-300 hover:shadow-sm transition-all">
                              <div className="flex items-center gap-3">
                                <div className="w-8 h-8 bg-blue-100 text-blue-600 rounded flex items-center justify-center shrink-0"><Video size={16} /></div>
                                <div className="flex-1 overflow-hidden">
                                  <div className="text-[11px] font-bold text-slate-700 truncate">신입사원 환영사 및 비전 공유</div>
                                  <div className="text-[9px] text-slate-400 mt-0.5 uppercase">Video · 15:00</div>
                                </div>
                                <ItemRequiredToggle initial={reqStates.item1} onToggle={(s) => setReqStates({...reqStates, item1: s})} />
                              </div>
                              
                              {reqStates.item1 && (
                                <div onClick={() => setEditingItem({ type: 'video', title: '신입사원 환영사 및 비전 공유' })} className="bg-white border border-slate-200 rounded p-2 flex items-center justify-between cursor-pointer hover:border-blue-400 group/settings transition-colors">
                                  <div className="text-[10px] text-slate-500 flex items-center gap-2">
                                    <span className="font-bold text-[#5c66f2]">이수 조건</span>
                                    <span>진도율 100% · 최소 15분</span>
                                    <span className="text-slate-300">|</span>
                                    <span>스킵 방지 ON</span>
                                  </div>
                                  <Settings2 size={12} className="text-slate-400 group-hover/settings:text-[#5c66f2]" />
                                </div>
                              )}
                            </div>
                          </div>

                          <div className="relative group">
                            <div className="absolute -left-[31px] top-6 -translate-y-1/2 w-2.5 h-2.5 bg-white border-2 border-slate-300 rounded-full z-10 group-hover:border-blue-500 transition-colors"></div>
                            <div className="bg-white border border-slate-200 p-3 rounded-lg flex flex-col gap-2 hover:border-blue-300 transition-all">
                              <div className="flex items-center gap-3">
                                <div className="w-8 h-8 bg-slate-100 text-slate-400 rounded flex items-center justify-center shrink-0"><FileText size={16} /></div>
                                <div className="flex-1 overflow-hidden">
                                  <div className="text-[11px] font-bold text-slate-700 truncate">사내 핵심가치 가이드북</div>
                                  <div className="text-[9px] text-slate-400 mt-0.5 uppercase">Document · PDF</div>
                                </div>
                                <ItemRequiredToggle initial={reqStates.item2} onToggle={(s) => setReqStates({...reqStates, item2: s})} />
                              </div>

                              {reqStates.item2 && (
                                <div onClick={() => setEditingItem({ type: 'document', title: '사내 핵심가치 가이드북' })} className="bg-white border border-slate-200 rounded p-2 flex items-center justify-between cursor-pointer hover:border-blue-400 group/settings transition-colors">
                                  <div className="text-[10px] text-slate-500 flex items-center gap-2">
                                    <span className="font-bold text-[#5c66f2]">이수 조건</span>
                                    <span>열람 필수 · 최소 5분</span>
                                  </div>
                                  <Settings2 size={12} className="text-slate-400 group-hover/settings:text-[#5c66f2]" />
                                </div>
                              )}
                            </div>
                          </div>
                        </div>
                      </div>

                      {/* Module 2 (Blended 전용 Hook) */}
                      {courseType === 'blended' && (
                        <div className="relative">
                          <div className="flex items-center gap-3 mb-4 group">
                            <div className="w-6 h-6 bg-slate-900 text-white rounded text-[10px] font-bold flex items-center justify-center shrink-0">02</div>
                            <h4 className="text-[13px] font-bold text-slate-900 truncate flex-1">현장 실습 및 네트워킹</h4>
                            <Settings2 size={14} className="text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer" />
                          </div>
                          <div className="ml-3 pl-6 border-l-2 border-slate-100 space-y-3 relative">
                            <div className="relative group cursor-pointer">
                              <div className="absolute -left-[31px] top-1/2 -translate-y-1/2 w-2.5 h-2.5 bg-white border-2 border-green-500 rounded-full z-10"></div>
                              <div className="bg-green-50/50 border border-green-200 p-3 rounded-lg flex items-center gap-3">
                                <div className="w-8 h-8 bg-green-100 text-green-600 rounded flex items-center justify-center shrink-0"><MapPin size={16} /></div>
                                <div className="flex-1 overflow-hidden">
                                  <div className="text-[11px] font-bold text-slate-800">현장 출석 체크</div>
                                  <div className="text-[9px] text-green-600 mt-0.5 font-bold uppercase tracking-tighter">Offline Session Linked</div>
                                </div>
                                <ItemRequiredToggle initial={true} />
                              </div>
                            </div>
                          </div>
                        </div>
                      )}

                      {/* Dynamic Modules (사용자가 추가한 모듈) */}
                      {customModules.map((mod, index) => {
                        const moduleNumber = (courseType === 'blended' ? 3 : 2) + index;
                        return (
                          <div key={mod.id} className="relative mt-6 animate-fadeIn">
                            <div className="flex items-center gap-3 mb-4 group">
                              <div className="w-6 h-6 bg-slate-900 text-white rounded text-[10px] font-bold flex items-center justify-center shrink-0">
                                {String(moduleNumber).padStart(2, '0')}
                              </div>
                              <input
                                type="text"
                                className="text-[13px] font-bold text-slate-900 bg-transparent flex-1 outline-none border-b border-transparent focus:border-[#5c66f2] hover:border-slate-300 transition-colors pb-0.5"
                                defaultValue={mod.title}
                                placeholder="모듈 이름을 입력하세요"
                              />
                              <button 
                                onClick={() => setCustomModules(customModules.filter(m => m.id !== mod.id))} 
                                className="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"
                                title="모듈 삭제"
                              >
                                <Trash2 size={14} />
                              </button>
                            </div>
                            <div className="ml-3 pl-6 border-l-2 border-slate-100 relative">
                              <div className="bg-slate-50 border border-dashed border-slate-300 rounded-lg p-4 flex flex-col items-center justify-center text-center gap-3">
                                <span className="text-[11px] font-bold text-slate-400">등록된 학습 항목이 없습니다</span>
                                <button onClick={() => setLibraryModalOpen(true)} className="text-[11px] bg-white border border-slate-200 text-slate-600 px-3 py-1.5 rounded shadow-sm font-bold hover:text-[#5c66f2] hover:border-[#5c66f2] transition-colors flex items-center gap-1">
                                    <Plus size={12}/> 항목 매핑하기
                                </button>
                              </div>
                            </div>
                          </div>
                        );
                      })}

                    </div>

                    <button 
                      onClick={() => {
                        const nextNumber = (courseType === 'blended' ? 3 : 2) + customModules.length;
                        setCustomModules([...customModules, { id: Date.now(), title: `새로운 챕터/모듈 ${nextNumber}` }]);
                      }} 
                      className="w-full mt-8 py-3 border-2 border-dashed border-slate-200 rounded-xl text-[11px] font-bold text-slate-400 hover:border-blue-300 hover:text-blue-500 hover:bg-blue-50/30 transition-all flex flex-col items-center gap-1 group"
                    >
                      <Plus size={16} className="group-hover:scale-110 transition-transform" />
                      <span>새로운 챕터/모듈 추가</span>
                    </button>
                  </div>

                  {/* Bottom Quick Tools */}
                  <div className="p-5 border-t border-slate-100 bg-[#fbfcfd]">
                    <div className="flex gap-2">
                      <button onClick={() => setLibraryModalOpen(true)} className="flex-1 py-2.5 bg-white border border-slate-200 rounded-lg text-[10px] font-bold text-slate-600 hover:border-blue-500 hover:text-blue-600 shadow-sm transition-all flex items-center justify-center gap-1.5">
                        <Plus size={14} /> 학습 항목 추가
                      </button>
                      <button className="flex-1 py-2.5 bg-white border border-slate-200 rounded-lg text-[10px] font-bold text-slate-600 hover:border-blue-500 hover:text-blue-600 shadow-sm transition-all flex items-center justify-center gap-1.5">
                        <RotateCcw size={14} /> 기존 코스 링크
                      </button>
                    </div>
                  </div>
                </>
              )}
            </aside>
          </main>

          {/* 추가: 학습 요소 상세 설정 모달 */}
          {editingItem && (
            <div className="fixed inset-0 bg-slate-900/60 z-[110] flex items-center justify-center animate-fadeIn p-10">
              <div className="bg-white w-full max-w-lg rounded-xl shadow-2xl flex flex-col overflow-hidden">
                <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                  <h2 className="text-[15px] font-bold flex items-center gap-2 text-slate-800">
                    <Settings2 size={18} className="text-[#5c66f2]" /> 학습 요소 상세 설정
                  </h2>
                  <button onClick={() => setEditingItem(null)} className="text-slate-400 hover:text-slate-900"><X size={20}/></button>
                </div>
                
                <div className="p-6 bg-white overflow-y-auto custom-scrollbar max-h-[60vh]">
                  <div className="mb-6">
                    <div className="text-[11px] font-bold text-slate-400 uppercase mb-1">대상 항목</div>
                    <div className="text-[14px] font-bold text-slate-800">{editingItem.title}</div>
                  </div>

                  <div className="space-y-6">
                    {/* 이수 기준 설정 */}
                    <div>
                      <h3 className="text-[13px] font-bold text-slate-800 mb-3 border-b border-slate-100 pb-2">이수 기준 (필수 항목)</h3>
                      <div className="space-y-4">
                        <div className="flex items-center justify-between">
                          <label className="text-[12px] font-semibold text-slate-600">진도율 (열람율) 기준</label>
                          <div className="flex items-center gap-2">
                            <input type="number" defaultValue="100" className="w-16 border border-slate-200 rounded p-1.5 text-[12px] text-center outline-none focus:border-[#5c66f2]" />
                            <span className="text-[12px] text-slate-500">% 이상</span>
                          </div>
                        </div>
                        <div className="flex items-center justify-between">
                          <label className="text-[12px] font-semibold text-slate-600">최소 학습(체류) 시간</label>
                          <div className="flex items-center gap-2">
                            <input type="number" defaultValue="15" className="w-16 border border-slate-200 rounded p-1.5 text-[12px] text-center outline-none focus:border-[#5c66f2]" />
                            <span className="text-[12px] text-slate-500">분 이상</span>
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* 비디오 전용 옵션 */}
                    {editingItem.type === 'video' && (
                      <div>
                        <h3 className="text-[13px] font-bold text-slate-800 mb-3 border-b border-slate-100 pb-2">동영상 재생 제어</h3>
                        <div className="space-y-4">
                          <div className="flex items-center justify-between">
                            <div>
                              <div className="text-[12px] font-semibold text-slate-600">비디오 스킵(건너뛰기) 방지</div>
                              <div className="text-[10px] text-slate-400 mt-0.5">학습자가 임의로 영상을 앞으로 탐색하는 것을 차단합니다.</div>
                            </div>
                            <Toggle active={true} />
                          </div>
                          <div className="flex items-center justify-between">
                            <div>
                              <div className="text-[12px] font-semibold text-slate-600">배속 재생 허용</div>
                              <div className="text-[10px] text-slate-400 mt-0.5">최대 2.0x 배속 재생 기능을 활성화합니다.</div>
                            </div>
                            <Toggle active={false} />
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                </div>

                <div className="p-5 border-t border-slate-100 bg-slate-50 flex justify-end gap-2">
                  <button onClick={() => setEditingItem(null)} className="px-5 py-2 border border-slate-300 rounded font-bold text-[12px] hover:bg-white text-slate-600">취소</button>
                  <button onClick={() => setEditingItem(null)} className="px-5 py-2 bg-[#5c66f2] text-white rounded font-bold text-[12px] hover:bg-[#4a54e1] shadow-sm">설정 저장</button>
                </div>
              </div>
            </div>
          )}

          {/* Library Modal */}
          {isLibraryModalOpen && (
            <div className="fixed inset-0 bg-slate-900/60 z-[100] flex items-center justify-center animate-fadeIn p-10">
              <div className="bg-white w-full max-w-4xl h-[600px] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
                <div className="p-6 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                  <h2 className="text-lg font-bold flex items-center gap-2">
                    <Layers className="text-[#5c66f2]" /> 학습 항목 추가 (콘텐츠 보관함)
                  </h2>
                  <button onClick={() => { setLibraryModalOpen(false); setLibraryCategory('all'); }} className="text-slate-400 hover:text-slate-900"><X size={24}/></button>
                </div>
                
                {/* Modal Body - Split View */}
                <div className="flex-1 flex overflow-hidden">
                  
                  {/* Left Sidebar - Categories */}
                  <div className="w-48 border-r border-slate-200 bg-slate-50 p-4">
                    <ul className="space-y-1">
                      <li><button onClick={() => setLibraryCategory('all')} className={`w-full text-left px-3 py-2 rounded text-[13px] ${libraryCategory === 'all' ? 'bg-blue-50 text-blue-700 font-bold' : 'text-slate-600 hover:bg-slate-100 font-semibold'}`}>전체 항목</button></li>
                      <li><button onClick={() => setLibraryCategory('video')} className={`w-full text-left px-3 py-2 rounded text-[13px] ${libraryCategory === 'video' ? 'bg-blue-50 text-blue-700 font-bold' : 'text-slate-600 hover:bg-slate-100 font-semibold'}`}>동영상 (VOD)</button></li>
                      <li><button onClick={() => setLibraryCategory('document')} className={`w-full text-left px-3 py-2 rounded text-[13px] ${libraryCategory === 'document' ? 'bg-blue-50 text-blue-700 font-bold' : 'text-slate-600 hover:bg-slate-100 font-semibold'}`}>문서 (PDF)</button></li>
                      <li><button onClick={() => setLibraryCategory('exam')} className={`w-full text-left px-3 py-2 rounded text-[13px] ${libraryCategory === 'exam' ? 'bg-blue-50 text-blue-700 font-bold' : 'text-slate-600 hover:bg-slate-100 font-semibold'}`}>시험/퀴즈</button></li>
                      <li><button onClick={() => setLibraryCategory('survey')} className={`w-full text-left px-3 py-2 rounded text-[13px] ${libraryCategory === 'survey' ? 'bg-blue-50 text-blue-700 font-bold' : 'text-slate-600 hover:bg-slate-100 font-semibold'}`}>설문</button></li>
                    </ul>
                  </div>

                  {/* Right Content - Item List */}
                  <div className="flex-1 p-6 flex flex-col">
                    {/* Search Bar */}
                    <div className="flex gap-2 mb-6">
                      <div className="relative flex-1">
                        <Search size={16} className="absolute left-3 top-2.5 text-slate-400" />
                        <input type="text" className="w-full pl-9 pr-4 py-2 border border-slate-300 rounded-lg focus:border-[#5c66f2] focus:outline-none text-[13px]" placeholder="보관함 내 학습 항목 검색" />
                      </div>
                      <button className="bg-slate-800 text-white px-5 py-2 rounded-lg text-[13px] font-bold hover:bg-slate-900">검색</button>
                    </div>

                    {/* Item List */}
                    <div className="flex-1 overflow-y-auto custom-scrollbar space-y-3 pr-2">
                      {filteredLibraryItems.length > 0 ? filteredLibraryItems.map((item, idx) => (
                        <div key={idx} className="flex items-center justify-between p-4 border border-slate-200 rounded-lg hover:border-[#5c66f2] hover:bg-[#f8f9ff] transition-all cursor-pointer group">
                          <div className="flex items-center gap-4">
                            <div className={`w-10 h-10 rounded-lg flex items-center justify-center shrink-0 ${
                              item.type === 'video' ? 'bg-blue-100 text-blue-600' : 
                              item.type === 'document' ? 'bg-slate-100 text-slate-600' : 
                              item.type === 'exam' ? 'bg-indigo-100 text-indigo-600' :
                              'bg-purple-100 text-purple-600'
                            }`}>
                              {item.type === 'video' ? <Video size={20} /> : 
                               item.type === 'document' ? <FileText size={20} /> : 
                               <List size={20} />}
                            </div>
                            <div>
                              <div className="font-bold text-[13px] text-slate-800 group-hover:text-[#5c66f2] transition-colors">{item.title}</div>
                              <div className="text-[11px] text-slate-400 mt-1 flex gap-3">
                                <span className="uppercase">{item.type}</span>
                                <span>{item.type === 'exam' || item.type === 'survey' ? '상세' : '재생시간'}: {item.time}</span>
                                <span>등록일: {item.date}</span>
                              </div>
                            </div>
                          </div>
                          <button className="px-4 py-1.5 border border-slate-300 rounded text-[12px] font-bold text-slate-600 group-hover:bg-[#5c66f2] group-hover:text-white group-hover:border-[#5c66f2] transition-all">
                            추가
                          </button>
                        </div>
                      )) : (
                        <div className="h-full flex flex-col items-center justify-center text-slate-400">
                           <Info size={32} className="mb-2 opacity-50"/>
                           <p className="text-[13px]">해당 카테고리에 등록된 항목이 없습니다.</p>
                        </div>
                      )}
                    </div>
                    
                    <div className="mt-6 pt-4 border-t border-slate-100 flex justify-between items-center">
                      <p className="text-[12px] text-slate-500">
                        {libraryCategory === 'exam' ? '원하는 시험/퀴즈가 없나요?' : 
                         libraryCategory === 'survey' ? '원하는 설문이 없나요?' :
                         '원하는 항목이 없나요?'}
                      </p>
                      <button className="flex items-center gap-2 px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-[13px] font-bold hover:bg-slate-200 transition-colors">
                        {libraryCategory === 'exam' ? <><Plus size={16} /> 새 시험 만들기</> :
                         libraryCategory === 'survey' ? <><Plus size={16} /> 새 설문 만들기</> :
                         <><UploadCloud size={16} /> PC에서 새 파일 업로드</>}
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
