<!DOCTYPE html>
<html>
<head>
    <title>인덱싱</title>
</head>
<body>
    <h1>인덱싱 페이지</h1>
    <button onclick="location.href='1.html'">1.html</button>
    <button onclick="location.href='2.html'">2.html</button>
    <button onclick="location.href='3.html'">3.html</button>
    
    <script>
        // 버튼을 동적으로 추가하는 함수
        function addButton(filename) {
            var newButton = document.createElement("button");
            newButton.textContent = filename;
            newButton.onclick = function() {
                location.href = filename;
            };
            document.body.appendChild(newButton);
        }

        // 추가할 파일 이름 목록
        var fileList = ["4.html", "5.html", "6.html"];

        // 파일 이름 목록을 순회하며 버튼 추가
        for (var i = 0; i < fileList.length; i++) {
            addButton(fileList[i]);
        }
    </script>
</body>
</html>
