<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오프라인 코스 — 시스템 데모</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', sans-serif;
      background: #0f172a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ══ 상단 데모 헤더 ══ */
    .demo-header {
      display: flex; align-items: center; gap: 14px;
      padding: 0 20px; height: 52px;
      background: #1e293b;
      border-bottom: 1px solid #0f172a;
      flex-shrink: 0;
    }
    .demo-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 800; color: #f1f5f9;
      white-space: nowrap;
    }
    .demo-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ef4444;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    .sep { width: 1px; height: 20px; background: #334155; flex-shrink: 0; }

    .scenario-label { font-size: 11px; font-weight: 700; color: #475569; white-space: nowrap; }

    .scenario-steps { display: flex; gap: 6px; }
    .step-btn {
      padding: 5px 14px; border-radius: 20px;
      border: 1px solid #334155; background: transparent;
      color: #64748b; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .step-btn:hover { background: #334155; color: #cbd5e1; }
    .step-btn.active { background: #5569ff; color: #fff; border-color: #5569ff; }

    .demo-hint {
      margin-left: auto;
      font-size: 12px; color: #64748b;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 400px; flex-shrink: 1;
    }

    /* ══ 메인 분할 ══ */
    .demo-main { flex: 1; display: flex; overflow: hidden; }

    /* ══ 공통 패널 ══ */
    .pane-label {
      height: 28px; padding: 0 14px;
      display: flex; align-items: center; gap: 8px;
      background: #161f30; border-bottom: 1px solid #0f172a;
      flex-shrink: 0;
    }
    .role-badge {
      padding: 2px 8px; border-radius: 4px;
      font-size: 10px; font-weight: 800; letter-spacing: 0.5px;
    }
    .role-badge.admin { background: #1e1b4b; color: #a5b4fc; }
    .role-badge.user  { background: #052e16; color: #86efac; }
    .pane-name { font-size: 11px; font-weight: 600; color: #475569; }

    /* ══ 관리자 패널 ══ */
    .admin-pane {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
    }
    .admin-content {
      flex: 1; position: relative; overflow: hidden;
    }
    .admin-content iframe {
      width: 100%; height: 100%; border: none; display: block;
    }

    /* ══ 학습자 패널 ══ */
    .user-pane {
      width: 430px; flex-shrink: 0;
      display: flex; flex-direction: column;
      background: #0a1120;
      border-left: 1px solid #0f172a;
    }
    .phone-area {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 10px 20px 16px;
    }
    .phone-wrapper {
      position: relative;
      width: 390px;
      height: 100%;
      max-height: 768px;
    }
    .phone-shell {
      width: 100%; height: 100%;
      border-radius: 36px;
      overflow: hidden;
      border: 8px solid #2d3a50;
      box-shadow: 0 0 0 1px #1e293b, inset 0 0 0 1px #3d4f6a, 0 28px 70px rgba(0,0,0,.65);
    }
    /* 노치 */
    .phone-shell::before {
      content: ''; position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 96px; height: 22px;
      background: #2d3a50; border-radius: 0 0 14px 14px; z-index: 10;
    }
    .phone-shell iframe {
      width: 100%; height: 100%; border: none; display: block;
    }

    /* ══ 콜아웃 핀 ══ */
    .pin-overlay {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 50;
    }
    .callout-pin {
      position: absolute;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pinIn 0.3s ease-out;
    }
    @keyframes pinIn {
      from { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
      to   { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
    }
    .callout-pin.pin-out {
      transition: opacity 0.4s, transform 0.4s;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.8);
    }
    .pin-dot {
      width: 14px; height: 14px; border-radius: 50%;
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); z-index: 2;
    }
    .pin-ring {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2.5px solid;
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: ping 1.1s ease-out infinite;
    }
    @keyframes ping {
      0%   { transform: translate(-50%,-50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(3.2); opacity: 0; }
    }
    .pin-label {
      position: absolute;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(10,17,32,0.95);
      color: #fff; padding: 5px 12px;
      border-radius: 8px; font-size: 11px; font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(0,0,0,.5);
      border: 1px solid rgba(255,255,255,.1);
    }
    .pin-label::after {
      content: '';
      position: absolute; top: 100%; left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: rgba(10,17,32,0.95);
    }

    /* ══ 하단 상태 바 ══ */
    .status-bars {
      display: flex; border-top: 1px solid #0f172a;
      flex-shrink: 0;
    }
    .status-bar {
      flex: 1; padding: 7px 16px;
      display: flex; align-items: center; gap: 8px;
      background: #161f30; min-height: 36px;
      transition: all 0.3s;
    }
    .status-bar + .status-bar { border-left: 1px solid #0f172a; }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .status-text {
      font-size: 11px; font-weight: 600; color: #64748b;
      line-height: 1.4;
    }
    .status-text strong { font-weight: 800; }
    .status-bar.highlight .status-text { color: #cbd5e1; }

    /* admin = blue, user = green */
    .status-bar.admin-bar .status-dot { background: #5569ff; }
    .status-bar.user-bar  .status-dot { background: #10B981; }
  </style>
</head>
<body>

<!-- ══ 헤더 ══ -->
<div class="demo-header">
  <div class="demo-title">
    <div class="demo-dot"></div>
    오프라인 코스 데모
  </div>
  <div class="sep"></div>
  <span class="scenario-label">시나리오</span>
  <div class="scenario-steps">
    <button class="step-btn active" onclick="runScenario(1,this)">① 기본 상태</button>
    <button class="step-btn" onclick="runScenario(2,this)">② 라이브 출석 시작</button>
    <button class="step-btn" onclick="runScenario(3,this)">③ 출석 종료</button>
  </div>
  <div class="demo-hint" id="hint-text">
    시나리오 버튼을 눌러 관리자·학습자 화면을 동시에 전환하세요
  </div>
</div>

<!-- ══ 메인 ══ -->
<div class="demo-main">

  <!-- 관리자 -->
  <div class="admin-pane">
    <div class="pane-label">
      <span class="role-badge admin">ADMIN</span>
      <span class="pane-name">관리자 — 수강 관리</span>
    </div>
    <div class="admin-content" id="admin-content">
      <iframe src="admin1-1.html" id="admin-frame" title="관리자 화면"></iframe>
      <div class="pin-overlay" id="admin-pins"></div>
    </div>
  </div>

  <!-- 학습자 -->
  <div class="user-pane">
    <div class="pane-label">
      <span class="role-badge user">USER</span>
      <span class="pane-name">학습자 — MY 페이지</span>
    </div>
    <div class="phone-area">
      <div class="phone-wrapper" id="phone-wrapper">
        <div class="phone-shell">
          <iframe src="user-my.html" id="user-frame" title="학습자 화면"></iframe>
        </div>
        <div class="pin-overlay" id="user-pins"></div>
      </div>
    </div>
  </div>

</div>

<!-- ══ 하단 상태 바 ══ -->
<div class="status-bars">
  <div class="status-bar admin-bar" id="admin-status">
    <div class="status-dot"></div>
    <div class="status-text" id="admin-status-text">대기 중</div>
  </div>
  <div class="status-bar user-bar" id="user-status">
    <div class="status-dot"></div>
    <div class="status-text" id="user-status-text">대기 중</div>
  </div>
</div>

<script>
const DEMO_CH = new BroadcastChannel('offline-demo');

/* ══ 시나리오 정의 ══
 * adminPins / userPins:
 *   x, y = 해당 오버레이 컨테이너 기준 위치 (%)
 *   label = 표시 텍스트
 *   color = 핀 색상
 *   delay = 표시 딜레이(ms)
 *
 * admin-pins 오버레이: admin1-1.html iframe 전체 영역 위
 * user-pins  오버레이: phone-wrapper (390px × height) 위
 *
 * ─ admin1-1.html 레이아웃 참고 ─
 *   전체 헤더 ~52px → 사이드바 210px / 메인 콘텐츠 영역
 *   요약|수강|출석|설문 탭 y≈13%, 출석 탭 x≈36%
 *   라이브 출석 모드 버튼(우측): y≈21%, x≈83%
 *   라이브 모드 종료 버튼(좌상단): y≈11%, x≈6%
 *
 * ─ user-my.html TODAY 히어로 레이아웃 참고 ─
 *   QR 출석 체크인 버튼: y≈37%, x≈50%
 *   토스트 영역(하단): y≈82%
 */
const SCENARIOS = {
  1: {
    hint: '기본 상태 — 관리자 <strong>요약 탭</strong> · 학습자 <strong>일반 수강 목록</strong>',
    broadcast: 'SCENARIO_1',
    adminPins: [],
    userPins: [],
    adminStatus: '요약 탭으로 초기화',
    userStatus: '일반 수강 목록 (D-3)',
  },
  2: {
    hint: '관리자가 <strong style="color:#a5b4fc;">출석 탭 → 라이브 출석 모드</strong>를 시작하면 학습자 화면이 실시간으로 반응합니다',
    broadcast: 'SCENARIO_2',
    adminPins: [
      { label: '① 출석 탭 클릭', x: '36%', y: '13%', color: '#5569ff', delay: 300 },
      { label: '② 라이브 출석 모드 클릭', x: '83%', y: '21%', color: '#5569ff', delay: 1100 },
    ],
    userPins: [
      { label: 'TODAY 뷰 전환 + QR 활성화', x: '50%', y: '38%', color: '#10B981', delay: 1800 },
    ],
    adminStatus: '① 출석 탭 진입 → ② <strong>라이브 출석 모드</strong> 버튼 클릭',
    userStatus: '<strong>TODAY 뷰</strong>로 자동 전환 — QR 출석 버튼 활성화',
  },
  3: {
    hint: '관리자가 <strong style="color:#a5b4fc;">라이브 모드 종료</strong>를 클릭하면 학습자에게 종료 알림이 전달됩니다',
    broadcast: 'SCENARIO_3',
    adminPins: [
      { label: '라이브 모드 종료 클릭', x: '6%', y: '11%', color: '#5569ff', delay: 200 },
    ],
    userPins: [
      { label: '종료 알림 수신', x: '50%', y: '82%', color: '#10B981', delay: 700 },
    ],
    adminStatus: '<strong>라이브 모드 종료</strong> 클릭',
    userStatus: '<strong>출석 체크 종료</strong> 알림 수신',
  },
};

/* ══ 핀 렌더링 ══ */
function clearPins(containerId) {
  document.getElementById(containerId).innerHTML = '';
}

function addPin(containerId, { label, x, y, color = '#5569ff', delay = 0 }) {
  setTimeout(() => {
    const container = document.getElementById(containerId);
    if (!container) return;
    const pin = document.createElement('div');
    pin.className = 'callout-pin';
    pin.style.left = x;
    pin.style.top = y;
    pin.innerHTML = `
      <div class="pin-dot" style="background:${color}"></div>
      <div class="pin-ring" style="border-color:${color}"></div>
      <div class="pin-label">${label}</div>
    `;
    container.appendChild(pin);
    setTimeout(() => {
      pin.classList.add('pin-out');
      setTimeout(() => pin.remove(), 450);
    }, 3800);
  }, delay);
}

/* ══ 상태 바 업데이트 ══ */
function setStatus(adminText, userText) {
  document.getElementById('admin-status-text').innerHTML = adminText;
  document.getElementById('user-status-text').innerHTML = userText;
  document.getElementById('admin-status').classList.add('highlight');
  document.getElementById('user-status').classList.add('highlight');
}

/* ══ 시나리오 실행 ══ */
function runScenario(step, el) {
  // 버튼 상태
  document.querySelectorAll('.step-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');

  const sc = SCENARIOS[step];
  document.getElementById('hint-text').innerHTML = sc.hint;

  // 기존 핀 제거
  clearPins('admin-pins');
  clearPins('user-pins');

  // 메시지 전송
  DEMO_CH.postMessage({ type: sc.broadcast });

  // 핀 표시
  sc.adminPins.forEach(p => addPin('admin-pins', p));
  sc.userPins.forEach(p => addPin('user-pins', p));

  // 상태 바 업데이트
  setStatus(sc.adminStatus, sc.userStatus);
}

/* ══ 관리자 iframe에서 직접 버튼 클릭 시 헤더·상태바 동기화 ══ */
DEMO_CH.onmessage = function(e) {
  if (e.data.type === 'LIVE_MODE_START') {
    const btns = document.querySelectorAll('.step-btn');
    btns.forEach(b => b.classList.remove('active'));
    btns[1].classList.add('active');
    document.getElementById('hint-text').innerHTML = SCENARIOS[2].hint;
    clearPins('user-pins');
    SCENARIOS[2].userPins.forEach(p => addPin('user-pins', p));
    setStatus(SCENARIOS[2].adminStatus, SCENARIOS[2].userStatus);
  } else if (e.data.type === 'LIVE_MODE_END') {
    const btns = document.querySelectorAll('.step-btn');
    btns.forEach(b => b.classList.remove('active'));
    btns[2].classList.add('active');
    document.getElementById('hint-text').innerHTML = SCENARIOS[3].hint;
    clearPins('user-pins');
    SCENARIOS[3].userPins.forEach(p => addPin('user-pins', p));
    setStatus(SCENARIOS[3].adminStatus, SCENARIOS[3].userStatus);
  }
};
</script>

</body>
</html>
