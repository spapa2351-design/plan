        totalEnrolled: 30, totalCapacity: 30,
        packages: [
          { name: '3월 15일 교육', startDate: '2026-03-15', endDate: '2026-03-15', place: '한샘 HQ 대교육장', capacity: 30, enrolled: 30, sessions: 2 },

        totalEnrolled: 892, totalCapacity: 0, contentCount: 5, packages: [] },
      { id: 8, title: '영업 전략 부트캠프 (5기)', type: 'blended', status: 'draft', required: false, thumb: '', instructor: '김도윤', creator: 'jiyoungkim', category: '영업', registeredAt: '2026/04/06 13:10', enrollMethod: 'self',
        totalEnrolled: 0, totalCapacity: 100, contentCount: 4,
        packages: [
          { name: '집합교육 1주차', startDate: '2026-06-01', endDate: '2026-06-05', place: '판교 연수원', capacity: 25, enrolled: 0, sessions: 5 },
          { name: '집합교육 2주차', startDate: '2026-06-15', endDate: '2026-06-19', place: '판교 연수원', capacity: 25, enrolled: 0, sessions: 5 },
          { name: '집합교육 3주차', startDate: '2026-07-01', endDate: '2026-07-03', place: '강남 교육장', capacity: 25, enrolled: 0, sessions: 6 },
          { name: '최종 발표', startDate: '2026-07-31', endDate: '2026-07-31', place: '한샘 HQ 대교육장', capacity: 25, enrolled: 0, sessions: 1 },
        ]},
      { id: 9, title: 'ESG 경영 이해 과정', type: 'online', status: 'closed', required: false, thumb: '', instructor: '이민지', creator: 'jaewan.na', category: 'DX', registeredAt: '2025/12/31 18:00', enrollMethod: 'self',
        totalEnrolled: 156, totalCapacity: 200, contentCount: 8, packages: [] },
      { id: 10, title: '안전보건 법정의무교육 (4월)', type: 'offline', status: 'active', required: true, thumb: '', instructor: '강태훈', creator: 'jiyoungkim', category: '공통/온보딩', registeredAt: '2026/03/25 09:00', enrollMethod: 'assign',
        totalEnrolled: 120, totalCapacity: 150,
        packages: [
          { name: '1기 (4/7~4/11)', startDate: '2026-04-07', endDate: '2026-04-11', place: '한샘 HQ 대교육장', capacity: 30, enrolled: 30, sessions: 5 },
          { name: '2기 (4/14~4/18)', startDate: '2026-04-14', endDate: '2026-04-18', place: '한샘 HQ 대교육장', capacity: 30, enrolled: 30, sessions: 5 },
          { name: '3기 (4/21~4/25)', startDate: '2026-04-21', endDate: '2026-04-25', place: '판교 연수원', capacity: 30, enrolled: 30, sessions: 5 },
          { name: '4기 (4/28~4/30)', startDate: '2026-04-28', endDate: '2026-04-30', place: '판교 연수원', capacity: 30, enrolled: 20, sessions: 3 },
          { name: '5기 (5/7~5/9)', startDate: '2026-05-07', endDate: '2026-05-09', place: '강남 교육장', capacity: 30, enrolled: 10, sessions: 3 },
        ]},
    ];

    const CATEGORIES = [
      { id: 'all', label: '전체', children: [] },
      { id: 'work', label: 'WORK', children: [
        { id: 'job', label: '직무 역량' },
        { id: 'leader', label: '리더십' },
        { id: 'sales', label: '영업' },
      ]},
      { id: 'common', label: '공통/온보딩', children: [] },
      { id: 'it', label: 'IT', children: [] },
      { id: 'dx', label: 'DX', children: [] },
    ];

    /* ── 설정 맵 ── */
    const TYPE_CFG = {
      online:  { label: '온라인', icon: Monitor, bg: 'bg-sky-50', text: 'text-sky-600', border: 'border-sky-200' },
      offline: { label: '오프라인', icon: MapPin, bg: 'bg-violet-50', text: 'text-violet-600', border: 'border-violet-200' },
      blended: { label: '블렌디드', icon: Layers, bg: 'bg-amber-50', text: 'text-amber-600', border: 'border-amber-200' },
    };
    const STATUS_CFG = {
      active: { label: '운영중', bg: 'bg-indigo-50', text: 'text-indigo-600', dot: 'bg-indigo-500' },
      draft:  { label: '임시저장', bg: 'bg-slate-100', text: 'text-slate-500', dot: 'bg-slate-400' },
      closed: { label: '종료', bg: 'bg-slate-50', text: 'text-slate-400', dot: 'bg-slate-300' },
    };

    const fmtDate = (d) => d ? d.replace(/-/g, '.').slice(5) : '';
    const fmtRange = (s, e) => {
      if (!s) return '-';
      const fs = fmtDate(s);
      return e && e !== s ? `${fs} ~ ${fmtDate(e)}` : fs;
    };

    /* ══════════════════════════════════════
       App
    ══════════════════════════════════════ */
    const App = () => {
      const [courses, setCourses] = useState(COURSES);
      const [typeFilter, setTypeFilter] = useState('all');
      const [statusFilter, setStatusFilter] = useState('all');
      const [search, setSearch] = useState('');
      const [expandedIds, setExpandedIds] = useState(new Set());
      const [selectedIds, setSelectedIds] = useState(new Set());
      const [catFilter, setCatFilter] = useState('all');
      const [expandedCats, setExpandedCats] = useState(new Set(['work']));

      const toggleExpand = (id) => setExpandedIds(prev => {
        const next = new Set(prev);
        next.has(id) ? next.delete(id) : next.add(id);
        return next;
      });
      const toggleSelect = (id) => setSelectedIds(prev => {
        const next = new Set(prev);
        next.has(id) ? next.delete(id) : next.add(id);
        return next;
      });
      const toggleCatExpand = (id) => setExpandedCats(prev => {
        const next = new Set(prev);
        next.has(id) ? next.delete(id) : next.add(id);
        return next;
      });

      const filtered = useMemo(() => {
        let list = courses;
        if (typeFilter !== 'all') list = list.filter(c => c.type === typeFilter);
        if (statusFilter !== 'all') list = list.filter(c => c.status === statusFilter);
        if (catFilter !== 'all') list = list.filter(c => c.category === catFilter);
        if (search.trim()) {
          const q = search.trim().toLowerCase();
          list = list.filter(c => c.title.toLowerCase().includes(q) || c.instructor.toLowerCase().includes(q));
        }
        return list;
      }, [courses, typeFilter, statusFilter, catFilter, search]);

      const allSelected = filtered.length > 0 && filtered.every(c => selectedIds.has(c.id));
      const toggleAll = () => {
        if (allSelected) setSelectedIds(new Set());
        else setSelectedIds(new Set(filtered.map(c => c.id)));
      };

      const handleDelete = (id) => {
        if (!confirm('정말 삭제하시겠습니까?')) return;
        setCourses(courses.filter(c => c.id !== id));
        setSelectedIds(prev => { const n = new Set(prev); n.delete(id); return n; });
      };

      /* ── 코스의 날짜 범위 요약 ── */
      const getDateRange = (course) => {
        if (course.packages.length === 0) return '-';
        const starts = course.packages.map(p => p.startDate).filter(Boolean).sort();
        const ends = course.packages.map(p => p.endDate).filter(Boolean).sort();
        if (starts.length === 0) return '-';
        return fmtRange(starts[0], ends[ends.length - 1]);
      };

      /* ── 장소 요약 ── */
      const getPlaceSummary = (course) => {
        const places = [...new Set(course.packages.map(p => p.place).filter(Boolean))];
        if (places.length === 0) return '';
        if (places.length === 1) return places[0];
        return `${places[0]} 외 ${places.length - 1}곳`;
      };

      /* ── 총 회차 수 ── */
      const getTotalSessions = (course) => course.packages.reduce((s, p) => s + (p.sessions || 0), 0);

      return (
        <div className="min-h-screen flex flex-col">

          {/* ── 헤더 ── */}
          <header className="bg-white border-b border-slate-200 sticky top-0 z-50">
            <div className="px-8 py-4 flex justify-between items-center">
              <div className="flex items-center gap-2">
                <h1 className="text-[20px] font-black text-slate-900">코스</h1>
                <Star size={16} className="text-amber-400 fill-amber-400"/>

              <div className="flex items-center gap-2.5">

                </button>
                <button className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-[13px] font-bold text-slate-600 hover:bg-slate-50 transition-colors flex items-center gap-1.5">
                  <Plus size={14}/> 수강생 등록
                </button>

                  <Plus size={14}/> 등록
                </a>
              </div>
            </div>

          <div className="flex flex-1 overflow-hidden">

            {/* ── 메인 콘텐츠 ── */}

              {/* 필터 바 */}

                    return (
                      <button

                        <span className={`ml-0.5 ${typeFilter === t ? 'text-indigo-200' : 'text-slate-300'}`}>{count}</span>
                      </button>

                  {/* 상태 필터 */}
                  <select

                    onChange={e => setStatusFilter(e.target.value)}

                  >
                    <option value="all">상태: 전체</option>
                    <option value="active">운영중</option>
                    <option value="draft">임시저장</option>
                    <option value="closed">종료</option>
                  </select>
                </div>
              </div>

              {/* 카운트 + 검색 */}
              <div className="px-6 py-3 flex items-center justify-between">

                  <div className="relative">
                    <Search size={13} className="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-300"/>

                      className="border border-slate-200 rounded-lg pl-8 pr-3 py-1.5 text-[12px] w-[220px] outline-none focus:border-indigo-400 transition-all bg-white placeholder-slate-300"
                    />
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  <span className="text-[11px] text-slate-400 font-medium">코스 순서 설정순</span>
                  <button className="p-1.5 border border-slate-200 rounded-lg text-slate-400 hover:text-slate-600 bg-white"><Download size={14}/></button>
                  <div className="flex border border-slate-200 rounded-lg overflow-hidden bg-white">
                    <button className="p-1.5 text-slate-400 hover:bg-slate-50"><Grid3X3 size={14}/></button>
                    <button className="p-1.5 bg-indigo-50 text-indigo-600"><List size={14}/></button>
                  </div>
                </div>
              </div>

              {/* ── 테이블 ── */}
              <div className="px-6 pb-8">
                <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">

                        <th className="w-10 px-3 py-3">
                          <input type="checkbox" checked={allSelected} onChange={toggleAll} className="w-4 h-4 rounded accent-indigo-600"/>

                        <th className="w-10 px-0 py-3"></th>
                        <th className="px-3 py-3 text-[11px] font-bold text-slate-400 w-[80px]">상태</th>
                        <th className="px-3 py-3 text-[11px] font-bold text-slate-400 w-[40px]">필수</th>
                        <th className="px-3 py-3 text-[11px] font-bold text-slate-400 w-[44px]">표지</th>
                        <th className="px-3 py-3 text-[11px] font-bold text-slate-400">코스명</th>
                        <th className="px-3 py-3 text-[11px] font-bold text-slate-400 w-[110px]">구성</th>
                        <th className="px-3 py-3 text-[11px] font-bold text-slate-400 w-[90px]">분류</th>
                        <th className="px-3 py-3 text-[11px] font-bold text-slate-400 w-[140px]">수강 기간</th>
                        <th className="px-3 py-3 text-[11px] font-bold text-slate-400 w-[70px] text-right">수강 인원</th>
                        <th className="px-3 py-3 text-[11px] font-bold text-slate-400 w-[130px]">등록일</th>
                        <th className="px-3 py-3 text-[11px] font-bold text-slate-400 w-[100px]">생성자</th>
                        <th className="px-3 py-3 text-[11px] font-bold text-slate-400 w-[80px] text-center">관리</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filtered.map(course => {
                        const typeCfg = TYPE_CFG[course.type];
                        const statusCfg = STATUS_CFG[course.status];
                        const isExpanded = expandedIds.has(course.id);
                        const isSelected = selectedIds.has(course.id);
                        const hasPackages = course.packages.length > 0;
                        const totalSessions = getTotalSessions(course);
                        const isFull = course.totalCapacity > 0 && course.totalEnrolled >= course.totalCapacity;

                        return (
                          <React.Fragment key={course.id}>
                            {/* ── 메인 행 ── */}
                            <tr className={`border-b border-slate-100 transition-colors group
                              ${isSelected ? 'bg-indigo-50/30' : 'hover:bg-slate-50/80'}
                              ${isExpanded ? 'bg-slate-50/50' : ''}`}>
                              {/* 체크 */}
                              <td className="px-3 py-3">
                                <input type="checkbox" checked={isSelected} onChange={() => toggleSelect(course.id)} className="w-4 h-4 rounded accent-indigo-600"/>
                              </td>
                              {/* 확장 화살표 */}
                              <td className="px-0 py-3">
                                {hasPackages ? (
                                  <button onClick={() => toggleExpand(course.id)} className="w-6 h-6 flex items-center justify-center rounded text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 transition-colors">
                                    {isExpanded ? <ChevronDown size={14}/> : <ChevronRight size={14}/>}
                                  </button>
                                ) : <div className="w-6"/>}
                              </td>
                              {/* 상태 */}
                              <td className="px-3 py-3">
                                <span className={`inline-flex items-center gap-1 px-2 py-1 rounded text-[10px] font-bold whitespace-nowrap ${statusCfg.bg} ${statusCfg.text}`}>
                                  <span className={`w-1.5 h-1.5 rounded-full shrink-0 ${statusCfg.dot}`}/>
                                  {statusCfg.label}
                                </span>
                              </td>
                              {/* 필수 */}
                              <td className="px-3 py-3">
                                {course.required && (
                                  <span className="px-1.5 py-0.5 bg-rose-50 text-rose-500 border border-rose-200 text-[10px] font-bold rounded whitespace-nowrap">필수</span>
                                )}
                              </td>
                              {/* 표지 */}
                              <td className="px-3 py-3">
                                <div className={`w-9 h-9 rounded-lg flex items-center justify-center ${typeCfg.bg} ${typeCfg.border} border`}>
                                  {React.createElement(typeCfg.icon, { size: 16, className: typeCfg.text })}
                                </div>
                              </td>
                              {/* 코스명 */}
                              <td className="px-3 py-3">
                                <div className="flex items-center gap-2">
                                  <a href={course.type !== 'online' ? 'admin1.html' : '#'} className="text-[13px] font-bold text-slate-800 hover:text-indigo-600 transition-colors leading-snug">
                                    {course.title}
                                  </a>
                                  <span className={`shrink-0 px-1.5 py-0.5 rounded text-[9px] font-bold border ${typeCfg.bg} ${typeCfg.text} ${typeCfg.border}`}>{typeCfg.label}</span>
                                  {hasPackages && (
                                    <span className="shrink-0 text-[9px] font-bold text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded">{course.packages.length}개 반</span>
                                  )}
                                </div>
                                {/* 오프라인 장소 서브텍스트 */}
                                {course.type !== 'online' && hasPackages && (
                                  <div className="text-[10px] text-slate-400 mt-0.5 flex items-center gap-1">
                                    <MapPin size={9}/> {getPlaceSummary(course)}
                                  </div>
                                )}
                              </td>
                              {/* 구성 */}
                              <td className="px-3 py-3">
                                {course.type === 'online' ? (
                                  <button className="inline-flex items-center gap-1 bg-indigo-50 text-indigo-600 border border-indigo-200 px-2.5 py-1 rounded-md text-[10px] font-bold hover:bg-indigo-100 transition-colors">
                                    <Monitor size={10}/> 수강 관리
                                  </button>
                                ) : (
                                  <button onClick={() => toggleExpand(course.id)} className="inline-flex items-center gap-1 bg-violet-50 text-violet-600 border border-violet-200 px-2.5 py-1 rounded-md text-[10px] font-bold hover:bg-violet-100 transition-colors">
                                    <Calendar size={10}/> {totalSessions}회차 일정
                                  </button>
                                )}
                              </td>
                              {/* 분류 */}
                              <td className="px-3 py-3">
                                <span className="inline-block bg-slate-100 text-slate-600 px-2 py-0.5 rounded text-[10px] font-bold">{course.category}</span>
                              </td>
                              {/* 수강 기간 */}
                              <td className="px-3 py-3 text-[11px] text-slate-600 font-medium">
                                {course.type === 'online'
                                  ? (course.totalCapacity === 0 ? '제한 없음' : '-')
                                  : getDateRange(course)
                                }
                              </td>
                              {/* 수강 인원 */}
                              <td className="px-3 py-3 text-right">
                                <span className="text-[12px] font-black text-slate-800">{course.totalEnrolled}</span>
                                {course.totalCapacity > 0 && (
                                  <span className="text-[11px] text-slate-400 font-medium"> 명</span>
                                )}
                                {isFull && <span className="block text-[9px] font-bold text-rose-500">마감</span>}
                              </td>
                              {/* 등록일 */}
                              <td className="px-3 py-3 text-[11px] text-slate-500 font-medium">{course.registeredAt}</td>
                              {/* 생성자 */}
                              <td className="px-3 py-3 text-[11px] text-slate-500 font-medium">{course.creator}</td>
                              {/* 관리 */}
                              <td className="px-3 py-3">
                                <div className="flex items-center justify-center gap-0.5">
                                  <button className="p-1 text-slate-400 hover:text-indigo-600 transition-colors"><Link2 size={14}/></button>
                                  <a href={course.type !== 'online' ? 'admin1.html' : '#'} className="p-1 text-slate-400 hover:text-indigo-600 transition-colors"><Edit3 size={14}/></a>
                                  <button onClick={() => handleDelete(course.id)} className="p-1 text-slate-400 hover:text-rose-500 transition-colors"><Trash2 size={14}/></button>
                                </div>
                              </td>
                            </tr>

                            {/* ── 확장 행: 패키지 상세 ── */}
                            {isExpanded && hasPackages && (
                              <tr className="animate-fadeIn">
                                <td colSpan="13" className="px-0 py-0">
                                  <div className="bg-[#f8f9fd] border-b border-slate-200 px-12 py-4">
                                    <div className="flex items-center gap-2 mb-3">
                                      <span className="text-[11px] font-bold text-slate-500">패키지(반) 상세</span>
                                      <span className="text-[10px] text-slate-400 font-medium">— {course.packages.length}개 패키지 / 총 {totalSessions}회차</span>
                                    </div>
                                    <table className="w-full">
                                      <thead>
                                        <tr className="text-[10px] font-bold text-slate-400 border-b border-slate-200">
                                          <th className="text-left py-2 pr-4">패키지명</th>
                                          <th className="text-left py-2 pr-4">기간</th>
                                          <th className="text-left py-2 pr-4">장소</th>
                                          <th className="text-center py-2 pr-4">회차</th>
                                          <th className="text-right py-2 pr-4">정원</th>
                                          <th className="text-right py-2 pr-4">신청</th>
                                          <th className="text-right py-2">잔여</th>
                                        </tr>
                                      </thead>
                                      <tbody>
                                        {course.packages.map((pkg, i) => {
                                          const remaining = pkg.capacity - pkg.enrolled;
                                          const pctFull = pkg.capacity > 0 ? Math.round(pkg.enrolled / pkg.capacity * 100) : 0;
                                          return (
                                            <tr key={i} className="text-[11px] border-b border-slate-100 last:border-0">
                                              <td className="py-2 pr-4 font-bold text-slate-700">{pkg.name}</td>
                                              <td className="py-2 pr-4 text-slate-600">{fmtRange(pkg.startDate, pkg.endDate)}</td>
                                              <td className="py-2 pr-4 text-slate-500 flex items-center gap-1"><MapPin size={10} className="text-slate-300"/> {pkg.place}</td>
                                              <td className="py-2 pr-4 text-center text-slate-600">{pkg.sessions}회</td>
                                              <td className="py-2 pr-4 text-right text-slate-600">{pkg.capacity}명</td>
                                              <td className="py-2 pr-4 text-right font-bold text-slate-800">{pkg.enrolled}명</td>
                                              <td className="py-2 text-right">
                                                <span className={`font-bold ${remaining <= 0 ? 'text-rose-500' : remaining <= 5 ? 'text-amber-600' : 'text-emerald-600'}`}>
                                                  {remaining <= 0 ? '마감' : `${remaining}석`}
                                                </span>
                                                {remaining > 0 && pctFull >= 80 && (
                                                  <span className="text-[9px] text-amber-500 font-bold ml-1">임박</span>
                                                )}
                                              </td>
                                            </tr>
                                          );
                                        })}
                                      </tbody>
                                    </table>
                                    <div className="mt-3 flex items-center gap-2">
                                      <a href="admin1.html" className="text-[10px] font-bold text-indigo-600 bg-indigo-50 border border-indigo-200 px-3 py-1.5 rounded-lg hover:bg-indigo-100 transition-colors flex items-center gap-1">
                                        <Edit3 size={10}/> 패키지 편집
                                      </a>
                                      <button className="text-[10px] font-bold text-slate-500 bg-white border border-slate-200 px-3 py-1.5 rounded-lg hover:bg-slate-50 transition-colors flex items-center gap-1">
                                        <QrCode size={10}/> 출석 관리
                                      </button>
                                    </div>
                                  </div>
                                </td>
                              </tr>
                            )}
                          </React.Fragment>
                        );
                      })}
                    </tbody>
                  </table>

                  {filtered.length === 0 && (
                    <div className="py-20 text-center">
                      <Search size={32} className="text-slate-200 mx-auto mb-3"/>
                      <div className="text-[13px] font-bold text-slate-400">검색 결과가 없습니다</div>
                    </div>
                  )}
                </div>
              </div>
            </main>
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
