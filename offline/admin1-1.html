      const [calMonth, setCalMonth] = useState(() => parseInt(today.slice(5, 7)));
      const [dismissed, setDismissed] = useState([]);

      const pkg = PACKAGES.find(p => p.id === selectedPkg);
      const session = pkg?.sessions.find(s => s.id === selectedSession) || pkg?.sessions[0];

      // 현재 차수의 학생 목록
      const students = useMemo(() => {
        const ids = COURSE.studentMap[selectedPkg] || [];
        return ids.map(id => STUDENT_POOL.find(s => s.id === id)).filter(Boolean);
      }, [selectedPkg]);

      // 출석 데이터 초기화 (코스별 다양한 패턴)
      const [attendance, setAttendance] = useState(() => {
        const map = {};
        PACKAGES.forEach(p => {
          const stIds = COURSE.studentMap[p.id] || [];
          p.sessions.forEach((s, si) => {
            map[s.id] = {};
            stIds.forEach((stId, i) => {
              // 케이스별 다양한 출석 패턴
              if (courseStatus === 'closed') {
                map[s.id][stId] = i % 10 === 7 ? 'late' : 'attended';
              } else if (p.startDate < '2026-04-09') {
                // 과거 회차: 대부분 출석
                map[s.id][stId] = i % 8 === 0 ? 'absent' : i % 6 === 3 ? 'late' : i % 7 === 5 ? 'early_leave' : 'attended';
              } else if (p.startDate === '2026-04-09') {
                // 오늘: 일부 출석, 나머지 대기
                map[s.id][stId] = i < 4 ? 'attended' : i === 4 ? 'late' : 'pending';
              } else {
                // 미래 회차
                map[s.id][stId] = 'pending';
              }
            });
          });
        });
        return map;
      });

      // QR 자동 갱신
      const qrTimerRef = useRef(null);
      useEffect(() => {
        if (liveMode) {
          setQrCountdown(30);
          qrTimerRef.current = setInterval(() => {
            setQrCountdown(prev => prev <= 1 ? 30 : prev - 1);
          }, 1000);
        }
        return () => clearInterval(qrTimerRef.current);
      }, [liveMode, selectedSession]);

      // 데모 시나리오 제어
      useEffect(() => {
        const ch = new BroadcastChannel('offline-demo');
        ch.onmessage = (e) => {
          if (e.data.type === 'SCENARIO_1') {
            setLiveMode(false);
            setActiveTab('summary');
          } else if (e.data.type === 'SCENARIO_2') {
            setActiveTab('attendance');
            setTimeout(() => {
              setLiveMode(true);
              new BroadcastChannel('offline-demo').postMessage({ type: 'LIVE_MODE_START' });
            }, 700);
          } else if (e.data.type === 'SCENARIO_3') {
            setLiveMode(false);
            new BroadcastChannel('offline-demo').postMessage({ type: 'LIVE_MODE_END' });
          }
        };
        return () => ch.close();
      }, []);

      const qrUrl = 'qr-dummy.png';

      // 출석 통계
      const getSessionStats = (sessId, pkgId) => {
        const att = attendance[sessId] || {};
        const stIds = COURSE.studentMap[pkgId || selectedPkg] || [];
        const total = stIds.length;
        const counts = { attended: 0, late: 0, early_leave: 0, absent: 0, pending: 0 };
        stIds.forEach(id => { const s = att[id] || 'pending'; if (counts[s] !== undefined) counts[s]++; });
        const present = counts.attended + counts.late;
        return { total, ...counts, present, rate: total > 0 ? Math.round(present / total * 100) : 0 };
      };

      const handleStatusChange = (studentId, sessId, newStatus) => {
        setAttendance(prev => ({ ...prev, [sessId]: { ...prev[sessId], [studentId]: newStatus } }));
        const st = STUDENT_POOL.find(s => s.id === studentId);
        addToast(`${st?.name} → ${ATT_STATUS[newStatus].label}`);
      };

      const addToast = (msg) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, msg }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 2500);
      };

      const stats = getSessionStats(selectedSession);

      // 전체 차수 평균 출석률
      const overallRate = useMemo(() => {
        let totalPresent = 0, totalAll = 0;
        PACKAGES.forEach(p => p.sessions.forEach(s => {
          const ss = getSessionStats(s.id, p.id);
          totalPresent += ss.present;
          totalAll += ss.total;
        }));
        return totalAll > 0 ? Math.round(totalPresent / totalAll * 100) : 0;
      }, [attendance]);

      // 총 수강 인원 (전체 차수)
      const totalEnrolled = PACKAGES.reduce((sum, p) => sum + p.enrolled, 0);
      const totalCapacity = PACKAGES.reduce((sum, p) => sum + p.capacity, 0);

      // 오늘/다음 교육 찾기
      const allSessionsFlat = PACKAGES.flatMap(p => p.sessions.map(s => ({ ...s, pkgName: p.name, pkgId: p.id, pkgPlace: p.place })));
      const todaySessions = allSessionsFlat.filter(s => s.date === today);
      const futureSessions = allSessionsFlat.filter(s => s.date > today).sort((a, b) => a.date.localeCompare(b.date));
      const nextSession = futureSessions[0];

      // 주의사항 알림
      const alerts = useMemo(() => {
        const list = [];
        PACKAGES.forEach(p => {
          const remaining = p.capacity - p.enrolled;
          if (remaining <= 0) list.push({ type: 'full', msg: `${p.name} 마감`, color: 'text-rose-600', bg: 'bg-rose-50' });
          else if (remaining <= 5) list.push({ type: 'warn', msg: `${p.name} 잔여 ${remaining}석`, color: 'text-amber-600', bg: 'bg-amber-50' });
        });
        // 미출석 많은 회차
        PACKAGES.forEach(p => p.sessions.forEach(s => {
          if (s.date > today) return;
          const ss = getSessionStats(s.id, p.id);
          if (ss.absent > 0) list.push({ type: 'absent', msg: `${p.name} ${s.name}: 결석 ${ss.absent}명`, color: 'text-rose-600', bg: 'bg-rose-50' });
        }));
        return list;
      }, [attendance]);

      // 캘린더 데이터
      const calDaysData = useMemo(() => calDays(2026, calMonth), [calMonth]);
      const sessByDate = useMemo(() => {
        const m = {};
        PACKAGES.forEach(p => p.sessions.forEach(s => {
          if (!m[s.date]) m[s.date] = [];
          m[s.date].push({ ...s, pkgId: p.id, pkgName: p.name });
        }));
        return m;
      }, []);

      const TABS = [
        { id: 'summary', label: '요약', icon: BarChart3 },
        { id: 'students', label: '수강', icon: Users },
        { id: 'attendance', label: '출석', icon: UserCheck },
        { id: 'survey', label: '설문', icon: MessageSquare },
      ];

      /* ── 라이브 모드 ── */
      if (liveMode) {
        return (
          <div className="h-screen bg-slate-900 flex overflow-hidden">
            <div className="flex-[7] flex flex-col items-center justify-center relative">
              <button onClick={() => { setLiveMode(false); new BroadcastChannel('offline-demo').postMessage({ type: 'LIVE_MODE_END' }); }} className="absolute top-6 left-6 text-white/50 hover:text-white flex items-center gap-2 text-[14px] font-bold transition-colors">
                <Minimize2 size={16}/> 라이브 모드 종료
              </button>
              <div className="text-center mb-8">
                <div className="text-[15px] font-bold text-indigo-400 mb-1">{pkg?.name}</div>
                <div className="text-[24px] font-black text-white">{session?.name}</div>
                <div className="text-[14px] text-slate-400 mt-1">{fmtDate(session?.date)} · {session?.startTime} ~ {session?.endTime}</div>
              </div>
              <div className="bg-white rounded-3xl p-6 shadow-2xl relative">
                <img src={qrUrl} alt="QR" className="w-[280px] h-[280px] rounded-xl"/>
                <div className="absolute -bottom-4 left-1/2 -translate-x-1/2 bg-slate-800 border border-slate-700 px-4 py-1.5 rounded-full flex items-center gap-2">
                  <RefreshCw size={12} className={`text-indigo-400 ${qrCountdown <= 5 ? 'animate-spin' : ''}`}/>
                  <span className={`text-[13px] font-bold ${qrCountdown <= 5 ? 'text-amber-400' : 'text-slate-300'}`}>{qrCountdown}초 후 갱신</span>
                </div>
              </div>
              <p className="text-slate-500 text-[13px] mt-10">학습자 앱에서 QR을 스캔하세요</p>
            </div>
            <div className="flex-[3] bg-slate-800 border-l border-slate-700 flex flex-col">
              <div className="p-6 border-b border-slate-700">
                <div className="text-[12px] font-bold text-slate-500 mb-1">실시간 출석 현황</div>
                <div className="flex items-end gap-2">
                  <span className="text-[48px] font-black text-white leading-none">{stats.present}</span>
                  <span className="text-[20px] text-slate-500 font-bold mb-1">/ {stats.total}</span>
                </div>
                <div className="mt-4 w-full h-3 bg-slate-700 rounded-full overflow-hidden">
                  <div className="h-full bg-emerald-500 rounded-full transition-all duration-500" style={{ width: `${stats.rate}%` }}/>
                </div>
                <div className="text-[14px] font-bold text-emerald-400 mt-2">{stats.rate}% 출석</div>
              </div>
              <div className="p-6 grid grid-cols-2 gap-3">
                {[
                  { key: 'attended', label: '출석', color: 'text-emerald-400' },
                  { key: 'late', label: '지각', color: 'text-amber-400' },
                  { key: 'early_leave', label: '조퇴', color: 'text-orange-400' },
                  { key: 'absent', label: '결석', color: 'text-rose-400' },
                  { key: 'pending', label: '미확인', color: 'text-slate-400' },

                  <div key={s.key} className="bg-slate-700/50 rounded-xl p-3">
                    <div className={`text-[11px] font-bold ${s.color} mb-0.5`}>{s.label}</div>
                    <div className="text-[22px] font-black text-white">{stats[s.key]}</div>
                  </div>
                ))}
              </div>
              <div className="flex-1 overflow-y-auto custom-scrollbar p-6 pt-2">
                <div className="text-[11px] font-bold text-slate-500 mb-3">최근 출석</div>
                <div className="space-y-2">
                  {students.filter(st => (attendance[selectedSession]?.[st.id] || 'pending') === 'attended').map(st => (
                    <div key={st.id} className="flex items-center gap-2 bg-slate-700/30 rounded-lg px-3 py-2 animate-fadeIn">
                      <div className="w-7 h-7 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center"><CheckCircle size={13}/></div>
                      <div>
                        <div className="text-[13px] font-bold text-white">{st.name}</div>
                        <div className="text-[11px] text-slate-500">{st.groups[0]}</div>

                    </div>

                </div>
              </div>
              <div className="p-4 border-t border-slate-700">
                <select value={selectedSession} onChange={e => setSelectedSession(e.target.value)}
                  className="w-full bg-slate-700 border border-slate-600 text-white rounded-lg px-3 py-2 text-[13px] font-bold outline-none">
                  {pkg?.sessions.map(s => <option key={s.id} value={s.id}>{s.name} ({s.startTime}~{s.endTime})</option>)}

              </div>
            </div>
            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 flex flex-col gap-2 z-50">
              {toasts.map(t => (
                <div key={t.id} className="bg-emerald-500 text-white px-6 py-3 rounded-xl text-[14px] font-bold shadow-xl animate-slide-up flex items-center gap-2"><CheckCircle size={16}/> {t.msg}</div>
              ))}
            </div>
          </div>
        );
      }

      /* ── 일반 모드 ── */
      return (
        <div className="min-h-screen flex flex-col">
          {/* 헤더 */}
          <header className="bg-white border-b border-slate-200 sticky top-0 z-50">
            <div className="px-8 py-4 flex justify-between items-center">
              <div className="flex items-center gap-3">
                <a href="index.html" className="w-8 h-8 bg-slate-100 text-slate-500 rounded-full flex items-center justify-center hover:bg-slate-200 transition-colors">
                  <ChevronLeft size={18}/>
                </a>
                <div>
                  <h1 className="text-[17px] font-black text-slate-900">{COURSE.title}</h1>
                  <div className="flex items-center gap-2 text-[12px] text-slate-400 font-medium mt-0.5">
                    <span>{COURSE.category}</span><span>·</span><span>{COURSE.instructor}</span><span>·</span><span>{COURSE.location}</span>
                    {courseStatus === 'closed' && <span className="ml-1 px-2 py-0.5 rounded text-[11px] font-bold bg-slate-100 text-slate-400">종료</span>}
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <a href={`admin1.html?courseId=${courseId}`} className="px-3.5 py-2 bg-white border border-slate-200 rounded-lg text-[13px] font-bold text-slate-600 hover:bg-slate-50 transition-colors flex items-center gap-1.5">
                  <Edit3 size={13}/> 코스 편집
                </a>
                <button className="px-4 py-2 bg-indigo-500 text-white rounded-lg text-[14px] font-bold hover:bg-indigo-600 transition-colors flex items-center gap-1.5 shadow-sm">
                  <UserCheck size={14}/> 수강생 등록
                </button>
              </div>
            </div>
          </header>

          <div className="flex flex-1 overflow-hidden">

            {/* ── 좌측 사이드바: 슬림 네비게이션 ── */}
            <aside className="w-[220px] bg-white border-r border-slate-200 overflow-y-auto custom-scrollbar shrink-0 flex flex-col">
              {/* 차수 선택 */}
              <div className="p-4 border-b border-slate-100">
                <label className="block text-[11px] font-bold text-slate-400 mb-1.5">차수</label>
                <select
                  value={selectedPkg}
                  onChange={e => { setSelectedPkg(e.target.value); const p = PACKAGES.find(pp => pp.id === e.target.value); if (p) setSelectedSession(p.sessions[0]?.id); }}
                  className="w-full border border-slate-200 rounded-lg px-3 py-2 text-[13px] font-bold text-slate-700 outline-none focus:border-indigo-400 bg-white"
                >
                  {PACKAGES.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
              </div>

              {/* 핵심 수치 */}
              <div className="p-4 border-b border-slate-100 space-y-2.5">
                <div className="flex items-center justify-between text-[12px]">
                  <span className="text-slate-400 font-bold">정원</span>
                  <span className="font-bold text-slate-700">{pkg?.capacity}명</span>
                </div>
                <div className="flex items-center justify-between text-[12px]">
                  <span className="text-slate-400 font-bold">신청</span>
                  <span className="font-bold text-slate-800">{pkg?.enrolled}명</span>
                </div>
                <div className="flex items-center justify-between text-[12px]">
                  <span className="text-slate-400 font-bold">잔여</span>
                  <span className={`font-bold ${pkg?.capacity - pkg?.enrolled <= 0 ? 'text-rose-500' : pkg?.capacity - pkg?.enrolled <= 5 ? 'text-amber-600' : 'text-emerald-600'}`}>
                    {pkg?.capacity - pkg?.enrolled <= 0 ? '마감' : `${pkg?.capacity - pkg?.enrolled}석`}
                  </span>
                </div>
                <div className="flex items-center justify-between text-[12px]">
                  <span className="text-slate-400 font-bold">회차</span>
                  <span className="font-bold text-slate-700">총 {pkg?.sessions.length}회</span>
                </div>
                <div className="mt-2 pt-2 border-t border-slate-50">
                  <div className="flex items-center justify-between text-[12px] mb-1">
                    <span className="text-slate-400 font-bold">기간</span>
                    <span className="text-slate-600 font-medium">{fmtDateShort(pkg?.startDate)} ~ {fmtDateShort(pkg?.endDate)}</span>
                  </div>
                  <div className="flex items-center justify-between text-[12px]">
                    <span className="text-slate-400 font-bold">장소</span>
                    <span className="text-slate-600 font-medium text-right max-w-[120px] truncate" title={pkg?.place}>{pkg?.place}</span>
                  </div>
                </div>
              </div>

              {/* 액션 버튼 */}
              <div className="p-4 space-y-2 flex-1">
                {courseStatus !== 'closed' && (
                  <button onClick={() => { setActiveTab('attendance'); setLiveMode(true); }}
                    className="w-full flex items-center justify-center gap-1.5 bg-indigo-500 hover:bg-indigo-600 text-white font-bold text-[13px] py-2.5 rounded-xl transition-colors shadow-sm">
                    <QrCode size={14}/> 라이브 출석
                  </button>
                )}
                {COURSE.enrollMethod === 'assign' && (
                  <div className="bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 text-[11px] font-bold text-amber-700 flex items-center gap-1.5">
                    <Users size={12}/> 관리자 강제 할당
                  </div>
                )}
                {COURSE.selectionRule === 'multi' && (
                  <div className="bg-violet-50 border border-violet-200 rounded-lg px-3 py-2 text-[11px] font-bold text-violet-700 flex items-center gap-1.5">
                    <CheckCircle size={12}/> 다중 조합형
                  </div>
                )}
              </div>

              {/* 종료 버튼 */}
              {courseStatus !== 'closed' && (
                <div className="p-4 border-t border-slate-100">
                  <button className="w-full flex items-center justify-center gap-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-[13px] py-2.5 rounded-xl transition-colors">
                    <Power size={13}/> 종료하기
                  </button>
                </div>
              )}
            </aside>

            {/* ── 메인 콘텐츠 ── */}
            <main className="flex-1 overflow-y-auto custom-scrollbar">
              {/* 탭 */}
              <div className="bg-white border-b border-slate-200 px-8 flex items-center gap-1">
                {TABS.map(tab => (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                    className={`px-5 py-3 text-[14px] font-bold border-b-2 transition-colors flex items-center gap-1.5
                      ${activeTab === tab.id ? 'border-indigo-500 text-indigo-600 bg-indigo-50/50' : 'border-transparent text-slate-400 hover:text-slate-600'}`}>
                    <tab.icon size={14}/> {tab.label}
                  </button>
                ))}
              </div>

              <div className="p-8">

                {/* ═══ 요약 탭: 운영 대시보드 ═══ */}
                {activeTab === 'summary' && (
                  <div className="animate-fadeIn space-y-4">

                    {/* ① 오늘/다음 교육 바 */}
                    <SummaryTodayBar
                      todaySessions={todaySessions} nextSession={nextSession} today={today}
                      liveMode={liveMode} setLiveMode={setLiveMode} setActiveTab={setActiveTab}
                      COURSE={COURSE}
                      onLiveStart={() => { setLiveMode(true); new BroadcastChannel('offline-demo').postMessage({ type: 'LIVE_MODE_START' }); }}
                    />

                    {/* ② 알림 칩 */}
                    {alerts.filter((_,i) => !dismissed.includes(i)).length > 0 && (
                      <div className="bg-white border border-slate-200 rounded-2xl px-4 py-3 flex flex-wrap gap-2 items-center">
                        <span className="text-[11px] font-bold text-slate-300 mr-1 flex-shrink-0">주의사항</span>
                        {alerts.map((a, i) => dismissed.includes(i) ? null : (
                          <SummaryAlertChip key={i} alert={a} onClose={() => setDismissed(d => [...d, i])}/>
                        ))}
                      </div>
                    )}

                    {/* ③ 차수 카드 */}
                    <div className={`grid gap-4 ${PACKAGES.length >= 3 ? 'grid-cols-3' : PACKAGES.length === 2 ? 'grid-cols-2' : 'grid-cols-1'}`}>
                      {PACKAGES.map((p, pi) => (
                        <SummaryPkgCard
                          key={p.id} pkg={p} pkgIdx={pi} today={today}
                          getSessionStats={getSessionStats}
                          fmtDateShort={fmtDateShort}
                          onGoAttendance={() => { setSelectedPkg(p.id); setActiveTab('attendance'); }}
                        />
                      ))}
                    </div>

                    {/* ④ 월별 캘린더 */}
                    <SummaryCalSection
                      month={calMonth} days={calDaysData} sessByDate={sessByDate} today={today}
                      PACKAGES={PACKAGES} getSessionStats={getSessionStats}
                      onPrev={() => setCalMonth(m => m > 1 ? m - 1 : 12)}
                      onNext={() => setCalMonth(m => m < 12 ? m + 1 : 1)}
                    />

                    {/* ⑤ 수료 예측 */}
                    <SummaryForecast PACKAGES={PACKAGES} getSessionStats={getSessionStats} today={today}/>

                  </div>

                {/* ═══ 수강 탭 ═══ */}
                {activeTab === 'students' && (
                  <div className="animate-fadeIn">
                    <div className="flex items-center justify-between mb-4">

                        <span className="text-[14px] font-bold text-slate-700">총 <span className="text-indigo-600">{students.length}</span></span>
                        <div className="relative">
                          <Search size={13} className="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-300"/>

                            className="border border-slate-200 rounded-lg pl-8 pr-3 py-1.5 text-[13px] w-[200px] outline-none focus:border-indigo-400 bg-white placeholder-slate-300"/>
                        </div>
                      </div>
                      <div className="flex items-center gap-2">

          </div>
          <button onClick={() => setActiveTab('attendance')}
            className="h-9 px-4 bg-indigo-500 hover:bg-indigo-600 text-white rounded-xl text-[12px] font-bold flex items-center gap-1.5 transition-colors shadow-sm flex-shrink-0">
            <Maximize2 size={12}/> 출석 관리
          </button>
        </div>
      );
    }

    function SummaryAlertChip({ alert, onClose }) {
      const isError = alert.type === 'full' || alert.type === 'absent';
      return (
        <div className={`inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg border text-[12px] font-bold
          ${isError ? 'bg-rose-50 border-rose-200 text-rose-700' : 'bg-amber-50 border-amber-200 text-amber-700'}`}>
          {isError ? <AlertCircle size={11}/> : <AlertTriangle size={11}/>}
          {alert.msg}
          <button onClick={onClose} className="ml-1 opacity-40 hover:opacity-80 transition-opacity"><X size={10}/></button>
        </div>
      );
    }

    function SummaryPkgCard({ pkg, pkgIdx, today, getSessionStats, fmtDateShort, onGoAttendance }) {
      const c = PKG_COLORS[pkgIdx % PKG_COLORS.length];
      const doneSessions = pkg.sessions.filter(s => s.date < today);
      const todayOrDone = pkg.sessions.filter(s => s.date <= today);
      const doneCount = todayOrDone.length;
      const totalCount = pkg.sessions.length;
      const avgRate = doneCount > 0
        ? Math.round(todayOrDone.reduce((sum, s) => sum + getSessionStats(s.id, pkg.id).rate, 0) / doneCount)
        : null;
      const totalAbsent = doneSessions.reduce((sum, s) => sum + getSessionStats(s.id, pkg.id).absent, 0);
      const nextSess = pkg.sessions.find(s => s.date > today);
      const rem = pkg.capacity - pkg.enrolled;

      return (
        <div className="bg-white border border-slate-200 rounded-2xl overflow-hidden">
          {/* 헤더 */}
          <div className={`px-4 py-3 flex items-center justify-between border-b ${c.border} ${c.light}`}>
            <div className="flex items-center gap-2">
              <div className={`w-2.5 h-2.5 rounded-full ${c.dot}`}/>
              <span className={`text-[14px] font-black ${c.text}`}>{pkg.name}</span>
            </div>
            <div className="flex items-center gap-2 text-[11px]">
              <span className="text-slate-400">{doneCount}/{totalCount}회차</span>
              {rem <= 0
                ? <span className="font-bold text-rose-500 bg-rose-50 border border-rose-200 px-2 py-0.5 rounded-md">마감</span>
                : <span className="text-slate-400 bg-white border border-slate-200 px-2 py-0.5 rounded-md">잔여 {rem}석</span>
              }
            </div>
          </div>

          {/* 핵심 수치 */}
          <div className="px-4 py-4 grid grid-cols-3 divide-x divide-slate-100">
            <SummaryMetric label="수강 인원" value={`${pkg.enrolled}/${pkg.capacity}`} unit="명"/>
            <SummaryMetric label="평균 출석률"
              value={avgRate !== null ? `${avgRate}` : '—'}
              unit={avgRate !== null ? '%' : ''}
              color={avgRate !== null && avgRate < 75 ? 'text-rose-500' : 'text-slate-800'}
            />
            <SummaryMetric label="누적 결석" value={`${totalAbsent}`} unit="건"
              color={totalAbsent > 0 ? 'text-amber-500' : 'text-slate-800'}
            />
          </div>

          {/* 회차별 출석 바 */}
          <div className="px-4 pb-3 space-y-2">
            <div className="text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wide">회차별 출석률</div>
            {pkg.sessions.map((sess, i) => {
              const isDone = sess.date <= today;
              const ss = isDone ? getSessionStats(sess.id, pkg.id) : null;
              const rate = ss ? ss.rate : null;
              return (
                <div key={sess.id} className="flex items-center gap-2">
                  <div className="text-[10px] text-slate-400 w-12 flex-shrink-0 font-semibold">{i+1}회차</div>
                  <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden relative">
                    {isDone && (
                      <div className={`h-full rounded-full transition-all ${rate >= 75 ? c.bar : 'bg-amber-400'}`}
                           style={{ width: `${rate}%` }}/>
                    )}
                    <div className="absolute top-0 h-full w-px bg-slate-300" style={{ left: '75%' }}/>
                  </div>
                  <div className="text-[10px] font-bold w-14 text-right">
                    {isDone
                      ? <span className={rate >= 75 ? c.text : 'text-amber-500'}>{rate}%</span>
                      : <span className="text-slate-300">{fmtDateShort(sess.date)}</span>
                    }
                  </div>
                </div>
              );
            })}
            <div className="text-[10px] text-slate-300 mt-0.5">▲ 수료 기준선 75%</div>
          </div>

          {/* 다음 회차 */}
          {nextSess && (
            <div className="px-4 py-3 border-t border-slate-100 flex items-center justify-between">
              <div>
                <div className="text-[10px] font-bold text-slate-400 mb-0.5">다음 회차</div>
                <div className="text-[13px] font-bold text-slate-700">
                  {nextSess.name}
                  <span className="text-slate-400 font-normal ml-1 text-[12px]">
                    {fmtDateShort(nextSess.date)} · {nextSess.startTime}–{nextSess.endTime}
                  </span>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <span className={`text-[11px] font-bold px-2.5 py-1 rounded-lg ${c.light} ${c.text}`}>
                  {dDayLabel(nextSess.date, today)}
                </span>
                <button onClick={onGoAttendance}
                  className={`h-7 px-3 text-[11px] font-bold rounded-lg flex items-center gap-1 ${c.light} ${c.text} border ${c.border} hover:opacity-80 transition-opacity`}>
                  출석 관리 <ChevronRight size={11}/>
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function SummaryMetric({ label, value, unit, color = 'text-slate-800' }) {
      return (
        <div className="px-3 text-center first:pl-0 last:pr-0">
          <div className="text-[10px] font-bold text-slate-400 mb-1">{label}</div>
          <div className={`text-[20px] font-black leading-none ${color}`}>
            {value}<span className="text-[11px] font-bold ml-0.5">{unit}</span>
          </div>
        </div>
      );
    }

    function SummaryCalSection({ month, days, sessByDate, today, PACKAGES, getSessionStats, onPrev, onNext }) {
      return (
        <div className="bg-white border border-slate-200 rounded-2xl overflow-hidden">
          <div className="px-5 py-3.5 border-b border-slate-100 flex items-center justify-between flex-wrap gap-2">
            <div className="flex items-center gap-2">
              <Calendar size={14} className="text-slate-400"/>
              <span className="text-[14px] font-black text-slate-800">2026년 {month}월 교육 일정</span>
            </div>
            <div className="flex items-center gap-2 flex-wrap">
              {PACKAGES.map((p, pi) => {
                const c = PKG_COLORS[pi % PKG_COLORS.length];
                return (
                  <div key={p.id} className={`flex items-center gap-1.5 text-[11px] font-bold ${c.text} ${c.light} border ${c.border} px-2.5 py-1 rounded-lg`}>
                    <div className={`w-2 h-2 rounded-full ${c.dot}`}/>{p.name}
                  </div>
                );
              })}
              <div className="flex gap-1">
                <button onClick={onPrev} className="w-7 h-7 rounded-lg bg-slate-50 hover:bg-slate-100 flex items-center justify-center text-slate-500 transition-colors"><ChevronLeft size={13}/></button>
                <button onClick={onNext} className="w-7 h-7 rounded-lg bg-slate-50 hover:bg-slate-100 flex items-center justify-center text-slate-500 transition-colors"><ChevronRight size={13}/></button>
              </div>
            </div>
          </div>
          {/* 요일 헤더 */}
          <div className="grid grid-cols-7 border-b border-slate-100">
            {DAY_KO.map((d, i) => (
              <div key={d} className={`py-2 text-center text-[11px] font-bold ${i===0?'text-rose-400':i===6?'text-blue-400':'text-slate-400'}`}>{d}</div>
            ))}
          </div>
          {/* 날짜 그리드 */}
          <div className="grid grid-cols-7">
            {days.map((day, i) => {
              if (!day) return <div key={`e${i}`} className="min-h-[76px] border-b border-r border-slate-50 bg-slate-50/30"/>;
              const dateStr = padDate(2026, month, day);
              const isToday = dateStr === today;
              const isPast = dateStr < today;
              const sessions = sessByDate[dateStr] || [];
              const dow = i % 7;
              const isSun = dow === 0, isSat = dow === 6;
              return (
                <div key={day}
                  className={`min-h-[76px] p-1.5 border-b border-r border-slate-50 ${isToday ? 'bg-indigo-50/80' : ''} ${isSat ? 'border-r-0' : ''}`}>
                  <div className={`w-6 h-6 text-[11px] font-bold flex items-center justify-center rounded-full mb-1 ${
                    isToday ? 'bg-indigo-500 text-white' :
                    isSun ? 'text-rose-400' : isSat ? 'text-blue-400' : 'text-slate-500'
                  }`}>{day}</div>
                  <div className="space-y-0.5">
                    {sessions.map((sess, si) => {
                      const pkgIdx = PACKAGES.findIndex(p => p.id === sess.pkgId);
                      const c = PKG_COLORS[pkgIdx >= 0 ? pkgIdx % PKG_COLORS.length : 0];
                      const isDone = sess.date <= today;
                      const ss = isDone ? getSessionStats(sess.id, sess.pkgId) : null;
                      return (
                        <div key={sess.id}
                          className={`px-1.5 py-0.5 rounded text-[10px] font-bold flex items-center gap-1 ${c.light} ${c.text} ${isDone ? 'opacity-70' : ''}`}>
                          {isDone
                            ? <CheckCircle size={9}/>
                            : <div className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${c.dot}`}/>
                          }
                          <span className="truncate flex-1">{sess.pkgName} {sess.name}</span>
                          {ss && <span className="flex-shrink-0 ml-auto">{ss.rate}%</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function SummaryForecast({ PACKAGES, getSessionStats, today }) {
      let totalEnrolled = 0, totalAtRisk = 0;
      PACKAGES.forEach(p => {
        totalEnrolled += p.enrolled;
        const doneSessions = p.sessions.filter(s => s.date <= today);
        if (doneSessions.length === 0) return;
        const stIds = Object.keys(doneSessions.length > 0 ? (getSessionStats(doneSessions[0].id, p.id), {}) : {});
        // 결석이 있는 수강생 수 추정: total absent / sessions done (근사치)
        const totalAbsent = doneSessions.reduce((sum, s) => sum + getSessionStats(s.id, p.id).absent, 0);
        totalAtRisk += Math.min(totalAbsent, p.enrolled);
      });
      const atRisk = Math.min(totalAtRisk, totalEnrolled);
      const safe = totalEnrolled - atRisk;
      const doneSessions = PACKAGES.flatMap(p => p.sessions.filter(s => s.date <= today));
      if (doneSessions.length === 0) return (
        <div className="bg-white border border-slate-200 rounded-2xl px-5 py-4 flex items-center gap-3 text-slate-400">
          <TrendingUp size={16}/>
          <span className="text-[13px] font-bold">수료 예측 — 진행된 회차가 없습니다</span>
        </div>
      );
      return (
        <div className="bg-white border border-slate-200 rounded-2xl overflow-hidden">
          <div className="px-5 py-3.5 border-b border-slate-100 flex items-center gap-2">
            <TrendingUp size={14} className="text-slate-400"/>
            <span className="text-[14px] font-black text-slate-800">수료 예측</span>
            <span className="text-[11px] text-slate-400 font-semibold">기준: 75% 이상</span>
            <div className="ml-auto text-[11px] text-slate-300 bg-slate-50 border border-slate-100 px-2.5 py-1 rounded-lg flex items-center gap-1">
              <Info size={10}/> {doneSessions.length}회차 완료 기준 — 최종 결과 변동 가능
            </div>
          </div>
          <div className="p-5 space-y-3">
            {[
              { label: '수료 가능', count: safe, color: 'bg-emerald-500', text: 'text-emerald-600', note: '현재 출석 기준 이후 전 회차 참석 시' },
              { label: '수료 위험', count: atRisk, color: 'bg-amber-400', text: 'text-amber-600', note: '결석 발생 — 기준 미달 가능성', action: atRisk > 0 },
            ].map(row => (
              <div key={row.label} className="flex items-center gap-3">
                <div className="w-20 text-[12px] font-bold text-slate-600 flex-shrink-0">{row.label}</div>
                <div className="flex-1 h-3 bg-slate-100 rounded-full overflow-hidden">
                  <div className={`h-full rounded-full transition-all duration-700 ${row.color}`}
                       style={{ width: `${totalEnrolled > 0 ? row.count / totalEnrolled * 100 : 0}%` }}/>
                </div>
                <div className={`w-20 text-[13px] font-black flex-shrink-0 ${row.text}`}>
                  {row.count}명
                  <span className="text-[11px] font-bold ml-0.5">
                    ({totalEnrolled > 0 ? Math.round(row.count / totalEnrolled * 100) : 0}%)
                  </span>
                </div>
                <div className="text-[11px] text-slate-400 flex-1 hidden lg:block">{row.note}</div>
                {row.action && (
                  <button onClick={() => {}}
                    className="flex-shrink-0 flex items-center gap-1 text-[11px] font-bold text-amber-600 hover:text-amber-700 bg-amber-50 border border-amber-200 px-2.5 py-1 rounded-lg transition-colors">
                    수강 탭에서 확인
                  </button>
                )}
              </div>
            ))}
            <div className="pt-2 text-[11px] text-slate-300 border-t border-slate-50">
              수료 확정 인원은 전 회차 완료 후 산정됩니다
            </div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
