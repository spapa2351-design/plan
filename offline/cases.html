                  <div className="flex items-center gap-2 mb-0.5">
                    <span className="text-[11px] font-bold text-white/70">케이스 {c.id}</span>
                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full border ${FREQ_BADGE[c.freq]} bg-white/90`}>{c.freq}</span>
                  </div>
                  <h3 className="text-[16px] font-black leading-tight">{c.title}</h3>
                </div>
              </div>
              <span className="text-[11px] font-bold bg-white/20 px-2.5 py-1 rounded-lg whitespace-nowrap shrink-0">{c.structure}</span>
            </div>
            <p className="text-[12px] text-white/75 mt-2.5 leading-relaxed">{c.desc}</p>
          </div>

          {/* 사례 탭 */}
          <div className="flex border-b border-slate-100">
            {c.stories.map((s, i) => (
              <button
                key={i}
                onClick={() => setActive(i)}
                className={`flex-1 py-2.5 text-[13px] font-bold transition-colors border-b-2
                  ${active === i ? `${col.tab} bg-slate-50` : 'border-transparent text-slate-400 hover:text-slate-600 hover:bg-slate-50'}`}
              >
                {s.label} — {s.title}
              </button>
            ))}
          </div>

          {/* 사례 내용 */}
          <div className="p-4 flex-1 fade-in" key={active}>
            <Row label="배경" value={story.bg}/>
            <Row label="일정/차수" value={story.schedule}/>
            <Row label="신청 방식" value={story.enroll}/>
            <Row label="수료 조건" value={story.completion}/>
            <Row label="관리자 액션" value={story.action}/>
            <div className="flex gap-3 py-2.5 border-b border-slate-100">
              <span className="text-[12px] font-bold text-slate-400 w-[88px] shrink-0 pt-0.5">시스템 요구</span>
              <div className="flex flex-wrap gap-1.5 flex-1">
                {story.requirements.map((r, i) => (
                  <span key={i} className={`text-[11px] font-bold px-2 py-0.5 rounded-md border ${col.light} ${col.border} text-slate-700`}>{r}</span>
                ))}
              </div>
            </div>
            {story.gap && (
              <div className="mt-3 flex items-start gap-2 bg-rose-50 border border-rose-200 rounded-xl px-3.5 py-2.5">
                <AlertCircle size={14} className="text-rose-500 mt-0.5 shrink-0"/>
                <div>
                  <span className="text-[11px] font-black text-rose-600 block mb-0.5">설계 갭 발견</span>
                  <span className="text-[12px] text-rose-700">{story.gap}</span>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const App = () => (
      <div className="min-h-screen">
        {/* 헤더 */}
        <header className="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
          <div className="max-w-[1400px] mx-auto px-8 py-4 flex items-center gap-4">
            <a href="admin-index.html" className="w-8 h-8 bg-slate-100 text-slate-500 rounded-lg flex items-center justify-center hover:bg-slate-200 transition-colors">
              <ChevronLeft size={18}/>
            </a>
            <div className="w-8 h-8 bg-indigo-600 text-white rounded-lg flex items-center justify-center shadow-sm">
              <BookOpen size={16}/>
            </div>
            <div>
              <h1 className="text-[17px] font-black text-slate-900 leading-none mb-0.5">오프라인 코스 — 운영 케이스</h1>
              <p className="text-[12px] text-slate-400 font-medium">Phase 1 실제 운영 시나리오 · 케이스 6개 · 사례 12개</p>
            </div>
            <div className="ml-auto flex items-center gap-3">
              {['매우 높음', '높음', '중간'].map(f => (
                <span key={f} className={`text-[11px] font-bold px-2.5 py-1 rounded-full border ${FREQ_BADGE[f]}`}>
                  현업 빈도 {f}
                </span>
              ))}
            </div>
          </div>
        </header>

        <div className="max-w-[1400px] mx-auto px-8 py-10">

          {/* 인트로 배너 */}
          <div className="bg-white border border-slate-200 rounded-2xl shadow-sm px-6 py-5 mb-8 flex items-start gap-4">
            <div className="w-10 h-10 bg-indigo-50 border border-indigo-200 rounded-xl flex items-center justify-center shrink-0">
              <Info size={18} className="text-indigo-600"/>
            </div>
            <div>
              <p className="text-[14px] font-bold text-slate-800 mb-1">이 페이지는 시스템 설계 검증용 케이스 문서입니다.</p>
              <p className="text-[13px] text-slate-500 leading-relaxed">
                Phase 1 오프라인 전용 운영에서 실제로 발생하는 6가지 패턴을 현업 스토리로 구체화했습니다.
                각 케이스의 "시스템 요구사항"과 "설계 갭"이 개발 우선순위의 근거가 됩니다.
              </p>
            </div>
          </div>

          {/* 케이스 그리드 */}
          <div className="grid grid-cols-2 gap-6 mb-10">
            {CASES.map(c => <CaseCard key={c.id} c={c}/>)}
          </div>

          {/* 설계 갭 요약 */}
          <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
            <div className="bg-rose-600 px-6 py-4 flex items-center gap-2 text-white">
              <AlertTriangle size={18}/>
              <h2 className="text-[15px] font-black">운영 케이스에서 발견된 설계 갭</h2>
              <span className="ml-auto text-[12px] bg-white/20 px-2.5 py-1 rounded-lg font-bold">미구현 항목 {GAPS.length}개</span>
            </div>
            <div className="divide-y divide-slate-100">
              {GAPS.map((g, i) => (
                <div key={i} className="flex items-center gap-4 px-6 py-4 hover:bg-slate-50 transition-colors">
                  <div className="w-6 h-6 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center text-[11px] font-black shrink-0">{i+1}</div>
                  <div className="flex-1">
                    <p className="text-[14px] font-bold text-slate-800">{g.text}</p>
                    <p className="text-[12px] text-slate-400 mt-0.5">발견 케이스: {g.cases}</p>
                  </div>
                  <span className={`text-[11px] font-black px-2.5 py-1 rounded-full border whitespace-nowrap
                    ${g.priority === '높음' ? 'bg-rose-50 text-rose-600 border-rose-200' : 'bg-amber-50 text-amber-600 border-amber-200'}`}>
                    우선순위 {g.priority}
                  </span>
                </div>
              ))}
            </div>
            <div className="bg-slate-50 border-t border-slate-100 px-6 py-3 flex items-center gap-2">
              <ArrowRight size={13} className="text-slate-400"/>
              <span className="text-[12px] text-slate-500 font-medium">우선순위 높음 항목은 admin1.html 섹션 4 수료 조건 및 admin1-1.html 요약 탭 개선으로 연결됩니다.</span>
            </div>
          </div>

        </div>
      </div>
    );

    createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
