<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카테고리</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #5569ff;
      --primary-lighter: #EEF0FF;
      --secondary: #6E759F;
      --black: #223354;
      --body-bg: #f2f5f9;
      --white: #ffffff;
      --border: rgba(34,51,84,.10);
      --r: 10px; --r-lg: 16px; --r-xl: 20px;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Pretendard','Inter',sans-serif;
      font-size: 14px; color: var(--black); background: var(--body-bg);
    }

    /* ── 앱 ── */
    .app {
      max-width: 390px; width: 100%; margin: 0 auto; min-height: 100vh;
      background: var(--white); position: relative;
      box-shadow: 0 0 0 1px var(--border);
      display: flex; flex-direction: column;
    }
    @media (min-width: 768px) {
      body { background: #e8ecf4; display: flex; align-items: center; justify-content: center; padding: 32px 16px; min-height: 100vh; }
      .app { border-radius: var(--r-lg); box-shadow: 0 20px 60px rgba(34,51,84,.18); overflow: hidden; width: 390px; height: 860px; min-height: auto; }
    }

    /* ── 헤더 ── */
    .top-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px 14px;
    }
    .top-header h1 { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; flex: 1; }
    .top-icons { display: flex; gap: 12px; align-items: center; }
    .top-icon {
      width: 34px; height: 34px; border-radius: 50%; background: transparent;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: var(--black); cursor: pointer; border: none;
      position: relative;
    }
    .top-icon .noti-count {
      position: absolute; top: -2px; right: -4px;
      min-width: 18px; height: 18px; padding: 0 5px;
      border-radius: 10px; background: var(--primary); color: #fff;
      font-size: 10px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── 검색 ── */
    .search-bar {
      margin: 4px 20px 16px; position: relative;
    }
    .search-bar input {
      width: 100%; padding: 12px 16px 12px 40px;
      border: 1px solid var(--border); border-radius: var(--r-lg);
      background: #F6F8FB; font-size: 14px; font-weight: 500;
      color: var(--black); outline: none;
      font-family: inherit;
    }
    .search-bar input::placeholder { color: #A0AEC0; }
    .search-bar input:focus { border-color: var(--primary); background: var(--white); }
    .search-bar .icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: #A0AEC0; font-size: 14px;
    }

    /* ── 필터 탭 ── */
    .filter-tabs {
      display: flex; gap: 8px; padding: 0 20px 20px;
    }
    .filter-tab {
      padding: 8px 18px; border-radius: 24px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      border: 1.5px solid var(--border); background: var(--white); color: var(--secondary);
      transition: all .15s; display: flex; align-items: center; gap: 5px;
      font-family: inherit;
    }
    .filter-tab:hover { border-color: #CBD5E1; }
    .filter-tab.active {
      background: var(--black); color: var(--white); border-color: var(--black);
    }
    .filter-tab .tab-icon { font-size: 12px; }

    /* ── 스크롤 ── */
    .scroll-area { flex: 1; overflow-y: auto; }

    /* ── 섹션 ── */
    .section-label {
      padding: 0 20px; margin-bottom: 14px; margin-top: 8px;
      font-size: 18px; font-weight: 900; color: var(--black);
      letter-spacing: -0.3px;
    }

    /* ── 카테고리 그리드 ── */
    .cat-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; padding: 0 20px; margin-bottom: 28px;
    }
    .cat-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-radius: var(--r-lg);
      border: 1.5px solid var(--border); background: var(--white);
      cursor: pointer; transition: all .15s;
      font-family: inherit;
    }
    .cat-item:hover { border-color: #CBD5E1; background: #FAFBFC; }
    .cat-item:active { transform: scale(0.98); }
    .cat-label {
      font-size: 14px; font-weight: 700; color: var(--black);
    }
    .cat-arrow {
      font-size: 12px; color: #CBD5E1; transition: color .15s;
    }
    .cat-item:hover .cat-arrow { color: var(--secondary); }

    /* 오프라인 전용 카테고리 강조 */
    .cat-item.offline-cat {
      border-color: rgba(85,105,255,.15); background: #FAFAFF;
    }
    .cat-item.offline-cat:hover { border-color: rgba(85,105,255,.3); background: #F5F6FF; }
    .cat-item.offline-cat .cat-icon {
      font-size: 13px; color: var(--primary); margin-right: 6px;
    }

    /* ── 하단 탭바 ── */
    .tab-bar {
      display: flex; justify-content: space-around; align-items: center;
      padding: 10px 0 env(safe-area-inset-bottom, 8px);
      background: var(--white);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      font-size: 10px; font-weight: 600; color: #A0AEC0;
      cursor: pointer; border: none; background: none; padding: 4px 12px;
      font-family: inherit;
    }
    .tab-item.active { color: var(--primary); }
    .tab-item i { font-size: 18px; }

  </style>
</head>
<body>

<div class="app">

  <!-- ── 헤더 ── -->
  <div class="top-header">
    <button class="top-icon" onclick="history.back()" style="margin-right:4px;"><i class="fa-solid fa-chevron-left"></i></button>
    <h1>카테고리</h1>
    <div class="top-icons">
      <button class="top-icon">
        <i class="fa-solid fa-right-left"></i>
        <span class="noti-count">23</span>
      </button>
      <button class="top-icon"><i class="fa-regular fa-clone"></i></button>
    </div>
  </div>

  <!-- ── 검색 ── -->
  <div class="search-bar">
    <i class="fa-solid fa-magnifying-glass icon"></i>
    <input type="text" placeholder="어떤 코스를 찾으세요?">
  </div>

  <!-- ── 필터 탭 ── -->
  <div class="filter-tabs" id="filter-tabs">
    <button class="filter-tab active" onclick="clickFilter(this,'all')">전체</button>
    <button class="filter-tab" onclick="clickFilter(this,'online')">온라인만</button>
    <button class="filter-tab" onclick="clickFilter(this,'offline')"><i class="fa-solid fa-location-dot tab-icon"></i> 오프라인만</button>
  </div>

  <div class="scroll-area">

    <!-- ===== 전체 뷰 ===== -->
    <div id="view-all">
      <!-- 일반 코스 -->
      <div class="section-label" id="label-general">코스</div>
      <div class="cat-grid" id="grid-general">
        <button class="cat-item" data-type="online"><span class="cat-label">라이브</span><i class="fa-solid fa-chevron-right cat-arrow"></i></button>
        <button class="cat-item" data-type="online"><span class="cat-label">성과관리</span><i class="fa-solid fa-chevron-right cat-arrow"></i></button>
        <button class="cat-item" data-type="online"><span class="cat-label">특별강의</span><i class="fa-solid fa-chevron-right cat-arrow"></i></button>
        <button class="cat-item" data-type="online"><span class="cat-label">가이드</span><i class="fa-solid fa-chevron-right cat-arrow"></i></button>
        <button class="cat-item" data-type="online"><span class="cat-label">메디컬 강의</span><i class="fa-solid fa-chevron-right cat-arrow"></i></button>
        <button class="cat-item" data-type="online"><span class="cat-label">소통</span><i class="fa-solid fa-chevron-right cat-arrow"></i></button>
        <button class="cat-item" data-type="online"><span class="cat-label">비즈니스 경영</span><i class="fa-solid fa-chevron-right cat-arrow"></i></button>
        <button class="cat-item" data-type="online"><span class="cat-label">서비스 기획</span><i class="fa-solid fa-chevron-right cat-arrow"></i></button>
        <button class="cat-item" data-type="online"><span class="cat-label">교육과정</span><i class="fa-solid fa-chevron-right cat-arrow"></i></button>
        <button class="cat-item" data-type="online"><span class="cat-label">4차 산업혁명</span><i class="fa-solid fa-chevron-right cat-arrow"></i></button>
      </div>

      <!-- PLUS 코스 -->
      <div class="section-label" id="label-plus">PLUS 코스</div>
      <div class="cat-grid" id="grid-plus">
        <button class="cat-item" data-type="online"><span class="cat-label">ESG강의</span><i class="fa-solid fa-chevron-right cat-arrow"></i></button>
        <button class="cat-item" data-type="online"><span class="cat-label">교육과정</span><i class="fa-solid fa-chevron-right cat-arrow"></i></button>
        <button class="cat-item" data-type="online"><span class="cat-label">어학</span><i class="fa-solid fa-chevron-right cat-arrow"></i></button>
        <button class="cat-item" data-type="online"><span class="cat-label">자격증</span><i class="fa-solid fa-chevron-right cat-arrow"></i></button>
      </div>

      <!-- 오프라인 코스 -->
      <div class="section-label" id="label-offline">오프라인 코스</div>
      <div class="cat-grid" id="grid-offline">
        <button class="cat-item offline-cat" data-type="offline" onclick="location.href='course-list-badges.html'"><span class="cat-label"><i class="fa-solid fa-location-dot cat-icon"></i>직무교육</span><i class="fa-solid fa-chevron-right cat-arrow"></i></button>
        <button class="cat-item offline-cat" data-type="offline" onclick="location.href='course-list-badges.html'"><span class="cat-label"><i class="fa-solid fa-location-dot cat-icon"></i>리더십</span><i class="fa-solid fa-chevron-right cat-arrow"></i></button>
        <button class="cat-item offline-cat" data-type="offline" onclick="location.href='course-list-badges.html'"><span class="cat-label"><i class="fa-solid fa-location-dot cat-icon"></i>법정의무교육</span><i class="fa-solid fa-chevron-right cat-arrow"></i></button>
        <button class="cat-item offline-cat" data-type="offline" onclick="location.href='course-list-badges.html'"><span class="cat-label"><i class="fa-solid fa-location-dot cat-icon"></i>워크숍</span><i class="fa-solid fa-chevron-right cat-arrow"></i></button>
        <button class="cat-item offline-cat" data-type="offline" onclick="location.href='course-list-badges.html'"><span class="cat-label"><i class="fa-solid fa-location-dot cat-icon"></i>신입사원</span><i class="fa-solid fa-chevron-right cat-arrow"></i></button>
        <button class="cat-item offline-cat" data-type="offline" onclick="location.href='course-list-badges.html'"><span class="cat-label"><i class="fa-solid fa-location-dot cat-icon"></i>외부연수</span><i class="fa-solid fa-chevron-right cat-arrow"></i></button>
      </div>
    </div>

  </div>

  <!-- ── 하단 탭바 ── -->
  <div class="tab-bar">
    <button class="tab-item" onclick="location.href='home.html'"><i class="fa-solid fa-house"></i><span>홈</span></button>
    <button class="tab-item active"><i class="fa-solid fa-bars-staggered"></i><span>카테고리</span></button>
    <button class="tab-item"><i class="fa-solid fa-play"></i><span>숏클</span></button>
    <button class="tab-item"><i class="fa-solid fa-ellipsis"></i><span>더보기</span></button>
    <button class="tab-item" onclick="location.href='user-my.html'"><i class="fa-solid fa-user"></i><span>MY</span></button>
  </div>

</div>

<script>
/* URL 파라미터로 필터 자동 적용 */
(function() {
  const params = new URLSearchParams(location.search);
  const filter = params.get('filter');
  if (filter) {
    const tabs = document.querySelectorAll('.filter-tab');
    tabs.forEach(t => t.classList.remove('active'));
    if (filter === 'offline') { tabs[2].classList.add('active'); applyFilter('offline'); }
    else if (filter === 'online') { tabs[1].classList.add('active'); applyFilter('online'); }
  }
})();

function clickFilter(el, type) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  applyFilter(type);
}

function applyFilter(type) {
  const labelGeneral = document.getElementById('label-general');
  const gridGeneral = document.getElementById('grid-general');
  const labelPlus = document.getElementById('label-plus');
  const gridPlus = document.getElementById('grid-plus');
  const labelOffline = document.getElementById('label-offline');
  const gridOffline = document.getElementById('grid-offline');

  if (type === 'all') {
    labelGeneral.style.display = '';  gridGeneral.style.display = '';
    labelPlus.style.display = '';     gridPlus.style.display = '';
    labelOffline.style.display = '';  gridOffline.style.display = '';
  } else if (type === 'online') {
    labelGeneral.style.display = '';  gridGeneral.style.display = '';
    labelPlus.style.display = '';     gridPlus.style.display = '';
    labelOffline.style.display = 'none'; gridOffline.style.display = 'none';
  } else {
    labelGeneral.style.display = 'none'; gridGeneral.style.display = 'none';
    labelPlus.style.display = 'none';    gridPlus.style.display = 'none';
    labelOffline.style.display = '';     gridOffline.style.display = '';
  }
}
</script>

</body>
</html>
