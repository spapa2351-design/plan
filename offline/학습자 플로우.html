<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Flow - Offline Course</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 40px; background-color: #f2f5f9; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; 
        }
        svg { max-width: 100%; height: auto; font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body>

<svg viewBox="0 0 1200 650" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Arrowhead Markers -->
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#5569ff" />
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF1943" />
        </marker>
        <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8" />
        </marker>
        <!-- Drop Shadow for Cards -->
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#223354" flood-opacity="0.08"/>
        </filter>
    </defs>

    <!-- Title & Subtitle -->
    <text x="50" y="50" font-size="28" font-weight="800" fill="#111827">오프라인 코스 수강생 User Flow</text>
    <text x="50" y="80" font-size="15" font-weight="600" fill="#6B7280">상세 페이지부터 수강 신청 완료 및 일정 변경/취소까지의 전체 화면 흐름</text>

    <!-- Legend -->
    <g transform="translate(900, 30)">
        <rect x="0" y="0" width="20" height="20" rx="4" fill="#fff" stroke="#5569ff" stroke-width="2"/>
        <text x="30" y="14" font-size="13" font-weight="600" fill="#475569">일반 화면 (Screen)</text>
        <rect x="150" y="0" width="20" height="20" rx="4" fill="#fff" stroke="#5569ff" stroke-width="2" stroke-dasharray="4,3"/>
        <text x="180" y="14" font-size="13" font-weight="600" fill="#475569">팝업/시트 (Modal)</text>
    </g>

    <!-- ==================== EDGES (ARROWS) ==================== -->
    
    <!-- 1 -> 2 (수강 신청하기) -->
    <path d="M 250 180 L 335 180" fill="none" stroke="#5569ff" stroke-width="3" marker-end="url(#arrow-blue)"/>
    <text x="292" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#5569ff">수강 신청하기</text>

    <!-- 2 -> 3 (선택 완료) -->
    <path d="M 550 180 L 635 180" fill="none" stroke="#5569ff" stroke-width="3" marker-end="url(#arrow-blue)"/>
    <text x="592" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#5569ff">선택 완료</text>

    <!-- 3 -> 4 (최종 수강 신청) -->
    <path d="M 850 180 L 935 180" fill="none" stroke="#5569ff" stroke-width="3" marker-end="url(#arrow-blue)"/>
    <text x="892" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#5569ff">최종 수강 신청</text>

    <!-- 4 -> 5 (확인) -->
    <path d="M 1050 240 L 1050 335" fill="none" stroke="#10B981" stroke-width="3" marker-end="url(#arrow-green)"/>
    <text x="1065" y="292" font-size="13" font-weight="700" fill="#10B981">확인 (팝업 닫기)</text>

    <!-- 5 -> 6 (수강 취소) -->
    <path d="M 950 410 L 865 410" fill="none" stroke="#FF1943" stroke-width="3" marker-end="url(#arrow-red)"/>
    <text x="907" y="400" text-anchor="middle" font-size="13" font-weight="700" fill="#FF1943">✕ 수강 취소</text>

    <!-- 6 -> 7 (네, 취소합니다) -->
    <path d="M 650 410 L 565 410" fill="none" stroke="#FF1943" stroke-width="3" marker-end="url(#arrow-red)"/>
    <text x="607" y="400" text-anchor="middle" font-size="13" font-weight="700" fill="#FF1943">네, 취소합니다</text>

    <!-- 6 -> 5 (아니오 / 닫기) -->
    <path d="M 750 470 L 750 510 L 1000 510 L 1000 485" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow-gray)"/>
    <text x="875" y="500" text-anchor="middle" font-size="12" font-weight="700" fill="#64748B">아니오 (팝업 닫기)</text>

    <!-- 5 -> 1 (일정 변경 Loop) -->
    <path d="M 1050 470 L 1050 580 L 150 580 L 150 255" fill="none" stroke="#5569ff" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrow-blue)"/>
    <rect x="500" y="567" width="200" height="26" fill="#f2f5f9" />
    <text x="600" y="585" text-anchor="middle" font-size="14" font-weight="700" fill="#5569ff">🔄 일정 변경 (모달 자동 오픈)</text>


    <!-- ==================== NODES (SCREENS & MODALS) ==================== -->

    <!-- Node 1: 코스 상세 -->
    <g transform="translate(50, 120)">
        <rect width="200" height="120" rx="12" fill="#fff" stroke="#5569ff" stroke-width="2.5" filter="url(#shadow)"/>
        <path d="M 0 12 A 12 12 0 0 1 12 0 L 188 0 A 12 12 0 0 1 200 12 L 200 40 L 0 40 Z" fill="#EEF0FF"/>
        <text x="100" y="25" text-anchor="middle" font-size="15" font-weight="800" fill="#4454CC">① 코스 상세 보기</text>
        <text x="100" y="65" text-anchor="middle" font-size="13" font-weight="600" fill="#6E759F">교육 정보 확인 및</text>
        <text x="100" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#6E759F">커리큘럼(아코디언) 탐색</text>
        <rect x="60" y="98" width="80" height="20" rx="10" fill="#f2f5f9"/>
        <text x="100" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#6E759F">일반 화면</text>
    </g>

    <!-- Node 2: 수강 일정 선택 (Modal) -->
    <g transform="translate(350, 120)">
        <rect width="200" height="120" rx="12" fill="#fff" stroke="#5569ff" stroke-width="2.5" stroke-dasharray="6,4" filter="url(#shadow)"/>
        <path d="M 0 12 A 12 12 0 0 1 12 0 L 188 0 A 12 12 0 0 1 200 12 L 200 40 L 0 40 Z" fill="#EEF0FF"/>
        <text x="100" y="25" text-anchor="middle" font-size="15" font-weight="800" fill="#4454CC">② 수강 일정 선택</text>
        <text x="100" y="65" text-anchor="middle" font-size="13" font-weight="600" fill="#6E759F">캘린더 연동 및</text>
        <text x="100" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#6E759F">규칙별 옵션 선택</text>
        <rect x="50" y="98" width="100" height="20" rx="10" fill="#223354"/>
        <text x="100" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">바텀 시트 (Modal)</text>
    </g>

    <!-- Node 3: 신청 확인 -->
    <g transform="translate(650, 120)">
        <rect width="200" height="120" rx="12" fill="#fff" stroke="#5569ff" stroke-width="2.5" filter="url(#shadow)"/>
        <path d="M 0 12 A 12 12 0 0 1 12 0 L 188 0 A 12 12 0 0 1 200 12 L 200 40 L 0 40 Z" fill="#EEF0FF"/>
        <text x="100" y="25" text-anchor="middle" font-size="15" font-weight="800" fill="#4454CC">③ 신청 확인</text>
        <text x="100" y="65" text-anchor="middle" font-size="13" font-weight="600" fill="#6E759F">선택한 정보</text>
        <text x="100" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#6E759F">최종 재확인 단계</text>
        <rect x="60" y="98" width="80" height="20" rx="10" fill="#f2f5f9"/>
        <text x="100" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#6E759F">일반 화면</text>
    </g>

    <!-- Node 4: 신청 완료 (Modal) -->
    <g transform="translate(950, 120)">
        <rect width="200" height="120" rx="12" fill="#fff" stroke="#10B981" stroke-width="2.5" stroke-dasharray="6,4" filter="url(#shadow)"/>
        <path d="M 0 12 A 12 12 0 0 1 12 0 L 188 0 A 12 12 0 0 1 200 12 L 200 40 L 0 40 Z" fill="#D1FAE5"/>
        <text x="100" y="25" text-anchor="middle" font-size="15" font-weight="800" fill="#059669">④ 신청 완료</text>
        <text x="100" y="65" text-anchor="middle" font-size="13" font-weight="600" fill="#6E759F">완료 축하 메시지 및</text>
        <text x="100" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#6E759F">확인 버튼 노출</text>
        <rect x="50" y="98" width="100" height="20" rx="10" fill="#223354"/>
        <text x="100" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">중앙 팝업 (Modal)</text>
    </g>

    <!-- Node 5: 내 수강 내역 -->
    <g transform="translate(950, 350)">
        <rect width="200" height="120" rx="12" fill="#fff" stroke="#223354" stroke-width="2.5" filter="url(#shadow)"/>
        <path d="M 0 12 A 12 12 0 0 1 12 0 L 188 0 A 12 12 0 0 1 200 12 L 200 40 L 0 40 Z" fill="#E2E8F0"/>
        <text x="100" y="25" text-anchor="middle" font-size="15" font-weight="800" fill="#1E293B">⑤ 내 수강 내역</text>
        <text x="100" y="65" text-anchor="middle" font-size="13" font-weight="600" fill="#6E759F">신청된 코스 확인 및</text>
        <text x="100" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#6E759F">일정 변경 / 수강 취소</text>
        <rect x="60" y="98" width="80" height="20" rx="10" fill="#f2f5f9"/>
        <text x="100" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#6E759F">일반 화면</text>
    </g>

    <!-- Node 6: 수강 취소 확인 (Modal) -->
    <g transform="translate(650, 350)">
        <rect width="200" height="120" rx="12" fill="#fff" stroke="#FF1943" stroke-width="2.5" stroke-dasharray="6,4" filter="url(#shadow)"/>
        <path d="M 0 12 A 12 12 0 0 1 12 0 L 188 0 A 12 12 0 0 1 200 12 L 200 40 L 0 40 Z" fill="#FFE4E6"/>
        <text x="100" y="25" text-anchor="middle" font-size="15" font-weight="800" fill="#E11D48">⑥ 수강 취소 팝업</text>
        <text x="100" y="65" text-anchor="middle" font-size="13" font-weight="600" fill="#6E759F">취소 주의사항 안내 및</text>
        <text x="100" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#6E759F">최종 의사 확인</text>
        <rect x="50" y="98" width="100" height="20" rx="10" fill="#223354"/>
        <text x="100" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">중앙 팝업 (Modal)</text>
    </g>

    <!-- Node 7: 취소 완료 -->
    <g transform="translate(350, 350)">
        <rect width="200" height="120" rx="12" fill="#fff" stroke="#FF1943" stroke-width="2.5" filter="url(#shadow)"/>
        <path d="M 0 12 A 12 12 0 0 1 12 0 L 188 0 A 12 12 0 0 1 200 12 L 200 40 L 0 40 Z" fill="#FFE4E6"/>
        <text x="100" y="25" text-anchor="middle" font-size="15" font-weight="800" fill="#E11D48">⑦ 취소 완료</text>
        <text x="100" y="65" text-anchor="middle" font-size="13" font-weight="600" fill="#6E759F">취소 처리 결과 안내</text>
        <text x="100" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#6E759F">(홈/상세로 복귀 안내)</text>
        <rect x="60" y="98" width="80" height="20" rx="10" fill="#f2f5f9"/>
        <text x="100" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#6E759F">일반 화면</text>
    </g>

</svg>

</body>
</html>
