<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오프라인 코스 등록 (통합 패키지 모델)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator,
    input[type="datetime-local"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }
    .drag-ghost { opacity: 0.35; }
    .drag-over-opt { border-color: #6366f1 !important; box-shadow: 0 0 0 3px rgba(99,102,241,0.2) !important; }
    .drag-over-sess { border-color: #6366f1 !important; background: #eef2ff !important; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased overflow-y-auto custom-scrollbar">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import * as Lucide from 'https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0,react-dom@18.2.0';

    const {
      Plus, Trash2, MapPin, Copy, Calendar, QrCode, Smartphone, X, CheckSquare,
      Wand2, ChevronLeft, ChevronRight, ChevronUp, User, Users, MousePointerClick, ChevronDown, GripVertical,
      Save, Send, Clock, Check, AlertTriangle, Eye, FileText, CircleDot
    } = Lucide;

    const Toggle = ({ active, onClick }) => (
      <div onClick={onClick} className={`w-10 h-6 rounded-full relative cursor-pointer transition-colors ${active ? 'bg-indigo-600' : 'bg-slate-300'}`}>
        <div className={`w-4 h-4 bg-white rounded-full absolute top-1 transition-all shadow-sm ${active ? 'left-5' : 'left-1'}`}></div>
      </div>
    );

    /* ── QR 출석부 모달 ── */
    const QrModal = ({ session, optionName, courseTitle, onClose }) => {
      const qrData = `출석체크|${courseTitle}|${optionName}|${session.date}|${session.startTime}~${session.endTime}`;
      const qrUrl = `https://chart.googleapis.com/chart?cht=qr&chl=${encodeURIComponent(qrData)}&chs=220x220&choe=UTF-8&chld=M`;
      return (
        <div className="fixed inset-0 bg-slate-900/80 z-[200] flex items-center justify-center animate-fadeIn" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl p-8 w-[320px] flex flex-col items-center gap-5" onClick={e => e.stopPropagation()}>
            <div className="text-center">
              <div className="inline-flex items-center gap-1.5 bg-indigo-50 border border-indigo-200 text-indigo-600 text-[11px] font-bold px-3 py-1 rounded-full mb-3">
                <QrCode size={12}/> 전용 출석 QR 코드
              </div>
              <div className="text-[16px] font-black text-slate-900">{optionName}</div>
              <div className="text-[12px] text-slate-500 mt-1">{session.date} &nbsp;·&nbsp; {session.startTime} ~ {session.endTime}</div>
            </div>
            <div className="bg-slate-50 border-2 border-slate-200 rounded-2xl p-4 shadow-inner">
              <img src={qrUrl} alt="QR Code" className="w-[200px] h-[200px] rounded"/>
            </div>
            <p className="text-center text-[11px] text-slate-400 leading-relaxed">
              학습자가 이 QR을 스캔하면<br/>출석이 자동으로 체크됩니다.
            </p>
            <button onClick={onClose} className="w-full py-3 bg-slate-900 text-white rounded-xl text-[13px] font-bold hover:bg-slate-800 transition-colors">닫기</button>
          </div>
        </div>
      );
    };

    /* ── URL 파라미터로 편집/등록 모드 구분 ── */
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('courseId');
    const isEditMode = !!courseId;

    /* ── Main App ── */
    const App = () => {
      const [courseInfo, setCourseInfo] = useState(isEditMode ? {
        title: '2026 직무교육 — 프로젝트 관리 심화',
        category: '직무 역량',
        instructor: '김민준',
        instructorDesc: '프로젝트 관리 전문가 · A등급 강사',
        intro: '',
        location: '한샘 HQ 대교육장 B동 3층',
        address: '',
        traffic: '강남역 3번 출구 도보 5분 거리. 지하 주차장 이용 시 무료 주차권 지급.'
      } : {
        title: '',
        category: '',
        instructor: '',
        instructorDesc: '',
        intro: '',
        location: '',
        address: '',
        traffic: ''
      });

      const [regPeriod, setRegPeriod] = useState({ start: '2026-04-10T09:00', end: '2026-04-25T18:00' });
      const [cancelPolicy, setCancelPolicy] = useState({ enabled: false, mode: 'allowed', relativeValue: 3, relativeUnit: 'day' });
      // mode: 'allowed' = 기한부 취소 가능 | 'blocked' = 취소 불가
      const [changePolicy, setChangePolicy] = useState({ enabled: false, relativeValue: 5, relativeUnit: 'day' });
      const [isSelfEnroll, setIsSelfEnroll] = useState(true);
      const [isPreviewOpen, setIsPreviewOpen] = useState(false);
      const [selectionRule, setSelectionRule] = useState('single');
      const [minSelect, setMinSelect] = useState(2);
      const [maxSelect, setMaxSelect] = useState(3);
      const [selectedMobileOptions, setSelectedMobileOptions] = useState([]);
      const [qrModal, setQrModal] = useState(null);
      const [collapsedOpts, setCollapsedOpts] = useState({});
      const toggleCollapse = (optId) => setCollapsedOpts(prev => ({ ...prev, [optId]: !prev[optId] }));

      /* ── 코스 상태 & 퍼블리싱 ── */
      const [courseStatus, setCourseStatus] = useState(isEditMode ? 'published' : 'draft'); // draft | saved | published
      const [lastSavedAt, setLastSavedAt] = useState(null);
      const [showPublishModal, setShowPublishModal] = useState(false);
      const [publishType, setPublishType] = useState('now'); // now | scheduled
      const [publishSchedule, setPublishSchedule] = useState('');

      const statusLabel = { draft: '초안', saved: '임시저장', published: '퍼블리싱됨' };
      const statusColor = { draft: 'bg-slate-100 text-slate-500 border-slate-200', saved: 'bg-amber-50 text-amber-700 border-amber-200', published: 'bg-emerald-50 text-emerald-700 border-emerald-200' };

      const handleSaveDraft = () => {
        setCourseStatus('saved');
        setLastSavedAt(new Date());
      };

      const getValidation = () => [
        { label: '코스명 입력', ok: !!courseInfo.title.trim() },
        { label: '담당 강사 지정', ok: !!courseInfo.instructor.trim() },
        { label: '교육 장소 설정', ok: !!courseInfo.location.trim() },
        { label: '신청 기간 설정', ok: !!regPeriod.start && !!regPeriod.end },
        { label: '최소 1개 패키지 생성', ok: options.length > 0 },
        { label: '모든 패키지에 회차 존재', ok: options.every(o => o.sessions.length > 0) },
        { label: '모든 회차 날짜/시간 설정', ok: options.every(o => o.sessions.every(s => s.date && s.startTime && s.endTime)) },
      ];

      const handlePublish = () => {
        const checks = getValidation();
        if (checks.some(c => !c.ok)) return;
        setCourseStatus('published');
        setShowPublishModal(false);
        setLastSavedAt(new Date());
      };

      // 더미 그룹 목록 (실제 환경에서는 API 연동)
      const allGroups = [
        { id: 'g1', name: '개발팀', count: 12 },
        { id: 'g2', name: '디자인팀', count: 8 },
        { id: 'g3', name: '마케팅팀', count: 15 },
        { id: 'g4', name: '영업팀', count: 20 },
        { id: 'g5', name: '인사팀', count: 6 },
        { id: 'g6', name: '재무팀', count: 9 },
        { id: 'g7', name: '기획팀', count: 11 },
      ];
      const [groupDropdownOptId, setGroupDropdownOptId] = useState(null); // 드롭다운 열린 optId
      useEffect(() => {
        const close = () => setGroupDropdownOptId(null);
        document.addEventListener('click', close);
        return () => document.removeEventListener('click', close);
      }, []);

      const handleAddGroup = (optId, group) => {
        setOptions(options.map(opt => {
          if (opt.id !== optId) return opt;
          if ((opt.groups || []).find(g => g.id === group.id)) return opt;
          const newGroups = [...(opt.groups || []), group];
          return { ...opt, groups: newGroups, capacity: newGroups.reduce((s, g) => s + g.count, 0) };
        }));
        setGroupDropdownOptId(null);
      };
      const handleRemoveGroup = (optId, groupId) => {
        setOptions(options.map(opt => {
          if (opt.id !== optId) return opt;
          const newGroups = (opt.groups || []).filter(g => g.id !== groupId);
          return { ...opt, groups: newGroups, capacity: newGroups.length > 0 ? newGroups.reduce((s, g) => s + g.count, 0) : opt.capacity };
        }));
      };

      const [options, setOptions] = useState([
        { id: 1, name: '11월 01일 교육 신청', capacity: 30, enrolled: 30, startDate: '2026-11-01', endDate: '2026-11-01', place: '', groups: [],
          sessions: [{ id: 101, name: '1회차', date: '2026-11-01', startTime: '09:00', endTime: '18:00', place: '' }] },
        { id: 2, name: '11월 02일 교육 신청', capacity: 30, enrolled: 25, startDate: '2026-11-02', endDate: '2026-11-02', place: '', groups: [],
          sessions: [{ id: 102, name: '1회차', date: '2026-11-02', startTime: '09:00', endTime: '18:00', place: '' }] }
      ]);

      const [activeOptionId, setActiveOptionId] = useState(1);
      const [showBatchForm, setShowBatchForm] = useState(null); // null | optId
      const [batchData, setBatchData] = useState({ startDate: '', endDate: '', days: [], startTime: '09:00', endTime: '18:00', place: '' });

      /* ── 패키지 드래그앤드롭 ── */
      const dragOptId = useRef(null);
      const dragOverOptId = useRef(null);
      const [draggingOpt, setDraggingOpt] = useState(null);
      const [dragOverOpt, setDragOverOpt] = useState(null);

      const onOptDragStart = (e, id) => { dragOptId.current = id; setDraggingOpt(id); e.dataTransfer.effectAllowed = 'move'; };
      const onOptDragOver = (e, id) => { e.preventDefault(); dragOverOptId.current = id; setDragOverOpt(id); };
      const onOptDrop = (e) => {
        e.preventDefault();
        const from = dragOptId.current, to = dragOverOptId.current;
        if (!from || !to || from === to) { setDraggingOpt(null); setDragOverOpt(null); return; }
        const arr = [...options];
        const fi = arr.findIndex(o => o.id === from), ti = arr.findIndex(o => o.id === to);
        const [rem] = arr.splice(fi, 1); arr.splice(ti, 0, rem);
        setOptions(arr);
        dragOptId.current = null; dragOverOptId.current = null;
        setDraggingOpt(null); setDragOverOpt(null);
      };
      const onOptDragEnd = () => { setDraggingOpt(null); setDragOverOpt(null); dragOptId.current = null; dragOverOptId.current = null; };

      /* ── 회차 드래그앤드롭 ── */
      const dragSessId = useRef(null);
      const dragOverSessId = useRef(null);
      const [draggingSess, setDraggingSess] = useState(null);
      const [dragOverSess, setDragOverSess] = useState(null);

      // dragSessId stores { sessId, optId } to know which package the dragged session belongs to
      const onSessDragStart = (e, sessId, optId) => { dragSessId.current = { sessId, optId }; setDraggingSess(sessId); e.dataTransfer.effectAllowed = 'move'; };
      const onSessDragOver = (e, sessId) => { e.preventDefault(); dragOverSessId.current = sessId; setDragOverSess(sessId); };
      const onSessDrop = (e, targetOptId) => {
        e.preventDefault();
        const drag = dragSessId.current;
        const to = dragOverSessId.current;
        if (!drag || !to || drag.sessId === to || drag.optId !== targetOptId) { setDraggingSess(null); setDragOverSess(null); return; }
        setOptions(options.map(opt => {
          if (opt.id !== drag.optId) return opt;
          const arr = [...opt.sessions];
          const fi = arr.findIndex(s => s.id === drag.sessId), ti = arr.findIndex(s => s.id === to);
          const [rem] = arr.splice(fi, 1); arr.splice(ti, 0, rem);
          return { ...opt, sessions: arr };
        }));
        dragSessId.current = null; dragOverSessId.current = null;
        setDraggingSess(null); setDragOverSess(null);
      };
      const onSessDragEnd = () => { setDraggingSess(null); setDragOverSess(null); dragSessId.current = null; dragOverSessId.current = null; };

      /* ── 옵션 CRUD ── */
      const handleAddOption = () => {
        const newId = Date.now();
        setOptions([...options, { id: newId, name: '새로운 드롭다운 옵션', capacity: 30, enrolled: 0, startDate: '', endDate: '', place: '', groups: [], sessions: [] }]);
        setActiveOptionId(newId);
      };
      const handleRemoveOption = (id) => {
        if (options.length === 1) return alert('최소 1개의 옵션은 필요합니다.');
        const next = options.filter(o => o.id !== id);
        setOptions(next);
        if (activeOptionId === id) setActiveOptionId(next[0].id);
      };
      const handleDuplicateOption = (opt) => {
        const newId = Date.now();
        setOptions([...options, { ...opt, id: newId, name: `${opt.name} - 복사본`, sessions: opt.sessions.map((s, i) => ({ ...s, id: newId + i + 1 })) }]);
        setActiveOptionId(newId);
      };
      const handleOptionChange = (id, field, val) => setOptions(options.map(o => o.id === id ? { ...o, [field]: val } : o));

      /* ── 세션 CRUD (optId 명시) ── */
      const handleAddSession = (optId) => {
        setOptions(options.map(opt => {
          if (opt.id !== optId) return opt;
          const last = opt.sessions[opt.sessions.length - 1];
          return { ...opt, sessions: [...opt.sessions, { id: Date.now(), name: `${opt.sessions.length + 1}회차`, date: '', startTime: last ? last.startTime : '09:00', endTime: last ? last.endTime : '18:00', place: '' }] };
        }));
      };
      const handleRemoveSession = (sid, optId) => setOptions(options.map(opt => opt.id === optId ? { ...opt, sessions: opt.sessions.filter(s => s.id !== sid) } : opt));
      const handleSessionChange = (sid, field, val, optId) => setOptions(options.map(opt => opt.id === optId ? { ...opt, sessions: opt.sessions.map(s => s.id === sid ? { ...s, [field]: val } : s) } : opt));

      /* ── 일괄 생성 ── */
      const toggleBatchDay = (day) => setBatchData(prev => ({ ...prev, days: prev.days.includes(day) ? prev.days.filter(d => d !== day) : [...prev.days, day] }));
      const handleBatchGenerateSessions = () => {
        const start = new Date(batchData.startDate), end = new Date(batchData.endDate);
        const dayMap = { '일':0,'월':1,'화':2,'수':3,'목':4,'금':5,'토':6 };
        const targetDays = batchData.days.map(d => dayMap[d]);
        if (isNaN(start.getTime()) || isNaN(end.getTime()) || start > end || targetDays.length === 0) return alert('유효한 기간과 요일을 설정해주세요.');
        const generated = [];
        let curr = new Date(start);
        while (curr <= end) {
          if (targetDays.includes(curr.getDay())) {
            const y = curr.getFullYear(), m = String(curr.getMonth()+1).padStart(2,'0'), d = String(curr.getDate()).padStart(2,'0');
            generated.push({ date:`${y}-${m}-${d}`, startTime: batchData.startTime, endTime: batchData.endTime, place: batchData.place });
          }
          curr.setDate(curr.getDate() + 1);
        }
        if (generated.length === 0) return alert('선택한 요일이 기간 내에 없습니다.');
        const batchOptId = showBatchForm;
        setOptions(options.map(opt => opt.id === batchOptId ? { ...opt, sessions: [...opt.sessions, ...generated.map((d, i) => ({ id: Date.now() + i, name: `${opt.sessions.length + i + 1}회차`, ...d }))] } : opt));
        setShowBatchForm(null);
      };

      const activeOption = options.find(o => o.id === activeOptionId) || options[0];
      const activeDays = options.flatMap(o => o.sessions).filter(s => s.date && s.date.startsWith('2026-11-')).map(s => parseInt(s.date.split('-')[2], 10));

      return (
        <div className="h-screen flex flex-col bg-slate-50 overflow-hidden">

          {/* Header */}
          <header className="bg-white border-b border-slate-200 shrink-0 z-50 shadow-sm">
            <div className="px-8 py-4 flex justify-between items-center">
              <div className="flex items-center gap-3">
                <a href="index.html" className="w-8 h-8 bg-slate-100 text-slate-500 rounded-lg flex items-center justify-center hover:bg-slate-200 transition-colors" title="코스 목록">
                  <ChevronLeft size={18}/>
                </a>
                <div className="w-8 h-8 bg-indigo-600 text-white rounded-lg flex items-center justify-center font-bold shadow-sm"><MapPin size={18}/></div>
                <div>
                  <h1 className="text-lg font-extrabold text-slate-900 leading-none mb-1">{isEditMode ? '오프라인 코스 편집' : '오프라인 코스 개설'}</h1>
                  <p className="text-[11px] font-semibold text-slate-500">통합 패키지 모델 (Unified Package Builder)</p>
                </div>
                <span className={`ml-2 px-3 py-1 rounded-full text-[11px] font-bold border flex items-center gap-1.5 ${statusColor[courseStatus]}`}>
                  <CircleDot size={10}/>
                  {statusLabel[courseStatus]}
                </span>
              </div>
              <div className="flex items-center gap-2">
                {lastSavedAt && (
                  <span className="text-[11px] text-slate-400 font-medium mr-1">
                    마지막 저장: {lastSavedAt.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' })}
                  </span>
                )}
                <button onClick={handleSaveDraft} className="px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-lg text-sm font-bold hover:bg-slate-50 transition-colors flex items-center gap-2 shadow-sm">
                  <Save size={15}/> 임시저장
                </button>
                <button onClick={() => setIsPreviewOpen(true)} className="px-4 py-2 bg-slate-700 text-white rounded-lg text-sm font-bold hover:bg-slate-600 transition-colors flex items-center gap-1.5 shadow-sm">
                  <Eye size={15}/> 미리보기
                </button>
              </div>
            </div>
          </header>

          <div className="flex-1 flex overflow-hidden">

            {/* Main */}
            <main className="flex-1 overflow-y-auto custom-scrollbar py-10 space-y-8 animate-fadeIn pb-32">
              <div className="w-[800px] mx-auto px-0 space-y-8">

              {/* 섹션 1: 기본 정보 */}
              <section className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
                <div className="bg-slate-50 border-b border-slate-100 px-6 py-4 flex items-center gap-2">
                  <div className="w-6 h-6 bg-slate-800 text-white rounded-full flex items-center justify-center text-xs font-bold">1</div>
                  <h2 className="text-base font-bold text-slate-800">코스 기본 정보</h2>
                </div>
                <div className="p-6 space-y-6">
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-1.5">코스명 <span className="text-red-500">*</span></label>
                    <input type="text" value={courseInfo.title} onChange={e => setCourseInfo({...courseInfo, title: e.target.value})} className="w-full border border-slate-300 rounded-lg p-3 text-[14px] focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all" placeholder="예: 2026 직무교육 — 프로젝트 관리 심화"/>
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-1.5">상단 표시 방식</label>
                    <div className="flex gap-3">
                      <label className="flex items-center gap-2 border border-indigo-500 bg-indigo-50 text-indigo-700 px-4 py-2 rounded-lg cursor-pointer">
                        <input type="radio" name="cover" defaultChecked className="w-4 h-4 text-indigo-600"/>
                        <span className="text-[13px] font-bold">기본 표지</span>
                      </label>
                      <label className="flex items-center gap-2 border border-slate-200 px-4 py-2 rounded-lg cursor-pointer hover:bg-slate-50">
                        <input type="radio" name="cover" className="w-4 h-4"/>
                        <span className="text-[13px] font-bold text-slate-600">사용자 지정 이미지</span>
                      </label>
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-6">
                    <div>
                      <label className="block text-sm font-bold text-slate-700 mb-1.5">카테고리 분류 <span className="text-red-500">*</span></label>
                      <select className="w-full border border-slate-300 rounded-lg p-3 text-[13px] focus:border-indigo-500 outline-none bg-white">
                        <option>직무 역량</option><option>공통/온보딩</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-slate-700 mb-1.5">담당 강사 <span className="text-red-500">*</span></label>
                      <div className="relative">
                        <User size={16} className="absolute left-3 top-3 text-slate-400"/>
                        <input type="text" value={courseInfo.instructor} onChange={e => setCourseInfo({...courseInfo, instructor: e.target.value})} className="w-full border border-slate-300 rounded-lg pl-9 pr-3 py-3 text-[13px] focus:border-indigo-500 outline-none" placeholder="예: 김민준"/>
                      </div>
                    </div>
                  </div>
                  <div>

                      <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-center">
                        <div className="text-[13px] font-black text-amber-800 mb-1">관리자 배정 교육</div>
                        <div className="text-[11px] text-amber-600">담당자가 직접 배정한 교육입니다.<br/>별도 신청 없이 일정을 확인하세요.</div>
                        {/* 패키지 목록 */}
                        <div className="mt-4 space-y-2 text-left">
                          {options.map((opt, i) => (
                            <div key={opt.id} className="bg-white border border-amber-200 rounded-lg p-3">
                              <div className="text-[12px] font-bold text-slate-800 mb-1">{opt.name}</div>
                              {(opt.startDate || opt.endDate) && (
                                <div className="text-[10px] text-slate-500 flex items-center gap-1 mb-1">
                                  <Calendar size={10}/> {fmtDate(opt.startDate)}{opt.endDate && opt.endDate !== opt.startDate ? ` ~ ${fmtDate(opt.endDate)}` : ''}
                                </div>
                              )}
                              <div className="text-[10px] text-slate-400 flex items-center gap-1">
                                <MapPin size={10}/> {opt.place || courseInfo.location || '장소 미정'}
                              </div>
                              {(opt.groups||[]).length > 0 && (
                                <div className="flex flex-wrap gap-1 mt-1.5">
                                  {(opt.groups||[]).map(g => (
                                    <span key={g.id} className="text-[9px] font-bold bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded-full">{g.name}</span>
                                  ))}
                                </div>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>
                    ) : selectionRule === 'single' ? (
                      /* 단일 선택 */
                      <div>
                        <div className="text-[11px] font-bold text-slate-500 mb-2">교육 일정 선택</div>
                        <div className="space-y-2">
                          {options.map((opt) => {
                            const remaining = opt.capacity - (opt.enrolled || 0);
                            const isClosed = remaining <= 0;
                            const place = opt.place || courseInfo.location;
                            return (
                              <div key={opt.id} className={`border-2 rounded-xl p-3.5 transition-colors cursor-pointer
                                ${isClosed ? 'border-slate-200 bg-slate-50 opacity-60' : 'border-slate-800 bg-white active:bg-slate-50'}`}>
                                <div className="flex items-start justify-between gap-2">
                                  <div className="flex-1 min-w-0">
                                    <div className={`text-[13px] font-black leading-tight ${isClosed ? 'text-slate-400' : 'text-slate-900'}`}>{opt.name}</div>
                                    {(opt.startDate || opt.endDate) && (
                                      <div className="text-[10px] text-slate-400 mt-1 flex items-center gap-1">
                                        <Calendar size={10}/> {fmtDate(opt.startDate)}{opt.endDate && opt.endDate !== opt.startDate ? ` ~ ${fmtDate(opt.endDate)}` : ''}
                                      </div>
                                    )}
                                    {place && <div className="text-[10px] text-slate-400 flex items-center gap-1 mt-0.5"><MapPin size={10}/> {place}</div>}
                                    {opt.sessions.length > 0 && <div className="text-[10px] text-slate-400 mt-0.5">총 {opt.sessions.length}회차</div>}
                                  </div>
                                  <div className="shrink-0">
                                    {isClosed
                                      ? <span className="text-[11px] font-bold text-rose-500 bg-rose-50 border border-rose-200 px-2 py-1 rounded-lg">마감</span>
                                      : <span className="text-[11px] font-bold text-emerald-600 bg-emerald-50 border border-emerald-200 px-2 py-1 rounded-lg">잔여 {remaining}석</span>
                                    }
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    ) : (
                      /* 다중 선택 */
                      <div>
                        <div className="bg-indigo-50 border border-indigo-100 rounded-xl p-3 mb-3 text-center">
                          <span className="text-[11px] font-bold text-indigo-700">최대 {maxSelect}개까지 선택 가능</span>
                        </div>
                        <div className="space-y-2">
                          {options.map(opt => {
                            const remaining = opt.capacity - (opt.enrolled || 0);
                            const isClosed = remaining <= 0;
                            const isSelected = selectedMobileOptions.includes(opt.id);
                            const place = opt.place || courseInfo.location;
                            return (
                              <div key={opt.id}
                                onClick={() => {
                                  if (isClosed) return;
                                  if (isSelected) setSelectedMobileOptions(selectedMobileOptions.filter(id => id !== opt.id));
                                  else {
                                    if (selectedMobileOptions.length >= maxSelect) alert(`최대 ${maxSelect}개까지만 선택할 수 있습니다.`);
                                    else setSelectedMobileOptions([...selectedMobileOptions, opt.id]);
                                  }
                                }}
                                className={`border-2 rounded-xl p-3 flex gap-3 transition-colors
                                  ${isClosed ? 'bg-slate-50 border-slate-200 cursor-not-allowed opacity-60' : isSelected ? 'border-indigo-600 bg-indigo-50/40 cursor-pointer' : 'border-slate-200 cursor-pointer'}`}
                              >
                                <div className={`w-5 h-5 rounded-md border-2 flex items-center justify-center shrink-0 mt-0.5
                                  ${isClosed ? 'border-slate-300 bg-slate-100' : isSelected ? 'border-indigo-600 bg-indigo-600 text-white' : 'border-slate-300 bg-white'}`}>
                                  {isSelected && <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>}
                                </div>
                                <div className="flex-1 min-w-0">
                                  <div className="flex items-start justify-between gap-1">
                                    <span className={`text-[13px] font-black ${isClosed ? 'text-slate-400' : 'text-slate-800'}`}>{opt.name}</span>
                                    {isClosed
                                      ? <span className="text-[10px] font-bold text-rose-500 bg-rose-50 px-1.5 py-0.5 rounded shrink-0">마감</span>
                                      : <span className="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded shrink-0">잔여 {remaining}</span>
                                    }
                                  </div>
                                  {(opt.startDate || opt.endDate) && (
                                    <div className="text-[10px] text-slate-400 mt-0.5 flex items-center gap-1">
                                      <Calendar size={9}/> {fmtDate(opt.startDate)}{opt.endDate && opt.endDate !== opt.startDate ? ` ~ ${fmtDate(opt.endDate)}` : ''}
                                    </div>
                                  )}
                                  {place && <div className="text-[10px] text-slate-400 flex items-center gap-1"><MapPin size={9}/> {place}</div>}
                                  {opt.sessions.length > 0 && <div className="text-[10px] text-slate-400">총 {opt.sessions.length}회차</div>}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}

                    {isSelfEnroll && (
                      <button className="w-full bg-[#c00000] text-white font-bold py-3.5 rounded-xl mt-4 text-[14px] shadow-sm active:bg-red-800">
                        교육 신청 확정
                      </button>
                    )}
                  </div>
                </div>
              </div>
              <button onClick={() => setIsPreviewOpen(false)} className="absolute top-6 right-8 text-white hover:text-slate-300 flex items-center gap-2 font-bold text-lg"><X size={32}/> 닫기</button>
            </div>
            );
          })()}

          {/* QR 출석부 모달 */}
          {qrModal && (
            <QrModal
              session={qrModal.session}
              optionName={qrModal.optionName}
              courseTitle={courseInfo.title}
              onClose={() => setQrModal(null)}
            />
          )}

          {/* ── 퍼블리싱 모달 ── */}
          {showPublishModal && (() => {
            const checks = getValidation();
            const allPassed = checks.every(c => c.ok);
            const errorCount = checks.filter(c => !c.ok).length;
            return (
            <div className="fixed inset-0 bg-slate-900/80 z-[200] flex items-center justify-center animate-fadeIn p-4" onClick={() => setShowPublishModal(false)}>
              <div className="bg-white rounded-2xl shadow-2xl w-[480px] max-h-[90vh] flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>
                {/* 헤더 */}
                <div className="bg-gradient-to-r from-indigo-600 to-violet-600 px-6 py-5 text-white">
                  <div className="flex items-center justify-between">
                    <div>
                      <h3 className="text-[17px] font-black flex items-center gap-2"><Send size={18}/> 코스 퍼블리싱</h3>
                      <p className="text-indigo-200 text-[12px] mt-1">아래 항목을 확인 후 학습자에게 공개합니다.</p>
                    </div>
                    <button onClick={() => setShowPublishModal(false)} className="text-white/60 hover:text-white transition-colors"><X size={22}/></button>
                  </div>
                </div>

                <div className="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-6">
                  {/* 유효성 체크리스트 */}
                  <div>
                    <div className="flex items-center justify-between mb-3">
                      <h4 className="text-[13px] font-bold text-slate-800 flex items-center gap-1.5">
                        <FileText size={14} className="text-slate-400"/> 등록 요건 확인
                      </h4>
                      {allPassed
                        ? <span className="text-[11px] font-bold text-emerald-600 bg-emerald-50 border border-emerald-200 px-2 py-0.5 rounded-full">모두 충족</span>
                        : <span className="text-[11px] font-bold text-rose-600 bg-rose-50 border border-rose-200 px-2 py-0.5 rounded-full">{errorCount}개 미충족</span>
                      }
                    </div>
                    <div className="space-y-1.5">
                      {checks.map((c, i) => (
                        <div key={i} className={`flex items-center gap-2.5 px-3 py-2 rounded-lg text-[12px] font-semibold transition-colors
                          ${c.ok ? 'bg-emerald-50/60 text-emerald-700' : 'bg-rose-50 text-rose-600'}`}>
                          {c.ok
                            ? <div className="w-5 h-5 bg-emerald-500 rounded-full flex items-center justify-center shrink-0"><Check size={12} className="text-white"/></div>
                            : <div className="w-5 h-5 bg-rose-400 rounded-full flex items-center justify-center shrink-0"><X size={12} className="text-white"/></div>
                          }
                          {c.label}
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* 퍼블리싱 방식 */}
                  {allPassed && (
                    <div className="animate-fadeIn">
                      <h4 className="text-[13px] font-bold text-slate-800 mb-3 flex items-center gap-1.5">
                        <Clock size={14} className="text-slate-400"/> 공개 시점
                      </h4>
                      <div className="grid grid-cols-2 gap-3">
                        <label className={`flex items-center gap-2.5 p-3.5 rounded-xl border-2 cursor-pointer transition-all
                          ${publishType === 'now' ? 'border-indigo-500 bg-indigo-50/50' : 'border-slate-200 hover:border-indigo-200'}`}>
                          <input type="radio" name="pubType" checked={publishType === 'now'} onChange={() => setPublishType('now')} className="w-4 h-4 accent-indigo-600"/>
                          <div>
                            <div className="text-[13px] font-bold text-slate-800">즉시 공개</div>
                            <div className="text-[11px] text-slate-500 mt-0.5">저장 즉시 학습자에게 노출</div>
                          </div>
                        </label>
                        <label className={`flex items-center gap-2.5 p-3.5 rounded-xl border-2 cursor-pointer transition-all
                          ${publishType === 'scheduled' ? 'border-indigo-500 bg-indigo-50/50' : 'border-slate-200 hover:border-indigo-200'}`}>
                          <input type="radio" name="pubType" checked={publishType === 'scheduled'} onChange={() => setPublishType('scheduled')} className="w-4 h-4 accent-indigo-600"/>
                          <div>
                            <div className="text-[13px] font-bold text-slate-800">예약 공개</div>
                            <div className="text-[11px] text-slate-500 mt-0.5">지정 일시에 자동 공개</div>
                          </div>
                        </label>
                      </div>
                      {publishType === 'scheduled' && (
                        <div className="mt-3 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 animate-fadeIn">
                          <label className="block text-[11px] font-bold text-slate-500 mb-1.5">공개 예약 일시</label>
                          <input
                            type="datetime-local"
                            value={publishSchedule}
                            onChange={e => setPublishSchedule(e.target.value)}
                            className="w-full border border-slate-300 rounded-lg p-2.5 text-[13px] outline-none focus:border-indigo-500 text-slate-700 bg-white"
                          />
                        </div>
                      )}
                    </div>
                  )}

                  {/* 경고 */}
                  {allPassed && (
                    <div className="bg-amber-50 border border-amber-200 rounded-xl p-3.5 flex gap-2.5 animate-fadeIn">
                      <AlertTriangle size={16} className="text-amber-500 mt-0.5 shrink-0"/>
                      <div className="text-[11px] text-amber-800 leading-relaxed">
                        <strong>퍼블리싱 후 주의사항</strong><br/>
                        · 학습자 앱에 즉시 노출되며, 신청이 시작될 수 있습니다.<br/>
                        · 공개 후에도 수정은 가능하나, 이미 신청된 학습자에게 변경 알림이 발송됩니다.<br/>
                        · 패키지 삭제 시 해당 신청 건은 자동 취소 처리됩니다.
                      </div>
                    </div>
                  )}
                </div>

                {/* 푸터 */}
                <div className="bg-slate-50 border-t border-slate-200 px-6 py-4 flex items-center justify-between">
                  <button onClick={() => setShowPublishModal(false)} className="px-5 py-2.5 bg-white border border-slate-300 rounded-xl text-[13px] font-bold text-slate-600 hover:bg-slate-50 transition-colors">
                    취소
                  </button>
                  <div className="flex items-center gap-2">
                    <button onClick={() => { handleSaveDraft(); setShowPublishModal(false); }} className="px-5 py-2.5 bg-white border border-slate-300 rounded-xl text-[13px] font-bold text-slate-600 hover:bg-slate-50 transition-colors flex items-center gap-1.5">
                      <Save size={14}/> 임시저장만
                    </button>
                    <button
                      onClick={handlePublish}
                      disabled={!allPassed || (publishType === 'scheduled' && !publishSchedule)}
                      className={`px-6 py-2.5 rounded-xl text-[13px] font-bold flex items-center gap-1.5 transition-all shadow-sm
                        ${allPassed && !(publishType === 'scheduled' && !publishSchedule)
                          ? 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-indigo-200'
                          : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                    >
                      <Send size={14}/> {publishType === 'scheduled' ? '예약 퍼블리싱' : '즉시 퍼블리싱'}
                    </button>
                  </div>
                </div>
              </div>
            </div>
            );
          })()}
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
