<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>댓글 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#5569ff;--primary-lighter:#EEF0FF;--primary-dark:#4454CC;
  --secondary:#6E759F;--error:#FF1943;--black:#223354;
  --body-bg:#f2f5f9;--white:#ffffff;
  --card-shadow:0px 9px 16px rgba(159,162,191,.18),0px 2px 2px rgba(159,162,191,0.32);
  --card-shadow-sm:0px 2px 3px rgba(159,162,191,.18),0px 1px 1px rgba(159,162,191,0.32);
  --primary-shadow:0px 1px 4px rgba(85,105,255,.25),0px 3px 12px 2px rgba(85,105,255,.35);
  --error-shadow:0px 1px 4px rgba(255,25,67,.25),0px 3px 12px 2px rgba(255,25,67,.35);
  --r-sm:6px;--r:10px;--r-lg:12px;--r-xl:16px;
}
body{font-family:'Pretendard','Inter',-apple-system,sans-serif;font-size:14px;color:var(--black);background:var(--body-bg);min-height:100vh}
.topbar{background:var(--white);border-bottom:1px solid rgba(34,51,84,.1);padding:20px 28px 16px;box-shadow:var(--card-shadow-sm)}
.topbar h1{font-size:22px;font-weight:700;margin-bottom:4px}
.topbar .bc{font-size:12px;color:var(--secondary);opacity:.7}
.content{padding:24px 28px;display:flex;flex-direction:column;gap:18px}

/* ── Filter Bar ── */
.filter-bar{background:var(--white);border-radius:var(--r-lg);padding:12px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;box-shadow:var(--card-shadow-sm);position:relative}
.f-add{display:inline-flex;align-items:center;gap:5px;height:32px;padding:0 12px;border:1.5px dashed rgba(85,105,255,.4);border-radius:var(--r-sm);background:none;color:var(--primary);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.f-add:hover{background:var(--primary-lighter);border-color:var(--primary)}
.f-chip{display:inline-flex;align-items:center;height:32px;border-radius:var(--r-sm);border:1px solid rgba(85,105,255,.2);background:var(--primary-lighter);font-size:12px;overflow:hidden}
.f-chip-label{padding:0 7px 0 10px;font-weight:600;color:var(--primary-dark);white-space:nowrap;border-right:1px solid rgba(85,105,255,.18)}
.f-chip-val{padding:0 6px 0 7px;color:var(--black);white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis}
.f-chip-del{width:24px;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(34,51,84,.4);cursor:pointer;border:none;background:none;border-left:1px solid rgba(85,105,255,.12);font-size:11px;transition:all .15s;padding:0;flex-shrink:0}
.f-chip-del:hover{background:rgba(255,25,67,.08);color:var(--error)}
.f-menu{position:absolute;top:calc(100% + 6px);left:16px;z-index:200;background:var(--white);border:1px solid rgba(34,51,84,.1);border-radius:var(--r-lg);box-shadow:0 8px 24px rgba(34,51,84,.14);min-width:150px;padding:6px}
.f-menu-item{display:flex;align-items:center;height:36px;padding:0 12px;font-size:13px;color:var(--black);border-radius:var(--r-sm);cursor:pointer;transition:background .1s}
.f-menu-item:hover{background:var(--primary-lighter);color:var(--primary)}
.f-menu-item.used{color:rgba(34,51,84,.3);pointer-events:none}
.f-panel{position:absolute;top:calc(100% + 6px);left:16px;z-index:201;background:var(--white);border:1px solid rgba(34,51,84,.1);border-radius:var(--r-lg);box-shadow:0 8px 24px rgba(34,51,84,.14);width:290px;padding:16px}
.f-ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.f-pt{font-size:14px;font-weight:700}
.f-pc{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(34,51,84,.12);border-radius:var(--r-sm);cursor:pointer;background:none;color:var(--secondary);font-size:12px;transition:all .15s}
.f-pc:hover{background:var(--body-bg)}
.f-pf{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(34,51,84,.07)}
.f-input{width:100%;height:34px;padding:0 10px;border:1px solid rgba(34,51,84,.15);border-radius:var(--r-sm);background:var(--white);color:var(--black);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.f-input:focus{border-color:var(--primary)}
.f-date-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.f-sep{font-size:12px;color:rgba(34,51,84,.35);flex-shrink:0}
.f-qbtns{display:flex;flex-wrap:wrap;gap:6px}
.f-qbtn{height:28px;padding:0 11px;border-radius:20px;border:1px solid rgba(34,51,84,.15);background:var(--white);color:var(--secondary);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s}
.f-qbtn:hover,.f-qbtn.on{background:var(--primary-lighter);border-color:rgba(85,105,255,.4);color:var(--primary-dark)}
.f-slist{display:flex;flex-direction:column;gap:2px}
.f-sitem{display:flex;align-items:center;gap:8px;height:34px;padding:0 10px;border-radius:var(--r-sm);font-size:13px;cursor:pointer;transition:background .1s}
.f-sitem:hover{background:var(--primary-lighter)}
.f-sitem.on{background:var(--primary-lighter);color:var(--primary-dark);font-weight:500}
.f-schk{width:15px;height:15px;border-radius:3px;flex-shrink:0;border:1.5px solid rgba(34,51,84,.25);display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s}
.f-sitem.on .f-schk{background:var(--primary);border-color:var(--primary);color:#fff}
.ml{margin-left:auto;display:flex;gap:8px;flex-shrink:0}

/* ── Buttons ── */
.btn{font-size:13px;padding:0 16px;border:1px solid rgba(34,51,84,.15);border-radius:var(--r-sm);background:var(--white);color:var(--black);cursor:pointer;height:34px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;font-family:inherit;font-weight:500;transition:all .15s}
.btn:hover{background:var(--body-bg);border-color:rgba(34,51,84,.25)}
.btn.pri{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:var(--primary-shadow)}
.btn.pri:hover{background:var(--primary-dark);border-color:var(--primary-dark)}
.btn.err{color:var(--error);border-color:rgba(255,25,67,.3)}
.btn.err:hover{background:#FFF0F3;box-shadow:var(--error-shadow)}
.btn.sm{height:28px;font-size:12px;padding:0 12px}

/* ── Table ── */
.table-card{background:var(--white);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--card-shadow)}
.table-top{padding:14px 20px;border-bottom:1px solid rgba(34,51,84,.08);display:flex;align-items:center;justify-content:space-between}
.count{font-size:13px;color:var(--secondary)}.count b{color:var(--black);font-weight:700}
.tabs{display:flex;gap:2px;background:var(--body-bg);border-radius:var(--r-sm);padding:3px}
.tab{padding:5px 14px;font-size:13px;color:var(--secondary);cursor:pointer;border-radius:5px;background:transparent;border:none;font-family:inherit;font-weight:500;transition:all .15s}
.tab:hover{color:var(--black)}.tab.on{background:var(--white);color:var(--primary);box-shadow:var(--card-shadow-sm)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;table-layout:fixed;min-width:800px}
th{padding:10px 16px;font-size:12px;font-weight:600;color:var(--secondary);text-align:left;border-bottom:1px solid rgba(34,51,84,.08);background:#fafbfd;white-space:nowrap;letter-spacing:.02em;text-transform:uppercase}
td{padding:11px 16px;font-size:13px;border-bottom:1px solid rgba(34,51,84,.05);vertical-align:middle;overflow:hidden}
tr:last-child td{border-bottom:none}tr:hover td{background:#fafbfd}tr.sel td{background:var(--primary-lighter)}
.chip{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.chip-blue{background:#E6F1FB;color:#185FA5}.chip-red{background:#FCEBEB;color:#A32D2D}
.chip-gray{background:rgba(34,51,84,.07);color:var(--secondary)}.chip-purple{background:#EEEDFE;color:#534AB7}
.ell{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.link{color:var(--primary);cursor:pointer;font-weight:500}.link:hover{text-decoration:underline}
.del-line{color:rgba(34,51,84,.3);text-decoration:line-through;font-size:12px;display:block}
.ava{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.author-cell{display:flex;align-items:center;gap:8px;overflow:hidden}
.like-btn{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border:1px solid rgba(34,51,84,.12);border-radius:var(--r-sm);background:var(--white);cursor:pointer;font-size:12px;color:var(--secondary);font-family:inherit;transition:all .15s}
.like-btn:hover,.like-btn.on{background:#FAEEDA;border-color:#EF9F27;color:#633806}
.act{display:flex;gap:4px}
.ico{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(34,51,84,.12);border-radius:var(--r-sm);cursor:pointer;background:var(--white);color:var(--secondary);font-size:13px;transition:all .15s}
.ico:hover{background:var(--body-bg)}.ico.del:hover{background:#FCEBEB;color:var(--error);border-color:rgba(255,25,67,.3)}
.tbl-footer{padding:12px 20px;border-top:1px solid rgba(34,51,84,.06);display:flex;align-items:center;gap:12px}
.pgn{display:flex;align-items:center;gap:4px}
.pgn-btn{min-width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;border:1px solid transparent;border-radius:var(--r-sm);background:transparent;color:var(--secondary);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;padding:0 4px;transition:all .15s}
.pgn-btn:hover{background:var(--body-bg);color:var(--black)}.pgn-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:var(--primary-shadow)}.pgn-btn:disabled{opacity:.3;cursor:default;pointer-events:none}
.pgn-dots{min-width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;color:rgba(34,51,84,.35)}

/* ── Modal ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,12,87,.25);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:var(--r-xl);width:92vw;max-width:1200px;height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,12,87,.22);overflow:hidden}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid rgba(34,51,84,.08);flex-shrink:0}
.modal-hd-title{font-size:15px;font-weight:700;color:var(--black)}
.close-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(34,51,84,.12);border-radius:var(--r-sm);cursor:pointer;background:none;color:var(--secondary);font-size:14px;flex-shrink:0;transition:all .15s}
.close-btn:hover{background:var(--body-bg)}
.modal-cols{display:flex;flex:1;overflow:hidden}
.modal-left{flex:0 0 70%;border-right:1px solid rgba(34,51,84,.08);display:flex;flex-direction:column;overflow:hidden}
.modal-left-body{flex:1;overflow-y:auto;padding:24px 28px}
.post-header{margin-bottom:18px}
.post-title{font-size:20px;font-weight:700;color:var(--black);margin-bottom:12px;line-height:1.4}
.post-stats{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.stat-btn{display:inline-flex;align-items:center;gap:5px;height:30px;padding:0 12px;border:1px solid rgba(34,51,84,.15);border-radius:var(--r-sm);background:var(--white);color:var(--secondary);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s}
.stat-btn:hover{background:var(--body-bg)}
.stat-btn.liked{background:#FAEEDA;border-color:#EF9F27;color:#633806}
.stat-btn.scrapped{background:var(--primary-lighter);border-color:rgba(85,105,255,.3);color:var(--primary-dark)}
.stat-plain{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--secondary);padding:0 4px}
.post-author-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid rgba(34,51,84,.06)}
.post-author-ava{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--primary-lighter);color:var(--primary);flex-shrink:0}
.post-author-name{font-size:13px;font-weight:600}
.post-author-date{font-size:11px;color:rgba(34,51,84,.4)}
.post-content{font-size:14px;line-height:1.85;color:#333}
.sec-label{font-size:11px;font-weight:700;color:rgba(34,51,84,.35);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.modal-right{flex:0 0 30%;display:flex;flex-direction:column;background:#fafbfd}
.modal-right-hd{padding:14px 16px;border-bottom:1px solid rgba(34,51,84,.08);flex-shrink:0}
.cmt-count{font-size:13px;font-weight:600;color:var(--black)}
.cmt-write{padding:12px 16px;border-bottom:1px solid rgba(34,51,84,.08);flex-shrink:0;background:var(--white)}
.cmt-write-label{font-size:11px;font-weight:700;color:var(--primary);margin-bottom:7px;letter-spacing:.04em}
.cmt-write-row{display:flex;gap:8px;align-items:flex-end}
.cmt-write-row textarea{flex:1;min-height:46px}
.cmt-scroll{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.cmt{padding:11px 13px;border-radius:var(--r);background:var(--white);border:1px solid rgba(34,51,84,.07)}
.cmt.admin{background:var(--primary-lighter);border-color:rgba(85,105,255,.16)}
.cmt.reply{margin-left:22px;position:relative}
.cmt.reply::before{content:'';position:absolute;left:-11px;top:18px;width:8px;height:1px;background:rgba(34,51,84,.2)}
.cmt-hd{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.cmt-ava{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.cmt-name{font-size:12px;font-weight:600}.cmt-date{font-size:10px;color:rgba(34,51,84,.35);margin-left:auto}
.cmt-body{font-size:12px;color:#444;line-height:1.65;padding-left:29px}
.admin-tag{font-size:9px;padding:1px 6px;border-radius:3px;background:var(--primary);color:#fff;font-weight:600}
.cmt-acts{display:flex;gap:4px;justify-content:flex-end;margin-top:6px}
.cmt-ico{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;border-radius:5px;color:rgba(34,51,84,.3);font-size:11px;transition:all .15s}
.cmt-ico:hover{background:rgba(34,51,84,.06);color:var(--secondary)}.cmt-ico.del:hover{background:#FCEBEB;color:var(--error)}
.cmt-btn{font-size:11px;padding:3px 9px;border:1px solid rgba(34,51,84,.12);border-radius:var(--r-sm);background:var(--white);cursor:pointer;color:var(--secondary);font-family:inherit;transition:all .15s}
.cmt-btn:hover{background:var(--body-bg)}.cmt-btn.del:hover{background:#FCEBEB;color:var(--error);border-color:rgba(255,25,67,.3)}
.reply-box{margin-left:22px;margin-top:4px;padding:10px 12px;border:1.5px solid var(--primary);border-radius:var(--r);background:#fff}
.reply-label{font-size:11px;font-weight:600;color:var(--primary);margin-bottom:6px}
textarea{width:100%;border:1px solid rgba(34,51,84,.12);border-radius:var(--r-sm);padding:8px 10px;font-size:13px;resize:none;outline:none;font-family:inherit;line-height:1.6;transition:border-color .15s}
textarea:focus{border-color:var(--primary)}
.reply-footer{display:flex;justify-content:flex-end;gap:6px;margin-top:6px}
.file-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--r-sm);font-size:12px;cursor:pointer;transition:all .15s}
.file-chip.img{background:#E6F1FB;border:1px solid #B5D4F4;color:#185FA5}.file-chip.img:hover{background:#d0e8f8}
.file-chip.vid{background:#FCEBEB;border:1px solid #F7C1C1;color:#A32D2D}
.like-count{font-size:12px;color:var(--secondary);display:inline-flex;align-items:center;gap:3px}
</style>
</head>
<body>

<div class="topbar">
  <h1>댓글 관리</h1>
  <div class="bc">홈 / 게시판 / 댓글 관리</div>
</div>

<div class="content">

  <div class="filter-bar" id="filterBar">
    <button class="f-add" onclick="toggleFMenu(event)">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5.5 1v9M1 5.5h9"/></svg>
      필터 추가
    </button>
    <div id="filterChips" style="display:contents"></div>
    <div class="ml">
      <button class="btn"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M8 2v9M4 8l4 4 4-4"/><path d="M2 14h12"/></svg>다운로드</button>
      <button class="btn pri">조회</button>
    </div>

    <!-- 필터 선택 메뉴 -->
    <div class="f-menu" id="fMenu" style="display:none">
      <div class="f-menu-item" data-k="topic"   onclick="openFPanel('topic',event)">토픽 유형</div>
      <div class="f-menu-item" data-k="title"   onclick="openFPanel('title',event)">제목</div>
      <div class="f-menu-item" data-k="content" onclick="openFPanel('content',event)">내용</div>
      <div class="f-menu-item" data-k="author"  onclick="openFPanel('author',event)">작성자</div>
      <div class="f-menu-item" data-k="type"    onclick="openFPanel('type',event)">유형</div>
      <div class="f-menu-item" data-k="date"    onclick="openFPanel('date',event)">작성일</div>
    </div>

    <!-- 텍스트 패널 -->
    <div class="f-panel" id="fpText" style="display:none">
      <div class="f-ph"><span class="f-pt" id="fpTextTitle"></span><button class="f-pc" onclick="closeFPanels()">✕</button></div>
      <input class="f-input" id="fpTextVal" placeholder="검색어 입력" onkeydown="if(event.key==='Enter')applyFText()"/>
      <div class="f-pf">
        <button class="btn sm" onclick="closeFPanels()">취소</button>
        <button class="btn pri sm" onclick="applyFText()">적용</button>
      </div>
    </div>

    <!-- 선택 패널 -->
    <div class="f-panel" id="fpSelect" style="display:none">
      <div class="f-ph"><span class="f-pt" id="fpSelectTitle"></span><button class="f-pc" onclick="closeFPanels()">✕</button></div>
      <div class="f-slist" id="fpSelectList"></div>
      <div class="f-pf">
        <button class="btn sm" onclick="closeFPanels()">취소</button>
        <button class="btn pri sm" onclick="applyFSelect()">적용</button>
      </div>
    </div>

    <!-- 날짜 패널 -->
    <div class="f-panel" id="fpDate" style="display:none">
      <div class="f-ph"><span class="f-pt">작성일</span><button class="f-pc" onclick="closeFPanels()">✕</button></div>
      <div class="f-date-row">
        <input class="f-input" type="date" id="fpDateFrom" style="flex:1"/>
        <span class="f-sep">~</span>
        <input class="f-input" type="date" id="fpDateTo" style="flex:1"/>
      </div>
      <div class="f-qbtns" style="margin-top:10px">
        <button class="f-qbtn" onclick="setFPreset('7',this)">최근 7일</button>
        <button class="f-qbtn" onclick="setFPreset('20',this)">최근 20일</button>
        <button class="f-qbtn" onclick="setFPreset('month',this)">이번 달</button>
        <button class="f-qbtn" onclick="setFPreset('lastmonth',this)">지난 달</button>
        <button class="f-qbtn" onclick="setFPreset('year',this)">올해</button>
      </div>
      <div class="f-pf">
        <button class="btn sm" onclick="closeFPanels()">취소</button>
        <button class="btn pri sm" onclick="applyFDate()">적용</button>
      </div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-top">
      <span class="count">총 <b id="totalCnt">5</b>개</span>
      <div class="tabs">
        <button class="tab on" onclick="setTab(this,'전체')">전체</button>
        <button class="tab" onclick="setTab(this,'댓글')">댓글만</button>
        <button class="tab" onclick="setTab(this,'답글')">답글만</button>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <colgroup>
          <col style="width:42px"/><col style="width:72px"/><col style="width:172px"/>
          <col/><col style="width:128px"/><col style="width:140px"/>
          <col style="width:68px"/><col style="width:80px"/><col style="width:72px"/>
        </colgroup>
        <thead>
          <tr>
            <th><input type="checkbox" id="chkAll" onchange="toggleAll(this)"/></th>

/* ── Data ── */

const ROWS=[

  {id:1,pid:null, topic:"일반",title:null,                   cmt:"저도 완전 공감이에요. 처음에 정말 막막했는데 이 글 보고 많이 위로 받았어요.", author:"삭제된 회원",init:"탈",bg:"rgba(34,51,84,.1)",fg:"#8892a4",date:"2026/03/18 09:11",type:"댓글",likes:0,liked:false,files:[]},
  {id:2,pid:"p2",topic:"일반",title:"메일 잘 오나요",         cmt:"저도 스팸함 확인해봤는데 없더라고요. 이 화면 맞나요?",            author:"이성현",   init:"이",bg:"#9FE1CB",fg:"#0F6E56",date:"2026/03/17 13:51",type:"답글",likes:1,liked:false,files:[{type:"image",name:"screenshot.png",url:"https://picsum.photos/seed/img1/400/260"}]},
  {id:3,pid:"p1",topic:"일반",title:"자기소개_2026",          cmt:"안녕하세요! 올해 입사한 신입입니다. 잘 부탁드려요.",              author:"박지원",   init:"박",bg:"#F4C0D1",fg:"#993556",date:"2026/03/16 15:03",type:"댓글",likes:2,liked:true, files:[{type:"video",name:"intro.mp4",url:""}]},
  {id:4,pid:"p2",topic:"일반",title:"부관리자 생성(op001)2", cmt:"네, 말씀하신 대로 설정해봤는데 정상적으로 잘 됩니다.",             author:"나재완",   init:"나",bg:"#C0DD97",fg:"#3B6D11",date:"2026/03/15 10:22",type:"답글",likes:0,liked:false,files:[]},
];

/* ── State ── */
let rows=JSON.parse(JSON.stringify(ROWS));
let posts=JSON.parse(JSON.stringify(POSTS));
let selected=new Set(), filterType="전체", currentPid=null, currentPage=1;
const TP=3979;

/* ── Filter ── */
const FDEFS={
  topic:  {label:'토픽 유형',type:'select',opts:['일반','공지','QnA','자유']},
  title:  {label:'제목',     type:'text'},
  content:{label:'내용',     type:'text'},
  author: {label:'작성자',   type:'text'},
  type:   {label:'유형',     type:'select',opts:['댓글','답글']},
  date:   {label:'작성일',   type:'date'},
};
let filters={}, fKey=null, fTmpSel=[];

function toggleFMenu(e){
  e.stopPropagation();
  const m=document.getElementById('fMenu');
  const wasHidden=m.style.display==='none';
  closeFPanels();
  if(wasHidden){
    m.style.display='block';
    Object.keys(FDEFS).forEach(k=>{
      const el=m.querySelector('[data-k='+k+']');
      if(el) el.classList.toggle('used',!!filters[k]);
    });
  }
}
function openFPanel(key,e){
  e.stopPropagation();
  document.getElementById('fMenu').style.display='none';
  fKey=key;
  const def=FDEFS[key];
  if(def.type==='text'){
    document.getElementById('fpTextTitle').textContent=def.label;
    const inp=document.getElementById('fpTextVal');
    inp.value=filters[key]?.raw||'';
    document.getElementById('fpText').style.display='block';
    setTimeout(()=>inp.focus(),50);
  } else if(def.type==='select'){
    document.getElementById('fpSelectTitle').textContent=def.label;
    fTmpSel=filters[key]?.raw?[...filters[key].raw]:[];
    document.getElementById('fpSelectList').innerHTML=def.opts.map(o=>`
      <div class="f-sitem ${fTmpSel.includes(o)?'on':''}" onclick="toggleFSel('${o}',this)">
        <span class="f-schk">${fTmpSel.includes(o)?'✓':''}</span>${o}
      </div>`).join('');
    document.getElementById('fpSelect').style.display='block';
  } else {
    const raw=filters[key]?.raw||{};
    document.getElementById('fpDateFrom').value=raw.from||'';
    document.getElementById('fpDateTo').value=raw.to||'';
    document.querySelectorAll('.f-qbtn').forEach(b=>b.classList.remove('on'));
    document.getElementById('fpDate').style.display='block';
  }
}
function closeFPanels(){
  ['fMenu','fpText','fpSelect','fpDate'].forEach(id=>document.getElementById(id).style.display='none');
}
document.addEventListener('click',e=>{
  if(!document.getElementById('filterBar').contains(e.target)) closeFPanels();
});
function toggleFSel(v,el){
  const i=fTmpSel.indexOf(v);
  i>-1?fTmpSel.splice(i,1):fTmpSel.push(v);
  el.classList.toggle('on',fTmpSel.includes(v));
  el.querySelector('.f-schk').textContent=fTmpSel.includes(v)?'✓':'';
}
function applyFText(){
  const v=document.getElementById('fpTextVal').value.trim();
  if(v) filters[fKey]={label:FDEFS[fKey].label,display:v,raw:v};
  else delete filters[fKey];
  closeFPanels(); renderFChips();
}
function applyFSelect(){
  if(fTmpSel.length) filters[fKey]={label:FDEFS[fKey].label,display:fTmpSel.join(', '),raw:[...fTmpSel]};
  else delete filters[fKey];
  closeFPanels(); renderFChips();
}
function applyFDate(){
  const f=document.getElementById('fpDateFrom').value;
  const t=document.getElementById('fpDateTo').value;
  if(f||t){ const d=(f&&t)?`${f} ~ ${t}`:f||t; filters['date']={label:'작성일',display:d,raw:{from:f,to:t}}; }
  else delete filters['date'];
  closeFPanels(); renderFChips();
}
function setFPreset(p,btn){
  document.querySelectorAll('.f-qbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const now=new Date(), fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  let f,t=fmt(now);
  if(p==='7'){const d=new Date(now);d.setDate(d.getDate()-6);f=fmt(d);}
  else if(p==='20'){const d=new Date(now);d.setDate(d.getDate()-19);f=fmt(d);}
  else if(p==='month'){f=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;}
  else if(p==='lastmonth'){const d=new Date(now.getFullYear(),now.getMonth()-1,1),d2=new Date(now.getFullYear(),now.getMonth(),0);f=fmt(d);t=fmt(d2);}
  else if(p==='year'){f=`${now.getFullYear()}-01-01`;}
  document.getElementById('fpDateFrom').value=f;
  document.getElementById('fpDateTo').value=t;
}
function removeFChip(k){delete filters[k];renderFChips();}
function renderFChips(){
  document.getElementById('filterChips').innerHTML=
    Object.entries(filters).map(([k,v])=>`
      <div class="f-chip">
        <span class="f-chip-label">${v.label}</span>
        <span class="f-chip-val" title="${v.display}">${v.display}</span>
        <button class="f-chip-del" onclick="removeFChip('${k}')">✕</button>
      </div>`).join('');
}

/* ── Table ── */
function nowStr(){const d=new Date();return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function getFiltered(){return filterType==="전체"?rows:rows.filter(r=>r.type===(filterType==="댓글"?"댓글":"답글"));}
function setTab(el,t){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));el.classList.add('on');filterType=t;selected=new Set();render();}
function toggleAll(cb){const fr=getFiltered();if(cb.checked)fr.forEach(r=>selected.add(r.id));else selected.clear();render();}
function toggleRow(id){selected.has(id)?selected.delete(id):selected.add(id);render();}
function toggleLike(id){const r=rows.find(r=>r.id===id);r.liked=!r.liked;r.likes+=r.liked?1:-1;render();}

function render(){
  const fr=getFiltered();
  document.getElementById('totalCnt').textContent=fr.length;
  document.getElementById('delSelBtn').textContent=`선택 삭제${selected.size>0?' ('+selected.size+')':''}`;
  document.getElementById('tbody').innerHTML=fr.map(r=>`
    <tr class="${selected.has(r.id)?'sel':''}">
      <td><input type="checkbox" ${selected.has(r.id)?'checked':''} onchange="toggleRow(${r.id})"/></td>
      <td><span class="chip chip-blue">${r.topic}</span></td>
      <td style="overflow:hidden">
        ${r.pid?`<a class="ell link" onclick="openModal('${r.pid}')">${r.title}</a>`
               :`<span class="del-line">(삭제된 글)</span><span class="chip chip-red" style="font-size:10px">삭제</span>`}
      </td>
      <td style="overflow:hidden">
        <div style="display:flex;align-items:center;gap:6px;overflow:hidden">
          <span class="ell" style="flex:1">${r.cmt}</span>
          ${r.files&&r.files.length?(r.files[0].type==='image'?`<span style="flex-shrink:0;color:#185FA5">${iImg}</span>`:`<span style="flex-shrink:0;color:#A32D2D">${iVid}</span>`):''}
        </div>
      </td>
      <td style="overflow:hidden">
        <div class="author-cell">
          <div class="ava" style="background:${r.bg};color:${r.fg}">${r.init}</div>
          <span class="ell" style="color:${r.author==='삭제된 회원'?'rgba(34,51,84,.3)':'var(--black)'}">${r.author}</span>
        </div>
      </td>
      <td style="font-size:12px;color:var(--secondary);white-space:nowrap">${r.date}</td>
      <td><span class="chip ${r.type==='답글'?'chip-purple':'chip-gray'}">${r.type}</span></td>
      <td><span class="like-count">♡ ${r.likes}</span></td>
      <td><div class="act"><div class="ico del" title="삭제">✕</div></div></td>
    </tr>`).join('');
}

/* ── Pagination ── */
function renderPgn(){
  const cp=currentPage;
  let pages=[1];
  if(cp>3) pages.push('…');
  let s=Math.max(2,cp-1), e=Math.min(TP-1,cp+1);
  if(cp<=3){s=2;e=Math.min(5,TP-1);}
  if(cp>=TP-2){s=Math.max(2,TP-4);e=TP-1;}
  for(let i=s;i<=e;i++) pages.push(i);
  if(cp<TP-2) pages.push('…');
  if(TP>1) pages.push(TP);
  document.getElementById('pgnWrap').innerHTML=
    `<button class="pgn-btn" onclick="goPage(${cp-1})" ${cp===1?'disabled':''}>${iCL}</button>`+
    pages.map(p=>p==='…'?`<span class="pgn-dots">···</span>`:`<button class="pgn-btn ${p===cp?'active':''}" onclick="goPage(${p})">${p}</button>`).join('')+
    `<button class="pgn-btn" onclick="goPage(${cp+1})" ${cp===TP?'disabled':''}>${iCR}</button>`;
}
function goPage(p){if(p<1||p>TP)return;currentPage=p;renderPgn();}

/* ── Modal ── */
function openModal(pid){
  currentPid=pid;
  const p=posts[pid];
  document.getElementById('mHdTitle').textContent=p.topic+' · '+p.title;
  document.getElementById('mTitle').textContent=p.title;
  // 통계 버튼
  document.getElementById('mStats').innerHTML=`
    <button class="stat-btn ${p.liked?'liked':''}" onclick="togglePostLike('${pid}')">♥ 좋아요 ${p.likes}</button>
    <button class="stat-btn ${p.scraps?'scrapped':''}" onclick="togglePostScrap('${pid}')">□ 스크랩 ${p.scraps}</button>
    <span class="stat-plain">👁 읽음 ${p.views}</span>`;
  // 작성자
  document.getElementById('mAuthor').innerHTML=`
    <div class="post-author-ava">${p.author.charAt(0)}</div>
    <div><div class="post-author-name">${p.author}</div><div class="post-author-date">${p.date}</div></div>
    <span class="chip chip-blue" style="margin-left:auto">${p.topic}</span>`;
  document.getElementById('mBody').innerHTML=p.content.replace(/\n/g,'<br>');
  document.getElementById('mFiles').innerHTML='';
  renderCmts(pid);
  document.getElementById('overlay').classList.add('open');
}

function togglePostLike(pid){
  const p=posts[pid];p.liked=!p.liked;p.likes+=p.liked?1:-1;
  const btn=document.getElementById('mStats').querySelector('.stat-btn');
  if(btn){btn.className='stat-btn '+(p.liked?'liked':'');btn.textContent='♥ 좋아요 '+p.likes;}
}
function togglePostScrap(pid){
  const p=posts[pid];p.scraps=(p.scraps||0)+(p._scrapped?-1:1);p._scrapped=!p._scrapped;
  openModal(pid);
}

function renderCmts(pid){
  const p=posts[pid];
  const total=p.comments.reduce((a,c)=>a+1+(c.replies||[]).length,0);
  document.getElementById('mCmtLabel').textContent=`댓글 ${total}개`;
  document.getElementById('mCmtList').innerHTML=p.comments.map(c=>`
    <div>
      <div class="cmt ${c.isAdmin?'admin':''}">
        <div class="cmt-hd">
          <div class="cmt-ava" style="background:${c.bg};color:${c.fg}">${c.init}</div>
          <span class="cmt-name">${c.author}</span>
          ${c.isAdmin?'<span class="admin-tag">관리자</span>':''}
          <span class="cmt-date">${c.date}</span>
        </div>
        <div class="cmt-body">${c.body}</div>
        ${(c.files&&c.files.length)?`<div style="padding-left:29px;margin-top:7px;display:flex;gap:5px;flex-wrap:wrap">${c.files.map(f=>f.type==='image'?`<span class="file-chip img" onclick="openMedia('${f.url}')">${iImg} ${f.name}</span>`:`<span class="file-chip vid">${iVid} ${f.name}</span>`).join('')}</div>`:''}
        <div class="cmt-acts">
          <span style="font-size:11px;color:rgba(34,51,84,.35);margin-right:auto;padding-left:29px">♡ ${c.likes||0}</span>
          <button class="cmt-ico" title="답글" onclick="toggleReply('rb_${c.id}')">↩</button>
          <button class="cmt-ico del" title="삭제" onclick="delCmt('${pid}','${c.id}',false)">✕</button>
        </div>
      </div>
      ${(c.replies||[]).map(r=>`
        <div class="cmt reply ${r.isAdmin?'admin':''}">
          <div class="cmt-hd">
            <div class="cmt-ava" style="background:${r.bg};color:${r.fg}">${r.init}</div>
            <span class="cmt-name">${r.author}</span>
            ${r.isAdmin?'<span class="admin-tag">관리자</span>':''}
            <span class="cmt-date">${r.date}</span>
          </div>
          <div class="cmt-body">${r.body}</div>
          <div class="cmt-acts">
            <span style="font-size:11px;color:rgba(34,51,84,.35);margin-right:auto;padding-left:29px">♡ ${r.likes||0}</span>
            <button class="cmt-ico del" title="삭제" onclick="delCmt('${pid}','${r.id}',true)">✕</button>
          </div>
        </div>`).join('')}
      <div class="reply-box" id="rb_${c.id}" style="display:none">
        <div class="reply-label">관리자 답글 — ${c.author}님에게</div>
        <textarea rows="2" placeholder="답글을 입력하세요..."></textarea>
        <div class="reply-footer">
          <button class="btn sm" onclick="toggleReply('rb_${c.id}')">취소</button>
          <button class="btn pri sm" onclick="submitReply('${pid}','${c.id}','rb_${c.id}')">등록</button>
        </div>
      </div>
    </div>`).join('');
}

function toggleReply(id){const el=document.getElementById(id);const s=el.style.display==='none';el.style.display=s?'block':'none';if(s)el.querySelector('textarea').focus();}
function submitReply(pid,cid,boxId){
  const el=document.getElementById(boxId);
  const txt=el.querySelector('textarea').value.trim();
  if(!txt)return;
  const c=posts[pid].comments.find(c=>c.id===cid);
  if(!c.replies)c.replies=[];
  c.replies.push({id:'r'+Date.now(),author:'관리자',init:'관',bg:'#5569ff',fg:'#fff',date:nowStr(),body:txt,isAdmin:true,likes:0});
  renderCmts(pid);
}
function submitNewCmt(){
  const txt=document.getElementById('newCmtInput').value.trim();
  if(!txt||!currentPid)return;
  posts[currentPid].comments.push({id:'c'+Date.now(),author:'관리자',init:'관',bg:'#5569ff',fg:'#fff',date:nowStr(),body:txt,isAdmin:true,replies:[],likes:0});
  document.getElementById('newCmtInput').value='';
  renderCmts(currentPid);
}
function delCmt(pid,id,isReply){
  if(isReply) posts[pid].comments=posts[pid].comments.map(c=>({...c,replies:(c.replies||[]).filter(r=>r.id!==id)}));
  else posts[pid].comments=posts[pid].comments.filter(c=>c.id!==id);
  renderCmts(pid);
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function openMedia(url){document.getElementById('mediaImg').src=url;document.getElementById('mediaOverlay').classList.add('open');}
function closeMedia(){document.getElementById('mediaOverlay').classList.remove('open');}

render();
renderPgn();
</script>
</body>
</html>
