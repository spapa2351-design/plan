<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>로그인</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:      #0d0d0d;
      --ink-soft: #1a1a1a;
      --paper:    #f5f0e8;
      --gold:     #c9a84c;
      --gold-lt:  #e8d08a;
      --gold-dim: rgba(201,168,76,0.15);
      --muted:    #6b6459;
      --line:     rgba(201,168,76,0.3);
    }

    html, body {
      width: 390px;
      min-height: 844px;
      margin: 0 auto;
      background: var(--ink);
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      overflow-x: hidden;
    }

    /* ── GRAIN OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 100;
    }

    /* ── WATERMARK ── */
    .watermark {
      position: fixed;
      bottom: -60px;
      right: -80px;
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      font-size: 220px;
      font-weight: 300;
      font-style: italic;
      color: transparent;
      -webkit-text-stroke: 1px rgba(201,168,76,0.08);
      letter-spacing: -8px;
      user-select: none;
      pointer-events: none;
      white-space: nowrap;
      line-height: 1;
      z-index: 0;
      animation: drift 20s ease-in-out infinite;
    }

    @keyframes drift {
      0%, 100% { transform: translateY(0px) rotate(-8deg); }
      50%       { transform: translateY(-20px) rotate(-8deg); }
    }

    /* ── DECORATIVE LINE ── */
    .deco-line {
      position: fixed;
      top: 0;
      left: 28px;
      width: 1px;
      height: 100%;
      background: linear-gradient(to bottom,
        transparent 0%,
        var(--gold) 20%,
        var(--gold) 80%,
        transparent 100%
      );
      opacity: 0.18;
      pointer-events: none;
    }

    /* ── PAGE WRAPPER ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 844px;
      display: flex;
      flex-direction: column;
      padding: 0 36px 48px 56px;
      animation: pageIn 1s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HEADER ── */
    .header {
      padding-top: 72px;
      animation: fadeUp 0.8s 0.1s cubic-bezier(0.16,1,0.3,1) both;
    }

    .logo-mark {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .logo-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 12px var(--gold);
    }

    .logo-text {
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .brand {
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      font-size: 42px;
      font-weight: 300;
      font-style: italic;
      color: var(--paper);
      letter-spacing: -1px;
      line-height: 1.05;
    }

    /* ── HERO DIVIDER ── */
    .hero-section {
      margin-top: 52px;
      animation: fadeUp 0.8s 0.2s cubic-bezier(0.16,1,0.3,1) both;
    }

    .eyebrow {
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      font-size: 9px;
      letter-spacing: 0.4em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .heading {
      font-size: 28px;
      font-weight: 300;
      color: var(--paper);
      line-height: 1.25;
      letter-spacing: -0.3px;
    }

    .heading em {
      font-style: italic;
      color: var(--gold-lt);
    }

    .thin-rule {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin-top: 20px;
      opacity: 0.6;
    }

    /* ── FORM ── */
    .form-section {
      margin-top: 48px;
      flex: 1;
      animation: fadeUp 0.8s 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }

    .field {
      margin-bottom: 32px;
      position: relative;
    }

    .field label {
      display: block;
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      font-size: 9px;
      letter-spacing: 0.35em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
      transition: color 0.3s;
    }

    .field:focus-within label {
      color: var(--gold);
    }

    .input-wrap {
      position: relative;
    }

    .field input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 8px 0 12px;
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      font-size: 16px;
      font-weight: 300;
      color: var(--paper);
      outline: none;
      caret-color: var(--gold);
      letter-spacing: 0.02em;
      transition: border-color 0.3s;
    }

    .field input::placeholder {
      color: rgba(245,240,232,0.2);
      font-style: italic;
      font-size: 15px;
    }

    .field input:focus {
      border-bottom-color: var(--gold);
    }

    .field-line {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0%;
      height: 1px;
      background: var(--gold);
      box-shadow: 0 0 8px var(--gold);
      transition: width 0.4s cubic-bezier(0.16,1,0.3,1);
    }

    .field input:focus ~ .field-line {
      width: 100%;
    }

    /* ── OPTIONS ROW ── */
    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 44px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .remember input[type="checkbox"] { display: none; }

    .checkbox-custom {
      width: 14px;
      height: 14px;
      border: 1px solid var(--line);
      position: relative;
      transition: border-color 0.2s, background 0.2s;
    }

    .remember input:checked + .checkbox-custom {
      background: var(--gold-dim);
      border-color: var(--gold);
    }

    .remember input:checked + .checkbox-custom::after {
      content: '';
      position: absolute;
      inset: 3px;
      background: var(--gold);
    }

    .remember span {
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .forgot {
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s;
    }
    .forgot:hover { color: var(--gold); }

    /* ── SUBMIT BUTTON ── */
    .btn-submit {
      width: 100%;
      position: relative;
      background: transparent;
      border: 1px solid var(--gold);
      padding: 18px 24px;
      cursor: pointer;
      overflow: hidden;
      transition: background 0.4s;
    }

    .btn-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--gold) 0%, #b8922d 100%);
      transform: translateX(-100%);
      transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
    }

    .btn-submit:hover::before,
    .btn-submit:active::before {
      transform: translateX(0);
    }

    .btn-inner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .btn-text {
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      font-size: 11px;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .btn-submit:hover .btn-text,
    .btn-submit:active .btn-text {
      color: var(--ink);
    }

    .btn-arrow {
      width: 24px;
      height: 1px;
      background: var(--gold);
      position: relative;
      transition: background 0.3s, width 0.3s;
    }

    .btn-arrow::after {
      content: '';
      position: absolute;
      right: 0;
      top: -3px;
      width: 7px;
      height: 7px;
      border-right: 1px solid var(--gold);
      border-top: 1px solid var(--gold);
      transform: rotate(45deg);
      transition: border-color 0.3s;
    }

    .btn-submit:hover .btn-arrow {
      background: var(--ink);
      width: 32px;
    }
    .btn-submit:hover .btn-arrow::after {
      border-color: var(--ink);
    }

    /* ── SOCIAL / DIVIDER ── */
    .alt-section {
      margin-top: 40px;
      animation: fadeUp 0.8s 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }

    .divider-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .divider-row hr {
      flex: 1;
      border: none;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .divider-row span {
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .social-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 16px;
      border: 1px solid rgba(255,255,255,0.07);
      background: transparent;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s;
    }

    .social-btn:hover {
      border-color: rgba(201,168,76,0.3);
      background: rgba(201,168,76,0.04);
    }

    .social-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .social-btn span {
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .social-btn:hover span { color: var(--paper); }

    /* ── FOOTER ── */
    .footer-note {
      margin-top: 36px;
      text-align: center;
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      animation: fadeUp 0.8s 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }

    .footer-note a {
      color: var(--gold);
      text-decoration: none;
    }

    /* ── FLOATING DOTS ── */
    .dots {
      position: fixed;
      top: 0; left: 0;
      width: 390px;
      height: 844px;
      pointer-events: none;
      z-index: 0;
    }

    .dot {
      position: absolute;
      border-radius: 50%;
      background: var(--gold);
      animation: floatDot linear infinite;
      opacity: 0;
    }

    @keyframes floatDot {
      0%   { opacity: 0; transform: translateY(0) scale(0); }
      10%  { opacity: 0.6; transform: translateY(-10px) scale(1); }
      90%  { opacity: 0.2; transform: translateY(-120px) scale(0.5); }
      100% { opacity: 0; transform: translateY(-140px) scale(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- DECORATIVE -->
  <div class="watermark">sign</div>
  <div class="deco-line"></div>
  <canvas class="dots" id="dotsCanvas"></canvas>

  <!-- PAGE -->
  <div class="page">

    <!-- HEADER -->
    <header class="header">
      <div class="logo-mark">
        <div class="logo-dot"></div>
        <span class="logo-text">Atelier</span>
      </div>
      <div class="brand">Studio</div>
    </header>

    <!-- HERO TEXT -->
    <div class="hero-section">
      <p class="eyebrow">Welcome back</p>
      <h1 class="heading">다시 만나서<br><em>반갑습니다</em></h1>
      <div class="thin-rule"></div>
    </div>

    <!-- FORM -->
    <div class="form-section">
      <form onsubmit="handleLogin(event)">

        <div class="field">
          <label>이메일</label>
          <div class="input-wrap">
            <input type="email" placeholder="your@email.com" autocomplete="email" />
            <span class="field-line"></span>
          </div>
        </div>

        <div class="field">
          <label>비밀번호</label>
          <div class="input-wrap">
            <input type="password" placeholder="············" autocomplete="current-password" />
            <span class="field-line"></span>
          </div>
        </div>

        <div class="options-row">
          <label class="remember">
            <input type="checkbox" />
            <span class="checkbox-custom"></span>
            <span>로그인 유지</span>
          </label>
          <a href="#" class="forgot">비밀번호 찾기</a>
        </div>

        <button type="submit" class="btn-submit">
          <div class="btn-inner">
            <span class="btn-text">로그인</span>
            <span class="btn-arrow"></span>
          </div>
        </button>
      </form>

      <!-- SOCIAL -->
      <div class="alt-section">
        <div class="divider-row">
          <hr /><span>또는</span><hr />
        </div>
        <div class="social-btns">
          <button class="social-btn">
            <!-- Google -->
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span>Google</span>
          </button>
          <button class="social-btn">
            <!-- Apple -->
            <svg viewBox="0 0 24 24" fill="currentColor" style="color:#f5f0e8">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98l-.09.06c-.22.15-2.18 1.27-2.16 3.8.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.37 2.78M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
            <span>Apple</span>
          </button>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <p class="footer-note">
      계정이 없으신가요? <a href="#">회원가입</a>
    </p>

  </div>

  <script>
    // Floating particles
    const canvas = document.getElementById('dotsCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 390;
    canvas.height = 844;

    const particles = Array.from({ length: 18 }, () => ({
      x: Math.random() * 390,
      y: Math.random() * 844 + 200,
      size: Math.random() * 1.5 + 0.5,
      speed: Math.random() * 0.4 + 0.2,
      opacity: 0,
      maxOpacity: Math.random() * 0.25 + 0.05,
      life: 0,
      maxLife: Math.random() * 300 + 200,
      delay: Math.random() * 200,
    }));

    function drawParticles(ts) {
      ctx.clearRect(0, 0, 390, 844);
      particles.forEach(p => {
        if (p.delay > 0) { p.delay--; return; }
        p.life++;
        p.y -= p.speed;
        const progress = p.life / p.maxLife;
        if (progress < 0.1) p.opacity = (progress / 0.1) * p.maxOpacity;
        else if (progress > 0.8) p.opacity = ((1 - progress) / 0.2) * p.maxOpacity;
        else p.opacity = p.maxOpacity;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(201,168,76,${p.opacity})`;
        ctx.fill();

        if (p.life >= p.maxLife) {
          p.x = Math.random() * 390;
          p.y = 844 + 20;
          p.life = 0;
          p.delay = Math.random() * 60;
          p.speed = Math.random() * 0.4 + 0.2;
          p.maxOpacity = Math.random() * 0.25 + 0.05;
          p.maxLife = Math.random() * 300 + 200;
        }
      });
      requestAnimationFrame(drawParticles);
    }
    requestAnimationFrame(drawParticles);

    // Ripple on submit
    function handleLogin(e) {
      e.preventDefault();
      const btn = e.target.querySelector('.btn-submit');
      btn.style.transition = 'transform 0.1s';
      btn.style.transform = 'scale(0.98)';
      setTimeout(() => {
        btn.style.transform = 'scale(1)';
        const txt = btn.querySelector('.btn-text');
        txt.textContent = '확인 중...';
        setTimeout(() => { txt.textContent = '로그인'; }, 1800);
      }, 100);
    }
  </script>
</body>
</html>
